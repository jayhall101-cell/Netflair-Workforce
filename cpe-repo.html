<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CPE Repo — Netflair Workforce</title>
<style>
:root{
  --bg:#f8f8f7;--surface:#fff;--surface2:#f1f0ed;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --text:#1a1a1a;--muted:#6b6b6b;
  --accent:#185FA5;--accent-light:#E6F1FB;
  --ok-bg:#EAF3DE;--ok-text:#27500A;--ok-bdr:#639922;
  --warn-bg:#FAEEDA;--warn-text:#854F0B;--warn-bdr:#BA7517;
  --err-bg:#FCEBEB;--err-text:#791F1F;--err-bdr:#A32D2D;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sb{width:200px;background:var(--surface2);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.logo-a{padding:14px 16px 12px;border-bottom:.5px solid var(--border);margin-bottom:8px}
.logo{font-size:19px;font-weight:700}.logo .ac{color:var(--accent)}
.logo-s{font-size:11px;color:var(--muted);margin-top:1px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;transition:all .12s;text-decoration:none}
.ni:hover{background:var(--surface);color:var(--text)}
.ni.on{border-left-color:var(--accent);color:var(--accent);background:rgba(24,95,165,.07);font-weight:600}
.sf{margin-top:auto;padding:12px 14px;border-top:.5px solid var(--border);font-size:12px;color:var(--muted)}

/* MAIN */
.mn{margin-left:200px;flex:1;min-height:100vh;display:flex;flex-direction:column}

/* STATS BAR */
.sbar{display:flex;border-bottom:.5px solid var(--border);background:var(--surface);flex-shrink:0}
.stat{padding:10px 20px;border-right:.5px solid var(--border);display:flex;align-items:center;gap:8px;white-space:nowrap}
.stat:last-child{border-right:none}
.stat-n{font-size:20px;font-weight:700}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.s-total .stat-n{color:var(--accent)}
.s-pending .stat-n{color:var(--warn-text)}
.s-inprog .stat-n{color:#534AB7}
.s-retr .stat-n{color:var(--ok-text)}
.s-over .stat-n{color:var(--err-text)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 24px;border-bottom:.5px solid var(--border);background:var(--surface);flex-wrap:wrap}
.srch{position:relative;flex:1;max-width:240px}
.srch input{width:100%;padding:7px 10px 7px 30px;border:.5px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;outline:none}
.srch input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
select.hsel{padding:7px 10px;border:.5px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;outline:none;cursor:pointer}
select.hsel:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);border:.5px solid var(--border2);background:transparent;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;font-weight:500;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn.bb{background:var(--accent);color:#fff;border-color:var(--accent)}.btn.bb:hover{background:#0C447C}
.btn.bgn{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-bdr)}
.btn.bsm{padding:5px 10px;font-size:12px}
.ml{margin-left:auto}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px 24px;flex:1}
.col{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden}
.col-hd{padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface2)}
.col-title{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.col-pip{width:7px;height:7px;border-radius:50%}
.col-cnt{background:var(--surface);border:.5px solid var(--border);border-radius:20px;padding:1px 9px;font-size:11px;font-weight:700;color:var(--muted)}
.col-body{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;flex:1}
.empty-col{display:flex;align-items:center;justify-content:center;padding:28px;border:.5px dashed var(--border2);border-radius:var(--rs);color:var(--muted);font-size:12px}

/* CARD */
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rs);padding:10px 11px 8px;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px}
.card.Pending::before{background:var(--warn-text)}
.card.In\ Progress::before{background:#534AB7}
.card.Retrieved::before{background:var(--ok-text)}
.card.overdue{border-color:rgba(163,45,45,.35)}
.card:hover{box-shadow:0 2px 10px rgba(0,0,0,.1);border-color:var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:5px}
.card-name{font-weight:600;font-size:12.5px;line-height:1.3}
.card-contact{font-size:10px;color:var(--muted);margin-top:1px}
.card-acts{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.card:hover .card-acts{opacity:1}
.ic-btn{background:none;border:.5px solid var(--border);color:var(--muted);border-radius:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:all .12s}
.ic-btn:hover{border-color:var(--accent);color:var(--accent)}
.ic-btn.del:hover{border-color:var(--err-text);color:var(--err-text)}
.badges{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9.5px;font-weight:600}
.b-reason{background:var(--accent-light);color:var(--accent);border:.5px solid rgba(24,95,165,.2)}
.b-overdue{background:var(--err-bg);color:var(--err-text);border:.5px solid var(--err-bdr);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}
.b-soon{background:var(--warn-bg);color:var(--warn-text);border:.5px solid var(--warn-bdr)}
.b-good{background:var(--ok-bg);color:var(--ok-text);border:.5px solid var(--ok-bdr)}
.b-damaged{background:var(--err-bg);color:var(--err-text);border:.5px solid var(--err-bdr)}
.b-missing{background:var(--warn-bg);color:var(--warn-text);border:.5px solid var(--warn-bdr)}
.card-meta{display:flex;flex-direction:column;gap:2.5px;margin-bottom:6px}
.mr{display:flex;align-items:baseline;gap:5px;font-size:10.5px}
.ml-label{color:var(--accent);font-size:9px;text-transform:uppercase;letter-spacing:.3px;min-width:52px}
.mv{color:var(--text)}
.sla-wrap{margin-bottom:6px}
.sla-top{display:flex;justify-content:space-between;margin-bottom:2px}
.sla-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.sla-days{font-size:9px;font-weight:600}
.sla-track{height:3px;background:var(--surface2);border-radius:99px;overflow:hidden}
.sla-fill{height:100%;border-radius:99px}
.card-foot{padding-top:7px;border-top:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-date{font-size:9px;color:var(--muted)}
.mv-btns{display:flex;gap:3px}
.mv-btn{background:none;border:.5px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 7px;font-size:9px;cursor:pointer;transition:all .12s}
.mv-btn:hover{border-color:var(--accent);color:var(--accent)}

/* PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;justify-content:flex-end}
.panel{width:420px;max-width:100%;background:var(--surface);border-left:.5px solid var(--border);height:100%;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.pnl-hd{display:flex;justify-content:space-between;align-items:center}
.pnl-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent)}
.close-btn{background:none;border:.5px solid var(--border);color:var(--muted);border-radius:4px;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{border-color:var(--err-text);color:var(--err-text)}
.p-sec{border:.5px solid var(--border);border-radius:var(--rs);padding:13px;background:var(--surface)}
.p-sec-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:9px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.di{display:flex;flex-direction:column;gap:2px}
.di.full{grid-column:1/-1}
.dl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.dv{font-size:12px;color:var(--text)}
.act-item{display:flex;gap:9px;padding:8px 0;border-bottom:.5px solid var(--border);position:relative}
.act-item:last-child{border-bottom:none}
.act-line{position:absolute;left:3px;top:15px;bottom:-8px;width:1px;background:var(--border)}
.act-item:last-child .act-line{display:none}
.act-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px}
.act-action{font-size:12px;color:var(--text)}
.act-when{font-size:10px;color:var(--muted);margin-top:1px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:22px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
.m-ttl{font-size:15px;font-weight:700;margin-bottom:18px;padding-bottom:11px;border-bottom:.5px solid var(--border)}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
input,select,textarea{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--rs);padding:8px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:58px}
.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:.5px solid var(--border)}

/* EXPORT BOX */
.exp-box{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:24px;width:340px;animation:popIn .2s ease}
.exp-ttl{font-size:15px;font-weight:700;margin-bottom:14px}
.exp-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.exp-opt{display:flex;gap:11px;background:var(--surface2);border:.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:border-color .15s;align-items:center}
.exp-opt:hover{border-color:var(--accent)}
.exp-ic{font-size:22px}
.exp-t{font-size:13px;font-weight:600}
.exp-s{font-size:11px;color:var(--muted);margin-top:1px}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface);padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:toastUp .2s ease;display:flex;align-items:center;gap:6px}
.toast.ok{border:.5px solid var(--ok-bdr);color:var(--ok-text)}
.toast.err{border:.5px solid var(--err-bdr);color:var(--err-text)}
@keyframes toastUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:800px){
  .sb{display:none}
  .mn{margin-left:0}
  .board{grid-template-columns:1fr;padding:12px}
  .fg-grid{grid-template-columns:1fr}
  .panel{width:100%}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<nav class="sb">
  <div class="logo-a">
    <div class="logo"><span class="ac">NET</span>FLAIR</div>
    <div class="logo-s">CPE Repo Tracker</div>
  </div>
  <a class="ni on" href="/cpe-repo.html">📦 CPE Repo</a>
  <a class="ni" href="/">← Back to Workforce</a>
  <div class="sf">Equipment Recovery System</div>
</nav>

<!-- MAIN -->
<div class="mn">

  <!-- STATS -->
  <div class="sbar">
    <div class="stat s-total"><div><div class="stat-n" id="st-total">0</div><div class="stat-l">Total</div></div></div>
    <div class="stat s-pending"><div><div class="stat-n" id="st-Pending">0</div><div class="stat-l">Pending</div></div></div>
    <div class="stat s-inprog"><div><div class="stat-n" id="st-In Progress">0</div><div class="stat-l">In Progress</div></div></div>
    <div class="stat s-retr"><div><div class="stat-n" id="st-Retrieved">0</div><div class="stat-l">Retrieved</div></div></div>
    <div class="stat s-over"><div><div class="stat-n" id="st-overdue">0</div><div class="stat-l">Overdue</div></div></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="srch">
      <span class="srch-ic">⌕</span>
      <input id="searchInput" type="text" placeholder="Search client, serial, IP…" oninput="applyFilters()"/>
    </div>
    <select class="hsel" id="filterTech" onchange="applyFilters()"><option value="">All Techs</option></select>
    <select class="hsel" id="filterReason" onchange="applyFilters()">
      <option value="">All Reasons</option>
      <option>Non-Payment</option><option>Cancellation</option>
      <option>Upgrade Swap</option><option>Fault Replacement</option>
    </select>
    <select class="hsel" id="filterStatus" onchange="applyFilters()">
      <option value="">All Status</option>
      <option>Pending</option><option>In Progress</option><option>Retrieved</option>
    </select>
    <button class="btn ml" onclick="showExport()">↓ Export</button>
    <button class="btn bb" onclick="openModal()">+ Add CPE</button>
  </div>

  <!-- BOARD -->
  <div class="board">
    <div class="col">
      <div class="col-hd">
        <div class="col-title"><div class="col-pip" style="background:var(--warn-text)"></div>Pending</div>
        <div class="col-cnt" id="cnt-Pending">0</div>
      </div>
      <div class="col-body" id="cards-Pending"></div>
    </div>
    <div class="col">
      <div class="col-hd">
        <div class="col-title"><div class="col-pip" style="background:#534AB7"></div>In Progress</div>
        <div class="col-cnt" id="cnt-In Progress">0</div>
      </div>
      <div class="col-body" id="cards-In Progress"></div>
    </div>
    <div class="col">
      <div class="col-hd">
        <div class="col-title"><div class="col-pip" style="background:var(--ok-text)"></div>Retrieved</div>
        <div class="col-cnt" id="cnt-Retrieved">0</div>
      </div>
      <div class="col-body" id="cards-Retrieved"></div>
    </div>
  </div>
</div>
</div>

<!-- PANEL -->
<div class="overlay" id="panelOv" style="display:none" onclick="if(event.target===this)closePanel()">
  <div class="panel" id="panelContent"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-ttl" id="modalTtl">New CPE Repo Entry</div>
    <div class="fg-grid">
      <div class="fg"><label>Client Name *</label><input id="f-client_name" placeholder="e.g. John Brown"/></div>
      <div class="fg"><label>Client Contact</label><input id="f-client_contact" placeholder="876-xxx-xxxx"/></div>
      <div class="fg"><label>CPE Model</label><input id="f-cpe_model" placeholder="Wave-Fiber-ONU"/></div>
      <div class="fg"><label>Serial Number</label><input id="f-serial_number" placeholder="WFO-1234567"/></div>
      <div class="fg"><label>Account Number</label><input id="f-account_number" placeholder="ACC-00123"/></div>
      <div class="fg"><label>Ticket Number</label><input id="f-ticket_number" placeholder="TKT-00456"/></div>
      <div class="fg"><label>Last Known IP</label><input id="f-last_known_ip" placeholder="10.100.x.x"/></div>
      <div class="fg"><label>Last Known Site</label><input id="f-last_known_site" placeholder="Anchovy-OLT-1"/></div>
      <div class="fg full"><label>Location / Address</label><input id="f-location_address" placeholder="12 Main St, Anchovy"/></div>
      <div class="fg"><label>Technician Assigned</label><input id="f-technician_assigned" placeholder="e.g. Alden"/></div>
      <div class="fg"><label>Repo Reason</label>
        <select id="f-repo_reason"><option value="">— Select —</option><option>Non-Payment</option><option>Cancellation</option><option>Upgrade Swap</option><option>Fault Replacement</option></select>
      </div>
      <div class="fg"><label>Due Date</label><input id="f-due_date" type="date"/></div>
      <div class="fg"><label>Status</label>
        <select id="f-status"><option value="Pending">Pending</option><option value="In Progress">In Progress</option><option value="Retrieved">Retrieved</option></select>
      </div>
      <div class="fg"><label>Device Condition</label>
        <select id="f-device_condition"><option value="Not Yet Assessed">Not Yet Assessed</option><option>Good</option><option>Damaged</option><option>Missing</option></select>
      </div>
      <div class="fg full"><label>Notes</label><textarea id="f-notes" placeholder="Additional notes…"></textarea></div>
    </div>
    <div class="m-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn bb" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<!-- EXPORT -->
<div class="modal-bg" id="exportBg" style="display:none" onclick="if(event.target===this)document.getElementById('exportBg').style.display='none'">
  <div class="exp-box">
    <div class="exp-ttl">Export Data</div>
    <div class="exp-opts">
      <div class="exp-opt" onclick="exportCSV()"><div class="exp-ic">📄</div><div><div class="exp-t">CSV Export</div><div class="exp-s">Visible entries as spreadsheet</div></div></div>
      <div class="exp-opt" onclick="exportPrint()"><div class="exp-ic">🖨️</div><div><div class="exp-t">Print / PDF</div><div class="exp-s">Opens browser print dialog</div></div></div>
    </div>
    <button class="btn" style="width:100%;justify-content:center" onclick="document.getElementById('exportBg').style.display='none'">Close</button>
  </div>
</div>

<script>
const SB_URL = 'https://eiwilltaxbavvskaugdv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpd2lsbHRheGJhdnZza2F1Z2R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTU0MDcsImV4cCI6MjA5MTM3MTQwN30.b-SQ6v9n4nyrj7aInoTUHUcKSTIPC59SRrAC0aV-j60';
const HDR = {'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'};

let allData=[], filteredData=[], editingId=null;

const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
const isOver=r=>r.due_date&&r.status!=='Retrieved'&&new Date(r.due_date)<new Date();
const daysUntil=r=>r.due_date?Math.ceil((new Date(r.due_date)-new Date())/86400000):null;
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString('en-JM',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtDT=iso=>iso?new Date(iso).toLocaleString('en-JM',{dateStyle:'medium',timeStyle:'short'}):'—';

async function sbFetch(path,opts={}){
  const r=await fetch(SB_URL+path,{...opts,headers:{...HDR,...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  return r.headers.get('content-type')?.includes('json')?r.json():[];
}

async function fetchData(){
  allData=await sbFetch('/rest/v1/cpe_repo?order=date_added.desc');
  buildTechFilter();applyFilters();
}

function buildTechFilter(){
  const techs=[...new Set(allData.map(r=>r.technician_assigned).filter(Boolean))];
  const sel=document.getElementById('filterTech');const cur=sel.value;
  sel.innerHTML='<option value="">All Techs</option>'+techs.map(t=>`<option${cur===t?' selected':''}>${esc(t)}</option>`).join('');
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const tech=document.getElementById('filterTech').value;
  const reason=document.getElementById('filterReason').value;
  const status=document.getElementById('filterStatus').value;
  filteredData=allData.filter(r=>{
    const sf=['client_name','serial_number','last_known_ip','account_number','technician_assigned','location_address','ticket_number'];
    if(q&&!sf.some(f=>(r[f]||'').toLowerCase().includes(q)))return false;
    if(tech&&r.technician_assigned!==tech)return false;
    if(reason&&r.repo_reason!==reason)return false;
    if(status&&r.status!==status)return false;
    return true;
  });
  render();
}

function render(){
  const cols=['Pending','In Progress','Retrieved'];
  let over=0;
  filteredData.forEach(r=>{if(isOver(r))over++;});
  document.getElementById('st-total').textContent=filteredData.length;
  cols.forEach(s=>document.getElementById(`st-${s}`).textContent=filteredData.filter(r=>r.status===s).length);
  document.getElementById('st-overdue').textContent=over;
  cols.forEach(status=>{
    const cards=filteredData.filter(r=>r.status===status);
    document.getElementById(`cnt-${status}`).textContent=cards.length;
    const el=document.getElementById(`cards-${status}`);
    el.innerHTML=cards.length===0?'<div class="empty-col">No entries</div>':cards.map(cardHTML).join('');
  });
}

function slaHTML(r){
  if(!r.due_date||!r.date_added)return '';
  const total=(new Date(r.due_date)-new Date(r.date_added))/86400000;
  const elapsed=(new Date()-new Date(r.date_added))/86400000;
  const pct=Math.min(100,Math.max(0,total>0?(elapsed/total)*100:100));
  const days=daysUntil(r);
  const color=pct>=100?'var(--err-text)':pct>=75?'var(--warn-text)':'var(--accent)';
  const lc=pct>=100?'var(--err-text)':pct>=75?'var(--warn-text)':'var(--muted)';
  const lbl=days===null?'':days<0?`${Math.abs(days)}d overdue`:days===0?'Due today':`${days}d left`;
  return `<div class="sla-wrap"><div class="sla-top"><div class="sla-lbl">SLA</div><div class="sla-days" style="color:${lc}">${lbl}</div></div><div class="sla-track"><div class="sla-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function condBadge(c){
  if(!c||c==='Not Yet Assessed')return '';
  const cls=c==='Good'?'b-good':c==='Damaged'?'b-damaged':c==='Missing'?'b-missing':'';
  return cls?`<span class="badge ${cls}">${esc(c)}</span>`:'';
}

function cardHTML(r){
  const over=isOver(r);
  const days=daysUntil(r);
  const nxt=r.status==='Pending'?'In Progress':r.status==='In Progress'?'Retrieved':null;
  const prv=r.status==='Retrieved'?'In Progress':r.status==='In Progress'?'Pending':null;
  return `<div class="card ${r.status}${over?' overdue':''}" onclick="openPanel('${r.id}')">
    <div class="card-top">
      <div><div class="card-name">${esc(r.client_name)}</div>${r.client_contact?`<div class="card-contact">${esc(r.client_contact)}</div>`:''}</div>
      <div class="card-acts" onclick="event.stopPropagation()">
        <button class="ic-btn" onclick="openModal('${r.id}');event.stopPropagation()">✎</button>
        <button class="ic-btn del" onclick="deleteEntry('${r.id}');event.stopPropagation()">✕</button>
      </div>
    </div>
    <div class="badges">
      ${r.repo_reason?`<span class="badge b-reason">${esc(r.repo_reason)}</span>`:''}
      ${over?'<span class="badge b-overdue">OVERDUE</span>':days!==null&&days<=3&&days>=0?`<span class="badge b-soon">DUE ${days===0?'TODAY':`IN ${days}D`}</span>`:''}
      ${condBadge(r.device_condition)}
    </div>
    <div class="card-meta">
      ${r.cpe_model?`<div class="mr"><span class="ml-label">CPE</span><span class="mv">${esc(r.cpe_model)}</span></div>`:''}
      ${r.serial_number?`<div class="mr"><span class="ml-label">Serial</span><span class="mv">${esc(r.serial_number)}</span></div>`:''}
      ${r.technician_assigned?`<div class="mr"><span class="ml-label">Tech</span><span class="mv">${esc(r.technician_assigned)}</span></div>`:''}
      ${r.last_known_ip?`<div class="mr"><span class="ml-label">IP</span><span class="mv">${esc(r.last_known_ip)}</span></div>`:''}
    </div>
    ${r.status!=='Retrieved'?slaHTML(r):''}
    <div class="card-foot" onclick="event.stopPropagation()">
      <div class="card-date">${fmtDate(r.date_added)}</div>
      <div class="mv-btns">
        ${prv?`<button class="mv-btn" onclick="moveCard('${r.id}','${prv}')">← ${prv}</button>`:''}
        ${nxt?`<button class="mv-btn" onclick="moveCard('${r.id}','${nxt}')">${nxt} →</button>`:''}
      </div>
    </div>
  </div>`;
}

async function openPanel(id){
  const r=allData.find(x=>x.id===id);if(!r)return;
  let logs=[];
  try{logs=await sbFetch(`/rest/v1/cpe_repo_activity?cpe_repo_id=eq.${id}&order=changed_at.desc`);}catch(e){}
  document.getElementById('panelContent').innerHTML=panelHTML(r,logs);
  document.getElementById('panelOv').style.display='flex';
}
function closePanel(){document.getElementById('panelOv').style.display='none';}

function panelHTML(r,logs){
  const acts=logs.map((l,i,a)=>`<div class="act-item">${i<a.length-1?'<div class="act-line"></div>':''}<div class="act-dot"></div><div><div class="act-action">${esc(l.action)}</div><div class="act-when">${esc(l.changed_by)} · ${fmtDT(l.changed_at)}</div></div></div>`).join('');
  return `<div class="pnl-hd"><div class="pnl-ttl">CPE Detail</div><button class="close-btn" onclick="closePanel()">✕</button></div>
  <div class="p-sec"><div class="p-sec-ttl">Client</div><div class="dg">
    <div class="di"><div class="dl">Name</div><div class="dv">${esc(r.client_name)||'—'}</div></div>
    <div class="di"><div class="dl">Contact</div><div class="dv">${esc(r.client_contact)||'—'}</div></div>
    <div class="di"><div class="dl">Account</div><div class="dv">${esc(r.account_number)||'—'}</div></div>
    <div class="di"><div class="dl">Ticket</div><div class="dv">${esc(r.ticket_number)||'—'}</div></div>
    <div class="di full"><div class="dl">Address</div><div class="dv">${esc(r.location_address)||'—'}</div></div>
  </div></div>
  <div class="p-sec"><div class="p-sec-ttl">CPE</div><div class="dg">
    <div class="di"><div class="dl">Model</div><div class="dv">${esc(r.cpe_model)||'—'}</div></div>
    <div class="di"><div class="dl">Serial</div><div class="dv">${esc(r.serial_number)||'—'}</div></div>
    <div class="di"><div class="dl">IP</div><div class="dv">${esc(r.last_known_ip)||'—'}</div></div>
    <div class="di"><div class="dl">Site</div><div class="dv">${esc(r.last_known_site)||'—'}</div></div>
    <div class="di"><div class="dl">Condition</div><div class="dv">${esc(r.device_condition)||'—'}</div></div>
    <div class="di"><div class="dl">Reason</div><div class="dv">${esc(r.repo_reason)||'—'}</div></div>
  </div></div>
  <div class="p-sec"><div class="p-sec-ttl">Status & SLA</div><div class="dg">
    <div class="di"><div class="dl">Status</div><div class="dv">${esc(r.status)}</div></div>
    <div class="di"><div class="dl">Tech</div><div class="dv">${esc(r.technician_assigned)||'—'}</div></div>
    <div class="di"><div class="dl">Added</div><div class="dv">${fmtDT(r.date_added)}</div></div>
    <div class="di"><div class="dl">Due Date</div><div class="dv">${r.due_date||'—'}</div></div>
  </div>${r.notes?`<div style="margin-top:9px"><div class="dl">Notes</div><div style="font-size:12px;color:var(--text);margin-top:3px">${esc(r.notes)}</div></div>`:''}</div>
  <div class="p-sec"><div class="p-sec-ttl">Activity Log</div><div>${acts||'<div style="font-size:12px;color:var(--muted)">No activity yet</div>'}</div></div>`;
}

const FLDS=['client_name','client_contact','cpe_model','serial_number','account_number','ticket_number','last_known_ip','last_known_site','location_address','technician_assigned','repo_reason','due_date','status','device_condition','notes'];
function openModal(id){
  editingId=id||null;
  document.getElementById('modalTtl').textContent=id?'Edit CPE Entry':'New CPE Repo Entry';
  if(id){const r=allData.find(x=>x.id===id);if(r)FLDS.forEach(f=>{const el=document.getElementById(`f-${f}`);if(el)el.value=r[f]||'';})}
  else FLDS.forEach(f=>{const el=document.getElementById(`f-${f}`);if(el)el.value=f==='status'?'Pending':f==='device_condition'?'Not Yet Assessed':'';});
  document.getElementById('modalBg').style.display='flex';
}
function closeModal(){document.getElementById('modalBg').style.display='none';editingId=null;}

async function saveEntry(){
  const p={};FLDS.forEach(f=>{const el=document.getElementById(`f-${f}`);if(el)p[f]=el.value||null;});
  if(!p.client_name){showToast('Client Name is required','err');return;}
  try{
    if(editingId){
      const old=allData.find(x=>x.id===editingId);
      await sbFetch(`/rest/v1/cpe_repo?id=eq.${editingId}`,{method:'PATCH',body:JSON.stringify(p)});
      const ch=[];
      if(old?.status!==p.status)ch.push(`Status changed to "${p.status}"`);
      if(old?.technician_assigned!==p.technician_assigned)ch.push(`Tech reassigned to "${p.technician_assigned||'None'}"`);
      if(old?.device_condition!==p.device_condition)ch.push(`Condition updated to "${p.device_condition}"`);
      if(old?.due_date!==p.due_date)ch.push(`Due date updated`);
      if(ch.length===0)ch.push('Entry updated');
      for(const action of ch)await sbFetch('/rest/v1/cpe_repo_activity',{method:'POST',body:JSON.stringify({cpe_repo_id:editingId,action,changed_by:'User'})});
      showToast('Updated ✓','ok');
    }else{
      const res=await sbFetch('/rest/v1/cpe_repo',{method:'POST',body:JSON.stringify(p)});
      const newId=Array.isArray(res)&&res[0]?res[0].id:null;
      if(newId)await sbFetch('/rest/v1/cpe_repo_activity',{method:'POST',body:JSON.stringify({cpe_repo_id:newId,action:'Entry created',changed_by:'User'})});
      showToast('Added ✓','ok');
    }
    closeModal();await fetchData();
  }catch(e){showToast('Error: '+e.message,'err');}
}

async function deleteEntry(id){
  if(!confirm('Delete this CPE entry?'))return;
  await fetch(`${SB_URL}/rest/v1/cpe_repo?id=eq.${id}`,{method:'DELETE',headers:HDR});
  await fetchData();showToast('Deleted','ok');
}

async function moveCard(id,ns){
  const r=allData.find(x=>x.id===id);if(!r)return;
  await sbFetch(`/rest/v1/cpe_repo?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status:ns})});
  await sbFetch('/rest/v1/cpe_repo_activity',{method:'POST',body:JSON.stringify({cpe_repo_id:id,action:`Status moved from "${r.status}" to "${ns}"`,changed_by:'User'})});
  await fetchData();showToast(`→ ${ns}`,'ok');
}

function showExport(){document.getElementById('exportBg').style.display='flex';}
function exportCSV(){
  const cols=['client_name','client_contact','cpe_model','serial_number','account_number','ticket_number','last_known_ip','last_known_site','location_address','technician_assigned','repo_reason','status','device_condition','due_date','date_added','notes'];
  const csv=[cols.join(','),...filteredData.map(r=>cols.map(c=>`"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='netflair_cpe_repo.csv';a.click();
  document.getElementById('exportBg').style.display='none';
}
function exportPrint(){
  const rows=filteredData.map(r=>`<tr><td>${esc(r.client_name)}</td><td>${esc(r.client_contact)}</td><td>${esc(r.cpe_model)}</td><td>${esc(r.serial_number)}</td><td>${esc(r.technician_assigned)}</td><td>${esc(r.repo_reason)}</td><td>${esc(r.status)}</td><td>${esc(r.device_condition)}</td><td>${r.due_date||'—'}</td></tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Netflair CPE Repo</title><style>body{font-family:sans-serif;padding:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:7px 10px;font-size:12px;text-align:left}th{background:#185FA5;color:#fff}</style></head><body><h2 style="margin-bottom:8px">Netflair CPE Repo Report</h2><p style="color:#888;font-size:12px;margin-bottom:14px">${new Date().toLocaleString('en-JM')} · ${filteredData.length} entries</p><table><thead><tr><th>Client</th><th>Contact</th><th>CPE</th><th>Serial</th><th>Tech</th><th>Reason</th><th>Status</th><th>Condition</th><th>Due</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  w.document.close();w.print();
  document.getElementById('exportBg').style.display='none';
}

function showToast(msg,type='ok'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=(type==='ok'?'✓ ':'⚠ ')+msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// Loading indicator on startup
['Pending','In Progress','Retrieved'].forEach(s=>{
  document.getElementById(`cards-${s}`).innerHTML='<div class="empty-col" style="color:var(--muted)">Loading…</div>';
});
fetchData();
</script>
