 class=\"field\"><label>\ud83d\udda5 UISP observed Rx / download (Mbps)</label><input id=\"s3od\" value=\"${state.data.obsDown[2]}\" placeholder=\"\" type=\"number\" step=\"0.1\" /></div>\n        <div class=\"field\"><label>\ud83d\udda5 UISP observed Tx / upload (Mbps)</label><input id=\"s3ou\" value=\"${state.data.obsUp[2]}\" placeholder=\"\" type=\"number\" step=\"0.1\" /></div>\n      </div>\n\n      <div id=\"s-avg\" class=\"speed-avg-box\"><span class=\"muted\">Average will appear here as you fill in the tests</span></div>\n\n      <div class=\"question\">Were the tests on a wired or wireless connection?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"captureSpeed('wired','s')\">\n          <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Wired</div></div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"captureSpeed('wireless','s')\">\n          <span class=\"opt-marker\">B</span><div class=\"opt-body\"><div class=\"opt-title\">Wireless</div></div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `,\n  onMount: () => updateSpeedAverages('s')\n});\n\nfunction captureSpeed(method, prefix) {\n  const downs = [], ups = [], pings = [], obsD = [], obsU = [];\n  for (let i = 1; i <= 3; i++) {\n    downs.push(document.getElementById(`${prefix}${i}d`).value);\n    ups.push(document.getElementById(`${prefix}${i}u`).value);\n    pings.push(document.getElementById(`${prefix}${i}p`).value);\n    obsD.push(document.getElementById(`${prefix}${i}od`)?.value || '');\n    obsU.push(document.getElementById(`${prefix}${i}ou`)?.value || '');\n  }\n  state.data.speedTestsDown = downs;\n  state.data.speedTestsUp = ups;\n  state.data.speedTestsPing = pings;\n  state.data.obsDown = obsD;\n  state.data.obsUp = obsU;\n  state.data.speedTested = method;\n\n  const avgDown = avgSpeed(downs);\n  if (avgDown === null) { alert('Please enter at least one download speed.'); ction afterRetest() {\n  const downs = [], ups = [], pings = [];\n  for (let i = 1; i <= 3; i++) {\n    downs.push(document.getElementById(`r${i}d`).value);\n    ups.push(document.getElementById(`r${i}u`).value);\n    pings.push(document.getElementById(`r${i}p`).value);\n  }\n  state.data.speedTestsDown = downs;\n  state.data.speedTestsUp = ups;\n  state.data.speedTestsPing = pings;\n\n  const avgDown = avgSpeed(downs);\n  if (avgDown === null) { alert('Please enter at least one download speed.'); return; }\n\n  const sp = planSpeed();\n  if (!sp) { goTo('end_escalate'); return; }\n  if (avgDown / sp >= 0.80) goTo('end_resolved');\n  else goTo('end_escalate');\n}\n\n/* ============================================================\n   BRANCH C \u00b7 INTERMITTENT\n   ============================================================ */\nscreens.c_pattern = () => ({\n  crumb: ['Intermittent', 'Pattern'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch C \u00b7 Intermittent</h2>\n      <h1 class=\"screen-title\">Establish the pattern.</h1>\n\n      <div class=\"callout info\">\n        <div class=\"callout-label\">Ask the customer</div>\n        <div class=\"callout-body\">\n          <ul>\n            <li>How often does it happen \u2014 every few minutes, every few hours, only at certain times?</li>\n            ${isLitebeam() ? '<li>Does it happen more during rain, wind, or hot afternoons?</li>' : ''}\n            <li>Does it drop on WiFi only, or also on a wired connection?</li>\n            <li>Have you had any power flickers or surges recently?</li>\n            ${isFiber() ? '<li>Has any work been done at the property \u2014 landscaping, fence repair, tree trimming? (Drop cable damage)</li>' : ''}\n          </ul>\n        </div>\n      </div>\n\n      ${isLitebeam() ? `\n        <div class=\"question\">Drops correlate with weather (rain / wind)?</div>\n        <div class=\"options\">\n          <button class=\"opt "section-h ${isFiber() ? 'fiber' : ''}\">Branch C \u00b7 After Power Cycle</h2>\n      <h1 class=\"screen-title\">Set the watch-and-callback expectation.</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"I've reset the equipment from our end. Please use the connection normally for the next 30 to 60 minutes. If it drops again, call us back and we'll send a technician \u2014 we'll have your case notes already on file.\"</div>\n      </div>\n\n      <div class=\"callout info\">\n        <div class=\"callout-label\">Log the call</div>\n        <div class=\"callout-body\">Tag the ticket as <strong>Intermittent \u00b7 First call \u00b7 Power cycled \u00b7 Customer to monitor</strong>. If they call back within 7 days, the next CSR escalates immediately.</div>\n      </div>\n\n      <button class=\"primary-btn success\" onclick=\"goTo('end_resolved')\">Mark as resolved (with watch period) \u2192</button>\n      ${footerNav()}\n    </div>\n  `\n});\n\n/* ============================================================\n   BRANCH D \u00b7 WIFI-ONLY\n   ============================================================ */\nscreens.d_subissue = () => ({\n  crumb: ['WiFi', 'Sub-issue'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch D \u00b7 WiFi-Specific</h2>\n      <h1 class=\"screen-title\">Which WiFi issue is it?</h1>\n      <p class=\"screen-sub\">${cpeLabel()} side and wired test confirm the line is fine. The problem is WiFi-side.</p>\n\n      ${isAircube() ? `\n        <div class=\"callout fiber-info\">\n          <div class=\"callout-label\">AirCube \u2014 try a remote reboot first</div>\n          <div class=\"callout-body\">In UISP, reboot the AirCube before walking the customer through anything. Often clears WiFi-side glitches in under two minutes.</div>\n        </div>\n      ` : ''}\n\n      <div class=\"options\">\n        <button class=\"opt\" onclick=\"setWifiSub('cant_connect')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Can't connect to WiFi at all</div>\n            <div class=\"opt-desc\">Wrong password, network not visible, etc.</div>\n          </div>\n        </button>\n        <button class=\"opt\" onclick=\"setWifiSub('some_devices')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Some devices connect, others don't</div></div>\n        </button>\n        <button class=\"opt\" onclick=\"setWifiSub('range')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">WiFi range is poor</div>\n            <div class=\"opt-desc\">Works close to ${routerLabel()}, weak in other rooms</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction setWifiSub(v) {\n  state.data.wifiSubIssue = v;\n  if (v === 'cant_connect') goTo('d_cant_connect');\n  else if (v === 'some_devices') goTo('d_some_devices');\n  else goTo('d_range');\n}\n\nscreens.d_cant_connect = () => ({\n  crumb: ['WiFi', \"Can't connect\"],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch D \u00b7 Can't connect</h2>\n      <h1 class=\"screen-title\">Walk through the connection troubleshooting.</h1>\n\n      <ol class=\"steps-list\">\n        <li>Confirm they're selecting the correct network name (SSID). Some routers broadcast two \u2014 a 2.4G and a 5G.</li>\n        <li>Confirm the WiFi password. ${isAircube() ? 'For AirCube ISP \u2014 confirm SSID/password from UISP if not at default.' : 'The default is usually printed on the bottom of the router.'}</li>\n        <li>Have them tap \"Forget\" the network on their device, then re-enter the password.</li>\n        ${isAircube()\n          ? '<li>If still failing, try a remote reboot in UISP \u2014 Actions \u2192 Restart. Wait 90 seconds.</li>'\n          : '<li>If still failing, factory reset the router \u2014 hold the reset button for 10 seconds. <strong>Warn the customer this erases custom settings.</strong></li>'}\n      </ol>\n\n      ${resolveOrEscalate()}\n    </div>\n  `\n});\n\nscreens.d_some_devices = () => ({\n  crumb: ['WiFi', 'Some devices'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch D \u00b7 Some devices fail</h2>\n      <h1 class=\"screen-title\">Isolate the problem device or band.</h1>\n\n      <ol class=\"steps-list\">\n        <li>Reboot the failing device.</li>\n        <li>Check whether the device is too old to support the 5G network \u2014 if so, connect to the 2.4G one instead.</li>\n        <li>Check the connected-device count on the ${routerLabel()}. ${isAircube() ? 'View this in UISP under the AirCube\\'s clients tab.' : 'Cheap routers struggle past 15\u201320 devices.'}</li>\n        <li>Forget the network on the device and reconnect.</li>\n      </ol>\n\n      ${resolveOrEscalate()}\n    </div>\n  `\n});\n\nscreens.d_range = () => ({\n  crumb: ['WiFi', 'Range'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch D \u00b7 Range</h2>\n      <h1 class=\"screen-title\">Recommend placement and extension.</h1>\n\n      <ol class=\"steps-list\">\n        <li>Suggest moving the ${routerLabel()} to a central, elevated location.</li>\n        <li>Keep it away from microwaves, cordless phone bases, and large metal objects.</li>\n        ${isAircube() ? '<li>AirCube ISP is single-radio (2.4 GHz on the base model) \u2014 for large homes, an AirCube AC LR or mesh extender is a known limit. Note as upsell.</li>' : '<li>If the home is large or has thick walls, recommend a mesh extender \u2014 note as an upsell opportunity.</li>'}\n      </ol>\n\n      ${resolveOrEscalate()}\n    </div>\n  `\n});\n\nfunction resolveOrEscalate() {\n  return `\n    <div class=\"question\" style=\"margin-top:18px\">Did this resolve the issue?</div>\n    <div class=\"options\">\n      <button class=\"opt success-hint\" onclick=\"goTo('end_resolved')\">\n        <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 issue resolved</div></div>\n      </button>\n      <button class=\"opt danger-hint\" onclick=\"goTo('end_escalate')\">\n        <span class=\"opt-marker\">B</span>\n        <div class=\"opt-body\">\n          <div class=\"opt-title\">No \u2014 escalate</div>\n          <div class=\"opt-desc\">Possibly a faulty ${routerLabel()} \u2014 ATS may need to swap it</div>\n        </div>\n      </button>\n    </div>\n    ${footerNav()}\n  `;\n}\n\n/* ============================================================\n   END SCREENS\n   ============================================================ */\nscreens.end_suspended = () => ({\n  crumb: ['Account suspended'],\n  html: `\n    <div class=\"card\">\n      <div class=\"verdict\">\n        <div class=\"verdict-icon suspended\">$</div>\n        <h1>Account is suspended.</h1>\n        <p class=\"verdict-sub\">Do not run further troubleshooting until the account is active.</p>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"I see your account is currently showing a balance that has resulted in a service interruption. Once payment is processed and applied, service is typically restored within [timeframe]. Would you like the payment options?\"</div>\n      </div>\n      <div class=\"callout info\">\n        <div class=\"callout-label\">CRM logging</div>\n        <div class=\"callout-body\">Tag the call as <strong>Suspended \u00b7 Payment info shared</strong> and note any payment commitment from the customer.</div>\n      </div>\n      ${notesField()}\n      ${ticketBlock('Resolution log \u2014 copy into CRM')}\n      <div class=\"end-actions\" style=\"margin-top: 22px;\">\n        <button class=\"primary-btn\" onclick=\"restart()\">\u21bb New Call</button>\n      </div>\n    </div>\n  `,\n  beforeLeave: captureNotes,\n  onMount: () => fillTicket('suspended')\n});\n\nscreens.end_outage = () => ({\n  crumb: ['Known outage'],\n  html: `\n    <div class=\"card\">\n      <div class=\"verdict\">\n        <div class=\"verdict-icon outage\">!</div>\n        <h1>Known outage in the customer's area.</h1>\n        <p class=\"verdict-sub\">Log this call against the existing outage ticket.</p>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"There is currently a service interruption affecting your area. Our team is already working on it, and the estimated restoration time is [time]. I will log your call so you receive an update once service is restored. Is there anything else I can assist you with?\"</div>\n      </div>\n      ${notesField()}\n      ${ticketBlock('Resolution log \u2014 copy into CRM')}\n      <div class=\"end-actions\" style=\"margin-top: 22px;\">\n        <button class=\"primary-btn\" onclick=\"restart()\">\u21bb New Call</button>\n      </div>\n    </div>\n  `,\n  beforeLeave: captureNotes,\n  onMount: () => fillTicket('outage')\n});\n\nscreens.end_resolved = () => ({\n  crumb: ['Resolved'],\n  html: `\n    <div class=\"card\">\n      <div class=\"verdict\">\n        <div class=\"verdict-icon resolved\">\u2713</div>\n        <h1>Resolved on the call.</h1>\n        <p class=\"verdict-sub\">Wrap up and log the resolution.</p>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"Glad we got that sorted. I've made a note on your account about what we did today. Is there anything else I can help you with?\"</div>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Then</div>\n        <div class=\"say-text\">\"Thank you for choosing ATS Netflair. Have a great day.\"</div>\n      </div>\n      <div class=\"checklist\">\n        <h3>CRM logging checklist:</h3>\n        <label class=\"check-item\"><input type=\"checkbox\" /><span>Set call category (No Service / Slow / Intermittent / WiFi)</span></label>\n        <label class=\"check-item\"><input type=\"checkbox\" /><span>Note the steps walked through</span></label>\n        <label class=\"check-item\"><input type=\"checkbox\" /><span>Capture UISP readings, speed test, LED status, time issue started</span></label>\n        <label class=\"check-item\"><input type=\"checkbox\" /><span>Mark resolved on the call</span></label>\n      </div>\n      ${ticketBlock('Resolution log \u2014 copy into CRM')}\n      ${notesField()}\n      <div class=\"end-actions\" style=\"margin-top: 22px;\">\n        <button class=\"primary-btn success\" id=\"save-log-btn\" onclick=\"saveCallLog('resolved')\">\ud83d\udcbe Save to Call Log</button>\n        <button class=\"primary-btn\" style=\"background:var(--surface2);color:var(--text);border:1px solid var(--border)\" onclick=\"restart()\">\u21bb Take next call</button>\n      </div>\n    </div>\n  `,\n  beforeLeave: captureNotes,\n  onMount: () => fillTicket('resolved')\n});\n\nscreens.end_escalate = () => ({\n  crumb: ['Escalated to technician'],\n  html: `\n    <div class=\"card\">\n      <div class=\"verdict\">\n        <div class=\"verdict-icon escalate\">\u26a0</div>\n        <h1>Escalate \u2014 schedule a technician.</h1>\n        <p class=\"verdict-sub\">Stop troubleshooting. Book the visit and copy the ticket details below.</p>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"Based on what we've checked, this needs an on-site visit by one of our technicians. The next available slot is [date and time]. Will someone 18 or older be at the property to grant access?\"</div>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Confirm</div>\n        <div class=\"say-text\">\"They'll call before arriving. Please make sure there is access to the ${routerLabel()} and the power outlet for the ${isFiber() ? 'fiber box' : 'PoE injector'}. If you need to reschedule, please call us back as early as possible.\"</div>\n      </div>\n      <div class=\"callout warn\">\n        <div class=\"callout-label\">Reminder</div>\n        <div class=\"callout-body\">Acknowledge frustration once: <em>\"I completely understand how frustrating this is, and I'm sorry for the inconvenience. Let me get this on the priority list.\"</em> Don't argue, don't over-promise.</div>\n      </div>\n      ${notesField()}\n      ${ticketBlock('Technician ticket \u2014 copy into ticketing system')}\n      <div class=\"end-actions\" style=\"margin-top: 22px;\">\n        <button class=\"primary-btn\" id=\"save-log-btn\" onclick=\"saveCallLog('escalated')\">\ud83d\udcbe Save to Call Log</button>\n        <button class=\"primary-btn\" style=\"background:var(--surface2);color:var(--text);border:1px solid var(--border)\" onclick=\"restart()\">\u21bb Take next call</button>\n      </div>\n    </div>\n  `,\n  beforeLeave: captureNotes,\n  onMount: () => fillTicket('escalate')\n});\n\n/* ============================================================\n   CALL LOG \u2014 Save to Supabase\n   ============================================================ */\nconst SB_URL = 'https://eiwilltaxbavvskaugdv.supabase.co';\nconst SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpd2lsbHRheGJhdnZza2F1Z2R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTU0MDcsImV4cCI6MjA5MTM3MTQwN30.b-SQ6v9n4nyrj7aInoTUHUcKSTIPC59SRrAC0aV-j60';\n\nasync function saveCallLog(outcome) {\n  const btn = document.getElementById('save-log-btn');\n  if (btn) { btn.disabled = true; btn.textContent = 'Saving\u2026'; }\n\n  // Capture latest notes + ticket text\n  captureNotes();\n  const ticketEl = document.getElementById('ticket-text');\n  const ticketText = ticketEl ? ticketEl.value : '';\n  const d = state.data;\n\n  const payload = {\n    csr_name:        window.__csrName || 'Unknown CSR',\n    customer_name:   d.customerName   || null,\n    customer_phone:  d.contactNumber  || null,\n    connection_type: d.connectionType || null,\n    service_plan:    d.servicePlan    || null,\n\n    // LiteBeam UISP\n    uisp_signal:    d.uispSignal      || null,\n    uisp_rx_cap:    d.uispRxCapacity  || null,\n    uisp_tx_cap:    d.uispTxCapacity  || null,\n    uisp_last_seen: d.uispLastSeen    || null,\n    uisp_status:    d.uispOnline      || null,\n\n    // Fiber UISP\n    uisp_rx_power:  d.uispRxPower     || null,\n    uisp_tx_power:  d.uispTxPower     || null,\n    uisp_distance:  d.uispDistance    || null,\n\n    // Speed tests\n    speed_down: d.speedTestsDown || [],\n    speed_up:   d.speedTestsUp   || [],\n    speed_ping: d.speedTestsPing || [],\n    obs_down:   d.obsDown        || [],\n    obs_up:     d.obsUp          || [],\n\n    // Outcome\n    outcome:         outcome,\n    issue_type:      d.issueType       || null,\n    resolution_note: d.notes           || null,\n    ticket_text:     ticketText        || null,\n\n    // Full raw state for detail view\n    raw_data: d,\n  };\n\n  try {\n    const resp = await fetch(`${SB_URL}/rest/v1/call_logs`, {\n      method: 'POST',\n      headers: {\n        'apikey': SB_KEY,\n        'Authorization': `Bearer ${SB_KEY}`,\n        'Content-Type': 'application/json',\n        'Prefer': 'return=minimal',\n      },\n      body: JSON.stringify(payload),\n    });\n\n    if (resp.ok) {\n      if (btn) { btn.textContent = '\u2713 Saved'; btn.style.background = '#059669'; }\n      // Show restart button prominently\n      const restartBtn = document.createElement('button');\n      restartBtn.className = 'primary-btn';\n      restartBtn.style.cssText = 'background:var(--surface2);color:var(--text);border:1px solid var(--border);margin-top:8px';\n      restartBtn.textContent = '\u21bb Take next call';\n      restartBtn.onclick = restart;\n      btn.parentNode.appendChild(restartBtn);\n    } else {\n      const err = await resp.text();\n      if (btn) { btn.disabled = false; btn.textContent = '\ud83d\udcbe Save to Call Log'; }\n      alert('Save failed: ' + err);\n    }\n  } catch (e) {\n    if (btn) { btn.disabled = false; btn.textContent = '\ud83d\udcbe Save to Call Log'; }\n    alert('Save error: ' + e.message);\n  }\n}\n\n/* ============================================================\n   SHARED HELPERS\n   ============================================================ */\nfunction notesField() {\n  return `\n    <div class=\"notes-box\">\n      <label for=\"notes-input\">CSR notes (optional \u2014 included in the ticket / log)</label>\n      <textarea id=\"notes-input\" placeholder=\"Anything else worth noting...\">${state.data.notes || ''}</textarea>\n    </div>\n  `;\n}\nfunction captureNotes() {\n  const n = document.getElementById('notes-input');\n  if (n) state.data.notes = n.value;\n}\n\nfunction ticketBlock(title) {\n  return `\n    <div class=\"ticket-block\">\n      <h3>\n        <span>${title}</span>\n        <button class=\"copy-btn\" id=\"copy-ticket-btn\" onclick=\"copyTicket()\">Copy</button>\n      </h3>\n      <textarea class=\"ticket-text\" id=\"ticket-text\" readonly></textarea>\n    </div>\n  `;\n}\n\nfunction fillTicket(kind) {\n  const d = state.data;\n  const today = new Date().toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });\n  const lines = [];\n\n  lines.push(kind === 'escalate' ? '== TECHNICIAN TICKET ==' : '== CALL RESOLUTION LOG ==');\n  lines.push(`Date/time: ${today}`);\n  lines.push('');\n  lines.push('-- ACCOUNT --');\n  lines.push(`Customer: ${d.customerName || '(not captured)'}`);\n  lines.push(`Account #: ${d.accountNumber || '(not captured)'}`);\n  lines.push(`Address: ${d.serviceAddress || '(not captured)'}`);\n  lines.push(`Contact: ${d.contactNumber || '(not captured)'}`);\n  lines.push(`Plan: ${planLabel() || '(not captured)'}`);\n  lines.push(`CPE: ${cpeLabel()}`);\n  lines.push(`Indoor router: ${routerLabel()}`);\n  if (needsWiringConfig() && state.data.poePassthrough) {\n    lines.push(`Power wiring: ${isPassthrough() ? 'PoE pass-through (single chain \u00b7 PoE \u2192 AirCube \u2192 ' + (isFiber() ? 'Loco' : 'LiteBeam') + ')' : 'Standard (separate PoE and AirCube power)'}`);\n  }\n  lines.push('');\n\n  // Skip the troubleshooting sections for suspended / outage dispositions \u2014\n  // CSR didn't run any of them, so the ticket stays compact.\n  if (kind !== 'suspended' && kind !== 'outage') {\n    lines.push('-- ISSUE --');\n    const issueLabel = {\n      no_internet: 'No internet at all',\n      slow: 'Slow internet',\n      intermittent: 'Intermittent / drops out',\n      wifi_only: 'WiFi-specific issue'\n    }[d.issueType] || '(not selected)';\n    lines.push(`Type: ${issueLabel}`);\n    if (d.wifiSubIssue) {\n      const sub = { cant_connect: \"Can't connect to WiFi\", some_devices: 'Some devices fail', range: 'Poor range' }[d.wifiSubIssue];\n      lines.push(`WiFi sub-issue: ${sub}`);\n    }\n    if (d.weatherCorrelated) lines.push(`${isLitebeam() ? 'Weather correlation' : 'UISP optical pattern'}: ${d.weatherCorrelated}`);\n    if (d.repeatCall) lines.push(`Repeat call within 7 days: ${d.repeatCall}`);\n    lines.push('');\n\n    lines.push('-- UISP READINGS --');\n    lines.push(`Status: ${d.uispOnline || '(not checked)'}`);\n    if (isFiber()) {\n      if (d.uispRxPower) lines.push(`RX optical: ${d.uispRxPower} dBm`);\n      if (d.uispTxPower) lines.push(`TX optical: ${d.uispTxPower} dBm`);\n      if (d.uispDistance) lines.push(`Distance to OLT: ${d.uispDistance} m`);\n    } else {\n      if (d.uispSignal) lines.push(`Signal: ${d.uispSignal} dBm`);\n      if (d.uispRxCapacity) lines.push(`Rx capacity: ${d.uispRxCapacity} Mbps`);\n      if (d.uispTxCapacity) lines.push(`Tx capacity: ${d.uispTxCapacity} Mbps`);\n\n    }\n    if (d.uispLastSeen) lines.push(`Last seen: ${d.uispLastSeen}`);\n    lines.push('');\n\n    lines.push('-- DEVICE LEDS --');\n    if (isFiber()) {\n      lines.push(`Loco PWR: ${d.ledPower || '(not checked)'}`);\n      lines.push(`Loco LOS: ${d.ledLos || '(not checked)'}`);\n      lines.push(`Loco PON: ${d.ledData || '(not checked)'}`);\n    } else {\n      lines.push(`PoE LED:  ${d.ledPower || '(not checked)'}`);\n    }\n    lines.push(`${routerLabel()} WAN LED: ${d.ledRouterWan || '(not checked)'}`);\n    lines.push('');\n\n    lines.push('-- STEPS TAKEN --');\n    if (d.aircubeRemoteAction) lines.push(`AirCube remote action: ${d.aircubeRemoteAction}`);\n    if (d.powerCycleAttempted) lines.push(`Power cycle: yes (result: ${d.powerCycleResult || 'unknown'})`);\n    if (d.wiredTestResult) lines.push(`Wired test: ${d.wiredTestResult}`);\n    const downs = d.speedTestsDown || [];\n    const ups = d.speedTestsUp || [];\n    const pings = d.speedTestsPing || [];\n    if (downs.some(v => v !== '' && v !== null && v !== undefined) || pings.some(v => v !== '' && v !== null && v !== undefined)) {\n      const avgD = avgSpeed(downs);\n      const avgU = avgSpeed(ups);\n      const avgP = avgSpeed(pings);\n      const sp = planSpeed();\n      const ratio = (sp && avgD) ? ` (${((avgD / sp) * 100).toFixed(0)}% of plan)` : '';\n      lines.push(`Speed tests (${d.speedTested || 'method?'}):`);\n      for (let i = 0; i < 3; i++) {\n        const dv = (downs[i] === '' || downs[i] == null) ? '\u2014' : downs[i];\n        const uv = (ups[i] === '' || ups[i] == null) ? '\u2014' : ups[i];\n        const pv = (pings[i] === '' || pings[i] == null) ? '\u2014' : pings[i];\n        const od = (d.obsDown?.[i] === '' || d.obsDown?.[i] == null) ? null : d.obsDown[i];\n        const ou = (d.obsUp?.[i] === '' || d.obsUp?.[i] == null) ? null : d.obsUp[i];\n        const obsNote = (od || ou) ? ` | UISP observed: ${od||'\u2014'} Mbps Rx / ${ou||'\u2014'} Mbps Tx` : '';\n        lines.push(`  Test ${i + 1}: ${dv} Mbps down / ${uv} Mbps up / ${pv} ms ping${obsNote}`);\n      }\n      lines.push(`  Average: ${avgD ? avgD.toFixed(1) : '\u2014'} Mbps down / ${avgU ? avgU.toFixed(1) : '\u2014'} Mbps up / ${avgP ? avgP.toFixed(0) : '\u2014'} ms ping${ratio}`);\n    }\n    lines.push('');\n  }\n\n  // Disposition \u2014 always present\n  if (kind === 'escalate') {\n    lines.push('-- TECHNICIAN ACTION --');\n    lines.push(`Disposition: Escalated to field technician`);\n    lines.push(`Best contact window: ___________`);\n    lines.push(`Access notes (gate, dog, etc): ___________`);\n  } else if (kind === 'suspended') {\n    lines.push('-- DISPOSITION --');\n    lines.push(`Account suspended / past due.`);\n    lines.push(`Payment options shared with customer. No troubleshooting performed.`);\n  } else if (kind === 'outage') {\n    lines.push('-- DISPOSITION --');\n    lines.push(`Known area outage \u2014 customer notified of restoration estimate.`);\n    lines.push(`Logged against the outage ticket. No troubleshooting performed.`);\n  } else {\n    lines.push('-- DISPOSITION --');\n    lines.push(`Resolved on call by CSR.`);\n  }\n\n  if (d.notes) {\n    lines.push('');\n    lines.push('-- CSR NOTES --');\n    lines.push(d.notes);\n  }\n\n  const t = document.getElementById('ticket-text');\n  if (t) t.value = lines.join('\\n');\n}\n\nfunction ticketKind() {\n  return {\n    end_escalate: 'escalate',\n    end_resolved: 'resolved',\n    end_suspended: 'suspended',\n    end_outage: 'outage'\n  }[state.screen] || 'resolved';\n}\n\nfunction copyTicket() {\n  fillTicket(ticketKind());\n  const t = document.getElementById('ticket-text');\n  if (!t) return;\n  t.select();\n  document.execCommand('copy');\n  const btn = document.getElementById('copy-ticket-btn');\n  btn.textContent = 'Copied \u2713';\n  btn.classList.add('copied');\n  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);\n}\n\nfunction updateUispWarning() {\n  const warn = document.getElementById('uisp-warn');\n  if (!warn) return;\n  const sig   = parseFloat(document.getElementById('u-sig')?.value);\n  const rxCap = parseFloat(document.getElementById('u-rx-cap')?.value);\n  const txCap = parseFloat(document.getElementById('u-tx-cap')?.value);\n  const msgs = [];\n  if (!isNaN(sig)   && sig   <= -78) msgs.push(`\u26a0 Signal ${sig} dBm \u2014 below -78 dBm threshold, technician required`);\n  if (!isNaN(rxCap) && rxCap <  45)  msgs.push(`\u26a0 Rx capacity ${rxCap} Mbps \u2014 below 45 Mbps minimum`);\n  if (!isNaN(txCap) && txCap <  45)  msgs.push(`\u26a0 Tx capacity ${txCap} Mbps \u2014 below 45 Mbps minimum`);\n  if (msgs.length) {\n    warn.style.display = '';\n    warn.innerHTML = `<div class=\"callout danger\" style=\"margin-top:12px\"><div class=\"callout-label\">Escalate \u2014 readings out of spec</div><div class=\"callout-body\">${msgs.join('<br>')}</div></div>`;\n  } else {\n    warn.style.display = 'none';\n  }\n}\n\nfunction footerNav() {\n  return `\n    <div class=\"footer-nav\">\n      <button class=\"back-btn\" onclick=\"goBack()\" ${state.history.length === 0 ? 'disabled' : ''}>\u2190 Back</button>\n      <span class=\"small-print\">Step ${state.history.length + 1}</span>\n    </div>\n  `;\n}\n\n/* ============================================================\n   RENDER\n   ============================================================ */\nfunction updateHeaderPills() {\n  const cpePill = document.getElementById('cpe-pill');\n  const planPill = document.getElementById('plan-pill');\n  if (state.data.cpe) {\n    cpePill.style.display = '';\n    const wiringSuffix = isPassthrough() ? ' \u00b7 pass-through' : '';\n    cpePill.textContent = `${cpeLabel()} + ${routerLabel() || '?'}${wiringSuffix}`;\n    cpePill.classList.toggle('fiber', isFiber());\n  } else {\n    cpePill.style.display = 'none';\n  }\n  if (state.data.planId) {\n    planPill.style.display = '';\n    planPill.textContent = planLabel();\n  } else {\n    planPill.style.display = 'none';\n  }\n}\n\nfunction render() {\n  const screenFn = screens[state.screen];\n  if (!screenFn) {\n    document.getElementById('app').innerHTML = `<div class=\"card\"><h1>Screen not found: ${state.screen}</h1></div>`;\n    return;\n  }\n  const screen = screenFn();\n  state._currentBeforeLeave = screen.beforeLeave || null;\n\n  const crumbBar = document.getElementById('crumb-bar');\n  if (screen.crumb && screen.crumb.length) {\n    crumbBar.innerHTML = screen.crumb.map((c, i) =>\n      `<span class=\"${i === screen.crumb.length - 1 ? 'step' : ''}\">${c}</span>${i < screen.crumb.length - 1 ? '<span class=\"sep\">\u203a</span>' : ''}`\n    ).join('');\n  } else {\n    crumbBar.innerHTML = '';\n  }\n\n  document.getElementById('app').innerHTML = screen.html;\n  updateHeaderPills();\n  if (screen.onMount) screen.onMount();\n}\n\ndocument.getElementById('restart-btn').addEventListener('click', restart);\nrender();\n<\/script>\n</body>\n</html>\n";
  const blob = new Blob([html], {type: 'text/html'});

      :'https://cdn.ecomm.ui.com/products/3525fe19-1b9a-42bb-8db8-62057aedd6db/df486e71-c24c-4c50-a72d-959e253a85f3.png';

function aInventory(){
  if(!C.inventory){loadInventory().then(()=>render());return'<div class="loading-page"><div class="spinner"></div><div class="muted">Loading inventory...</div></div>';}
  const inv=C.inventory||[];
  const filtered=inv.filter(i=>{
    const mf=_invFilter==='all'||i.status===_invFilter||i.item_type===_invFilter;
    const ms=!_invSearch||[i.model,i.brand,i.serial_number,i.client_name,i.assigned_to,i.location].some(v=>v&&v.toLowerCase().includes(_invSearch.toLowerCase()));
    return mf&&ms;
  });
  const total=inv.length,inStock=inv.filter(i=>i.status==='in_stock').length,deployed=inv.filter(i=>i.status==='deployed').length,faulty=inv.filter(i=>i.condition==='faulty').length;

  // If a group is expanded, show individual serial rows for that group
  const expandedKey = S.invExpanded || null;

  // Group by item_type + brand + model
  const groups = {};
  for (const i of filtered) {
    const k = (i.item_type||'') + '||' + (i.brand||'') + '||' + (i.model||'');
    if (!groups[k]) groups[k] = { item_type: i.item_type, brand: i.brand, model: i.model, items: [] };
    groups[k].items.push(i);
  }

  const groupRows = Object.entries(groups).map(([k, g]) => {
    const qty       = g.items.length;
    const inStockN  = g.items.filter(i=>i.status==='in_stock').length;
    const deployedN = g.items.filter(i=>i.status==='deployed').length;
    const faultyN   = g.items.filter(i=>i.condition==='faulty').length;
    const isOpen    = expandedKey === k;
    const threshold = g.items.find(i=>i.low_stock_threshold!=null)?.low_stock_threshold??null;
    const isLow     = threshold!==null && inStockN<=threshold;

    const isHardware = g.item_type === 'hardware' || g.item_type === 'cable' || g.item_type === 'tools';
    const groupRow = `<tr style="${!isHardware?'cursor:pointer;':''}${isOpen?'background:var(--accent-light)':isLow?'background:#fef2f2':''}" ${isHardware?'':`onclick="S.invExpanded=${isOpen?'null':`'${k.replace(/'/g,"\\'")}'`};render()"`}>
      <td><span class="badge" style="background:${isHardware?'#7c3aed22':'var(--surface2)'};color:${isHardware?'#a78bfa':'var(--text)'};font-size:11px">${g.item_type||'—'}</span></td>
      <td><div class="row" style="gap:10px;align-items:center">${invIcon(g.item_type,g.brand,g.model)}<div><div style="font-weight:700">${g.brand||''}${g.model?' '+g.model:''}${isLow?' <span style="color:#ef4444;font-size:11px">⚠ Low stock</span>':''}</div></div></div></td>
      <td style="font-size:13px;font-weight:700;color:${isLow?'#ef4444':'var(--accent)'}">${qty} unit${qty!==1?'s':''}${threshold!==null?` <span style="font-size:11px;font-weight:400;color:var(--muted)">(min ${threshold})</span>`:''}</td>
      <td><div class="row" style="gap:6px">
        ${inStockN?`<span class="badge bfin" style="font-size:11px">${inStockN} in stock</span>`:''}
        ${deployedN?`<span class="badge bt" style="font-size:11px">${deployedN} deployed</span>`:''}
        ${faultyN?`<span class="badge" style="background:#fee2e2;color:#991b1b;font-size:11px">${faultyN} faulty</span>`:''}
      </div></td>
      <td><div class="row" style="gap:4px">
        ${isHardware?`<button class="btn bsm" onclick="event.stopPropagation();invEdit('${g.items[0]?.id||''}')">Edit</button>`:''} 
        ${isHardware?`<button class="btn bsm" style="color:var(--accent);border-color:var(--accent)" onclick="event.stopPropagation();invSetQty('${k}',${qty})">Set qty</button>`:''}
        ${isHardware&&g.items.some(i=>i.status==='in_stock')?`<button class="btn bsm" style="color:var(--ok-text);border-color:var(--ok-bdr)" onclick="event.stopPropagation();invIssueGroup('${k}')">Deploy</button>`:''}
        <button class="btn bsm" style="font-size:11px" onclick="event.stopPropagation();invSetThreshold('${k}','${g.items[0]?.id||''}',${threshold??'null'})">${threshold!==null?'Edit min':'Set min'}</button>
      </div></td>
      <td style="text-align:right;color:var(--muted);font-size:18px;padding-right:12px">${isHardware?'':isOpen?'▲':'▼'}</td>
    </tr>`;

    const detailRows = (!isHardware && isOpen) ? g.items.map(i=>{
      const isDeployed = i.status === 'deployed';
      return `<tr style="background:var(--surface2);${isDeployed?'cursor:pointer;':''}" ${isDeployed?`onclick="event.stopPropagation();invViewDevice('${i.id}')"`:''}">
      <td style="padding-left:24px;font-size:12px;color:var(--muted)">#${i.id.slice(0,6)}</td>
      <td style="font-family:monospace;font-size:12px">${i.serial_number||'—'}</td>
      <td><span class="badge ${i.status==='in_stock'?'bfin':i.status==='deployed'?'bt':'blun'}" style="font-size:11px">${i.status.replace('_',' ')}</span></td>
      <td><span class="badge" style="background:${i.condition==='faulty'?'#fee2e2':i.condition==='new'?'#d1fae5':'var(--surface2)'};color:${i.condition==='faulty'?'#991b1b':i.condition==='new'?'#065f46':'var(--muted)'};font-size:11px">${i.condition}</span></td>
      <td style="font-size:13px">${i.client_name||i.assigned_to||'—'}</td>
      <td style="font-size:13px">${i.location||'—'}</td>
      <td><div class="row" style="gap:4px" onclick="event.stopPropagation()">
        ${i.status==='in_stock'?`<button class="btn bsm" style="color:var(--ok-text);border-color:var(--ok-bdr)" onclick="invIssue('${i.id}')">Deploy</button>`:''}
        ${isDeployed?`<button class="btn bsm" style="color:#f59e0b;border-color:#fcd34d" onclick="invReturn('${i.id}')">Return</button>`:''}
        ${isDeployed
          ? `<button class="btn bsm" style="color:var(--muted);border-color:var(--border);cursor:not-allowed;opacity:.45" title="Cannot edit while deployed — return the device first" disabled>Edit</button>`
          : `<button class="btn bsm" onclick="invEdit('${i.id}')">Edit</button>`}
        <button class="btn bsm" style="color:#ef4444;border-color:#fca5a5" onclick="invDel('${i.id}')">Del</button>
      </div></td>
    </tr>`;
    }).join('') : '';

    return groupRow + detailRows;
  }).join('');

  return `<div class="btw" style="margin-bottom:16px">
    <div><div class="ph">Inventory</div><div class="ps">CPE &middot; Routers &middot; Equipment tracking</div></div>
    <button class="btn bb" onclick="invNew()">+ Add Item</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px">
    <div class="sc" style="cursor:pointer;grid-column:1/3;background:${_invFilter==='in_stock'?'var(--ok-bg)':'var(--surface)'};border:2px solid ${_invFilter==='in_stock'?'var(--ok-bdr)':'transparent'};transition:all .15s" onclick="_invFilter='in_stock';S.invExpanded=null;render()">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:36px;font-weight:900;color:var(--ok-text);line-height:1">${inStock}</div>
          <div style="font-size:13px;font-weight:600;color:var(--ok-text);margin-top:6px">In stock</div>
          <div class="muted" style="font-size:11px;margin-top:2px">of ${total} total items</div>
        </div>
        <div style="font-size:40px;opacity:.15">📦</div>
      </div>
    </div>
    <div class="sc" style="cursor:pointer;border:2px solid ${_invFilter==='all'?'var(--accent)':'transparent'};transition:all .15s" onclick="_invFilter='all';S.invExpanded=null;render()">
      <div style="font-size:24px;font-weight:800">${total}</div>
      <div class="muted" style="font-size:12px;margin-top:4px">All items</div>
    </div>
    <div class="sc" style="cursor:pointer;border:2px solid ${_invFilter==='deployed'?'var(--accent)':'transparent'};background:${_invFilter==='deployed'?'#eff6ff':'var(--surface)'};transition:all .15s" onclick="_invFilter='deployed';S.invExpanded=null;render()">
      <div style="font-size:24px;font-weight:800;color:var(--accent)">${deployed}</div>
      <div class="muted" style="font-size:12px;margin-top:4px">Deployed</div>
    </div>
    <div class="sc" style="cursor:pointer;border:2px solid ${_invFilter==='faulty'?'#ef4444':'transparent'};background:${_invFilter==='faulty'?'#fef2f2':'var(--surface)'};transition:all .15s;grid-column:3/5" onclick="_invFilter='faulty';S.invExpanded=null;render()">
      <div style="display:flex;align-items:center;gap:12px">

async function invSetQty(groupKey, currentQty) {
  const val = prompt(`Set quantity for this group.\nCurrent: ${currentQty}`, currentQty);
  if (val === null) return;
  const newQty = parseInt(val.trim());
  if (isNaN(newQty) || newQty < 0) { notif('Please enter a valid number', 'err'); return; }
  if (newQty === currentQty) return;

  const [type, brand, model] = groupKey.split('||');
  const groupItems = C.inventory.filter(i =>
    (i.item_type||'') === type && (i.brand||'') === brand && (i.model||'') === model
  );

  if (newQty > currentQty) {
    // Add rows — clone first item's properties
    const template = groupItems[0] || {};
    const toAdd = newQty - currentQty;
    const newRows = Array.from({length: toAdd}, () => ({
      item_type:           template.item_type,
      brand:               template.brand,
      model:               template.model,
      condition:           template.condition || 'new',
      status:              'in_stock',
      location:            template.location || null,
      low_stock_threshold: template.low_stock_threshold || null,
      notes:               null,
    }));
    const { error } = await sb.from('inventory').insert(newRows);
    if (error) { notif('Error adding items: ' + error.message, 'err'); return; }
    notif(`Added ${toAdd} unit${toAdd !== 1 ? 's' : ''} ✓`);

  } else {
    // Remove rows — delete in_stock ones first, then deployed if needed
    const diff = currentQty - newQty;
    const inStockItems = groupItems.filter(i => i.status === 'in_stock');
    const toDelete = [...inStockItems, ...groupItems.filter(i => i.status !== 'in_stock')]
      .slice(0, diff).map(i => i.id);
    const { error } = await sb.from('inventory').delete().in('id', toDelete);
    if (error) { notif('Error removing items: ' + error.message, 'err'); return; }
    notif(`Removed ${diff} unit${diff !== 1 ? 's' : ''} ✓`);
  }

  sysLog('auto_action', 'Inventory qty updated',
    `${S.employee?.name} set ${brand} ${model} quantity: ${currentQty} → ${newQty}`, 'info');
  await loadInventory(); render();
}

  if (val === null) return;
  const num = val.trim() === '' ? null : parseInt(val.trim());
  if (val.trim() !== '' && (isNaN(num) || num < 0)) { notif('Please enter a valid number','err'); return; }

}

async function submitSwapRequest() {
  const targetId  = document.getElementById('swapTarget')?.value;
  const shiftDate = document.getElementById('swapDate')?.value;
  const reason    = document.getElementById('swapReason')?.value?.trim();
  if (!targetId || !shiftDate) { notif('Please select a colleague and shift date','err'); return; }
  const myShift = C.shifts.find(s => s.employee_id===S.employee.id && s.shift_date===shiftDate && !s.cancelled);
  if (!myShift) { notif('You have no shift on that date','err'); return; }
  const { error } = await sb.from('shift_swap_requests').insert({
    requester_id: S.employee.id,
    target_id: targetId,
    shift_date: shiftDate,
    reason: reason || null,
    status: 'pending',
  });
  if (error) { notif('Error: '+error.message,'err'); return; }
  sysLog('auto_action','Shift swap requested',`${S.employee.name} requested shift swap with ${C.employees.find(e=>e.id===targetId)?.name||targetId} on ${shiftDate}`,'info');
  notif('Swap request sent');
  S.md = null;
  const { data } = await sb.from('shift_swap_requests').select('*').order('created_at',{ascending:false}).limit(50);
  C.swapRequests = data || [];
  render();
}

async function reviewSwap(id, status) {
  const note = status==='denied' ? (prompt('Reason for denial (optional):') || '') : '';
  const { error } = await sb.from('shift_swap_requests').update({
    status, reviewed_at: new Date().toISOString(), reviewed_by: S.employee.id, review_note: note||null
  }).eq('id', id);
  if (error) { notif('Error: '+error.message,'err'); return; }
  const req = C.swapRequests.find(r=>r.id===id);
  const rName = C.employees.find(e=>e.id===req?.requester_id)?.name||'?';
  const tName = C.employees.find(e=>e.id===req?.target_id)?.name||'?';
  sysLog('auto_action',`Shift swap ${status}`,`${S.employee.name} ${status} swap: ${rName} ↔ ${tName} on ${req?.shift_date}`,'info');
  notif(`Swap request ${status}`);
  const { data } = await sb.from('shift_swap_requests').select('*').order('created_at',{ascending:false}).limit(50);
  C.swapRequests = data || [];
  render();
}

// CSV helpers
function buildPerfTechMap() {
  const map = {};
  (C.perfTechs||[]).forEach(t => {
    map[t.name.trim().toLowerCase()] = t.id;
    // also map with double-space variants just in case
    map[t.name.trim().toLowerCase().replace(/\s+/g,' ')] = t.id;
  });
  return map;
}
function perfInferType(title) {
  const t=title.toLowerCase();
  if(t.includes('fiber install')||t.includes('fiber installation'))return'FIBER_INSTALL';
  if(t.includes('wifi install')||t.includes('wi-fi install')||t.includes('installation')||t.includes('relocation'))return'WIFI_INSTALL';
  if(t.includes('fiber support'))return'FIBER_SUPPORT';
  if(t.includes('support'))return'WIFI_SUPPORT';
  if(t.includes('removal'))return'REMOVAL';
  if(t.includes('outage'))return'OUTAGE';
  return'WIFI_SUPPORT';
}
function perfParseCsv(text) {
  const lines=text.split(/[\r\n]+/).filter(Boolean); if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const idx=n=>hdrs.indexOf(n);
  return lines.slice(1).map(line=>{
    const cols=[]; let inQ=false,cur='';
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
    cols.push(cur.trim());
    const get=n=>(cols[idx(n)]||'').replace(/^"|"$/g,'').trim();
    const title=get('title'),dateRaw=get('date').slice(0,10),techRaw=get('assigned user'),client=get('client');
    const techMap=buildPerfTechMap(), tid=techMap[techRaw.trim().toLowerCase()]||techMap[techRaw.trim().toLowerCase().replace(/\s+/g,' ')];
    if(!tid)return{technician_id:0,technician_name:techRaw,date:dateRaw,job_type:'WIFI_SUPPORT',points:0,client_name:client,error:`Unknown tech: "${techRaw}"`};
    const job_type=perfInferType(title);
    return{technician_id:tid,technician_name:techRaw,date:dateRaw,job_type,points:PERF_POINTS[job_type],client_name:client};
  }).filter(r=>r.date&&/^\d{4}-\d{2}-\d{2}$/.test(r.date));
}
function perfCsvFile(input) {
  const file=input.files[0]; if(!file)return;
  _perfCsvFile=file.name; _perfCsvResult=null;
  const reader=new FileReader();
  reader.onload=e=>{_perfCsvRows=perfParseCsv(e.target.result);render();};
  reader.readAsText(file); input.value='';
}
async function perfCsvImport() {
  const valid=_perfCsvRows.filter(r=>!r.error); if(!valid.length)return;
  const btn=$('perfCsvBtn'); if(btn){btn.disabled=true;btn.textContent='Importing…';}
  _perfCsvResult=null;
  try {
    const existing=new Set(C.perfJobs.map(j=>`${j.technician_id}__${j.job_date}__${(j.client_name||'').toLowerCase()}`));
    const toInsert=valid.filter(r=>!existing.has(`${r.technician_id}__${r.date}__${r.client_name.toLowerCase()}`));
    if(!toInsert.length){_perfCsvResult='⚠ All jobs already exist — nothing imported.';render();return;}
    await perfRestInsert('jobs',toInsert.map(r=>({technician_id:r.technician_id,date:r.date,job_type:r.job_type,points:r.points,complaint_flag:false,client_name:r.client_name||null})));
    const skipped=valid.length-toInsert.length;
    _perfCsvResult=`✅ Imported ${toInsert.length} job${toInsert.length!==1?'s':''}${skipped>0?` (${skipped} skipped)`:''}.`;
    _perfCsvRows=[]; _perfCsvFile=''; await loadPerf(); render();
  } catch(e) { _perfCsvResult='❌ '+e.message; render(); }
}

  const exportBar = `<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px"><button class="btn" id="exportPrevBtn">📥 Last month</button><button class="btn" id="exportNowBtn">📥 This month</button></div>`;
  const totalMtd = f.costs.reduce((s,c)=>s+(+c.fuel_jmd)+(+c.expenses_jmd)+(+c.maintenance_jmd),0);
  const docHigh = f.docAlerts.filter(a=>a.days_remaining<=14);
  const maintDue = f.schedules.filter(s => (s.km_remaining!==null && s.km_remaining<=500) || (s.days_remaining!==null && s.days_remaining<=14)).sort((a,b)=>(a.days_remaining??9999)-(b.days_remaining??9999));
  const alertCount = docHigh.length + maintDue.length;
  const stats = `${exportBar}<div class="g4" style="margin-bottom:20px">
    <div class="sc"><div style="font-size:24px;font-weight:700">${vehicleCount}</div><div class="muted" style="margin-top:5px">Active vehicles</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700;color:var(--accent)">${_fmtJMD(totalMtd)}</div><div class="muted" style="margin-top:5px">Spend this month</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700;color:${alertCount?'var(--err-text)':'inherit'}">${alertCount}</div><div class="muted" style="margin-top:5px">Alerts</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700">${f.fuel.length}</div><div class="muted" style="margin-top:5px">Fuel logs</div></div>
  </div>`;
  let alertsHtml = '';
  if (alertCount === 0) {
    alertsHtml = '<div class="card emp" style="margin-bottom:20px">All clear ✓</div>';
  } else {
    const docRows = f.docAlerts.map(d => {
      const overdue = d.days_remaining < 0, high = d.days_remaining < 7;
      const bg = high ? 'var(--err-bg)' : 'var(--warn-bg)', fg = high ? 'var(--err-text)' : 'var(--warn-text)';
      const detail = overdue ? `${Math.abs(d.days_remaining)}d ago` : `in ${d.days_remaining}d`;
      return `<tr style="background:${bg}"><td><span data-vp="${d.vehicle_id}" style="font-family:monospace;font-weight:700;color:${fg};cursor:pointer">${d.plate}</span></td><td style="text-transform:capitalize;color:${fg}">${d.document_type} ${overdue?'expired':'expires'}</td><td style="color:${fg};font-weight:600">${detail}</td></tr>`;
    }).join('');
    const maintRows = maintDue.map(m => {
      const overdue = (m.km_remaining??9999)<=0 || (m.days_remaining??9999)<=0;
      const bg = overdue ? 'var(--err-bg)' : 'var(--warn-bg)', fg = overdue ? 'var(--err-text)' : 'var(--warn-text)';
      const parts = [];
      if (m.km_remaining!==null) parts.push(m.km_remaining<=0?'overdue':`${m.km_remaining}km`);
      if (m.days_remaining!==null) parts.push(m.days_remaining<=0?'overdue':`${m.days_remaining}d`);
      return `<tr style="background:${bg}"><td><span data-vp="${m.vehicle_id}" style="font-family:monospace;font-weight:700;color:${fg};cursor:pointer">${m.plate}</span></td><td style="text-transform:capitalize;color:${fg}">${m.service_type.replace(/_/g,' ')}</td><td style="color:${fg};font-weight:600">${parts.join(' · ')}</td></tr>`;
    }).join('');
    alertsHtml = `<div class="ctitle" style="margin-bottom:8px">Alerts</div><div class="card" style="margin-bottom:20px"><table class="tbl"><thead><tr><th>Vehicle</th><th>Issue</th><th>Status</th></tr></thead><tbody>${docRows}${maintRows}</tbody></table></div>`;
  }
  const vehicleRows = f.vehicles.filter(v=>v.status==='active').map(v => {
    const c = f.costs.find(x=>x.vehicle_id===v.id) || {fuel_jmd:0,expenses_jmd:0,maintenance_jmd:0};
    const total = (+c.fuel_jmd)+(+c.expenses_jmd)+(+c.maintenance_jmd);
    return `<tr><td><span data-vp="${v.id}" style="font-family:monospace;font-weight:700;color:var(--accent);cursor:pointer">${v.plate}</span></td><td>${v.make} ${v.model}${v.year?` (${v.year})`:''}</td><td style="font-family:monospace">${(v.current_odometer_km||0).toLocaleString()} km</td><td style="font-family:monospace">${_fmtJMD(c.fuel_jmd)}</td><td style="font-family:monospace">${_fmtJMD(c.expenses_jmd)}</td><td style="font-family:monospace">${_fmtJMD(c.maintenance_jmd)}</td><td style="font-family:monospace;font-weight:700">${_fmtJMD(total)}</td></tr>`;
  }).join('') || '<tr><td colspan="7" class="emp">No vehicles. Click the Vehicles tab to add one.</td></tr>';
  return `${stats}${alertsHtml}<div class="ctitle" style="margin-bottom:8px">Vehicles · month-to-date</div><div class="card"><table class="tbl"><thead><tr><th>Plate</th><th>Make/model</th><th>Odometer</th><th>Fuel</th><th>Other</th><th>Maint</th><th>Total</th></tr></thead><tbody>${vehicleRows}</tbody></table></div>`;
}

function aFleetMaint() {

async function _refreshSignedUrls(vehicleId) {
  C.fleet.docSignedUrls = C.fleet.docSignedUrls || {};
  const v = C.fleet.vehicles.find(x=>x.id===vehicleId);
  if (!v) return;
  const urls = {};
  for (const t of ['registration','fitness','insurance','title']) {
    const path = v[t+'_doc_url'];
    if (path) {
      const { data } = await sb.storage.from('fleet-receipts').createSignedUrl(path, 3600);
      urls[t] = data?.signedUrl || null;
    }
  }
  C.fleet.docSignedUrls[vehicleId] = urls;
}
async function openVehicleView(id) {
  await _refreshSignedUrls(id);
  S.md = 'viewVehicle:' + id;

}

async function uploadVehicleDoc(input) {
  const [vehicleId, docType] = input.dataset.vdoc.split(':');
  const file = input.files?.[0];
  if (!file) return;
  if (file.size > 10*1024*1024) { alert('File too large (max 10 MB)'); return; }
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = `${vehicleId}/docs/${docType}.${ext}`;
  const { error: upErr } = await sb.storage.from('fleet-receipts').upload(path, file, { contentType: file.type, upsert: true });
  if (upErr) { alert('Upload failed: '+upErr.message); return; }
  const col = `${docType}_doc_url`;
  const { error } = await sb.from('vehicles').update({ [col]: path }).eq('id', vehicleId);
  if (error) { alert('Save failed: '+error.message); return; }
  const v = C.fleet.vehicles.find(x=>x.id===vehicleId);
  if (v) v[col] = path;
  if (C.fleet.docSignedUrls) delete C.fleet.docSignedUrls[vehicleId];
  await _refreshSignedUrls(vehicleId);
  render();
}

async function exportFleetCsv(monthOffset) {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const end   = new Date(now.getFullYear(), now.getMonth() + monthOffset + 1, 1);
  const startStr = start.toISOString().slice(0,10);
  const endStr   = end.toISOString().slice(0,10);
  const [fuel, exp, maint] = await Promise.all([
    sb.from('fuel_logs').select('*, vehicles(plate, make, model)').gte('logged_at', startStr).lt('logged_at', endStr).order('logged_at'),
    sb.from('fleet_expenses').select('*, vehicles(plate, make, model)').gte('expense_date', startStr).lt('expense_date', endStr).order('expense_date'),
    sb.from('maintenance_records').select('*, vehicles(plate, make, model)').gte('performed_at', startStr).lt('performed_at', endStr).order('performed_at')
  ]);
  const rows = [['Date','Type','Plate','Vehicle','Description','Amount (JMD)','Vendor/Notes']];
  for (const f of (fuel.data || [])) rows.push([
    new Date(f.logged_at).toISOString().slice(0,10),
    'Fuel',
    f.vehicles?.plate || '',
    `${f.vehicles?.make||''} ${f.vehicles?.model||''}`.trim(),
    `${f.liters}L · ${(f.odometer_km||0).toLocaleString()}km${f.station?` · ${f.station}`:''}`,
    Number(f.cost_jmd || 0),
    f.notes || ''
  ]);
  for (const e of (exp.data || [])) rows.push([
    e.expense_date,
    `Expense (${e.category})`,
    e.vehicles?.plate || '',
    `${e.vehicles?.make||''} ${e.vehicles?.model||''}`.trim(),
    e.description || '',
    Number(e.amount_jmd || 0),
    e.vendor || ''
  ]);
  for (const m of (maint.data || [])) rows.push([
    m.performed_at,
    `Service (${m.service_type})`,
    m.vehicles?.plate || '',
    `${m.vehicles?.make||''} ${m.vehicles?.model||''}`.trim(),
    `${(m.odometer_km||0).toLocaleString()}km${m.notes?` · ${m.notes}`:''}`,
    Number(m.cost_jmd || 0),
    m.vendor || ''
  ]);
  if (rows.length === 1) { alert('No fleet activity in that month.'); return; }
  const total = rows.slice(1).reduce((s, r) => s + (Number(r[5]) || 0), 0);
  rows.push(['', '', '', '', 'TOTAL', total, '']);
  const esc = v => { const s = String(v ?? ''); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
  const csv = rows.map(r => r.map(esc).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}`;
  a.href = url; a.download = `netflair-fleet-${stamp}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const reg = _vehicleDaysLeft(v,'registration'), fit = _vehicleDaysLeft(v,'fitness'), ins = _vehicleDaysLeft(v,'insurance');

async function startScan(input) {
  const file = input.files?.[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { alert('Please pick a photo'); return; }
  if (file.size > 5*1024*1024) { alert('Image too large (max 5 MB). Try a smaller photo.'); return; }

  S.md = 'scanning'; S.scanProgress = 'Uploading photo…'; render();

  const empId = S.employee?.id || 'anon';
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
  const path = `_scans/${empId}/${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from('fleet-receipts').upload(path, file, { contentType: file.type, upsert: false });
  if (upErr) {
    S.md = null; render();
    alert('Upload failed: ' + upErr.message);
    return;
  }

  S.scanProgress = 'Reading the receipt…'; render();

  const { data, error } = await sb.functions.invoke('parse-fuel-receipt', { body: { path } });

  if (error || !data?.ok) {
    S.md = null; render();
    const msg = data?.error || error?.message || 'Unknown error';
    alert('Could not read the receipt: ' + msg + '\n\nYou can still log it manually.');
    return;
  }

  const { data: signed } = await sb.storage.from('fleet-receipts').createSignedUrl(path, 3600);

  S.scanResult = { path, previewUrl: signed?.signedUrl || null, extracted: data.extracted || {} };
  S.md = 'reviewScan';
  // Force a fleet reload so vehicle list is fresh
  if (!C.fleet) await loadFleet();
  render();
}

let _rptFromDate = (() => { const d=new Date(new Date().toLocaleString('en-US',{timeZone:TZ})); d.setDate(d.getDate()-d.getDay()+1); return d.toISOString().split('T')[0]; })();
let _rptToDate   = TODAY;

function aReports() {
  const from = _rptFromDate, to = _rptToDate;

  // ── Flagged clocks in range ──
  const flagged = C.logs.filter(l => l.flagged && l.log_date >= from && l.log_date <= to)
    .sort((a,b) => b.log_date.localeCompare(a.log_date) || a.clock_in.localeCompare(b.clock_in));

  const flagRows = flagged.map(l => {
    const emp = ge(l.employee_id);
    return `<tr style="background:var(--err-bg)">
      <td>${l.log_date}</td>
      <td><div class="row"><div class="av ${avc(emp?.role||'technician')}" style="width:22px;height:22px;font-size:9px">${ini(emp?.name||'?')}</div><span style="font-weight:600">${emp?.name||l.employee_id}</span></div></td>
      <td><span class="badge ${l.log_type==='lunch'?'blun':'bt'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>
      <td>${fmtTime(l.clock_in)}</td>
      <td>${l.clock_out?fmtTime(l.clock_out):'<span class="muted">Active</span>'}</td>
      <td>${locCell(l)}</td>
    </tr>`;
  }).join('');

  // ── Late arrivals in range ──
  const lateRows = [];
  const lateSummary = {};
  C.logs.filter(l => l.log_type==='work' && l.log_date >= from && l.log_date <= to && l.clock_in).forEach(l => {
    const sh = C.shifts.find(s => s.employee_id===l.employee_id && s.shift_date===l.log_date);
    if (!sh) return;
    const [sh2,sm2] = sh.start_time.split(':').map(Number);
    const [ch,cm]   = l.clock_in.split(':').map(Number);
    const lateMin   = (ch*60+cm) - (sh2*60+sm2);
    if (lateMin <= 5) return; // within 5 min grace
    const emp = ge(l.employee_id);
    lateRows.push({ date:l.log_date, emp, lateMin, scheduled:fmtTime(sh.start_time), actual:fmtTime(l.clock_in) });
    if (!lateSummary[l.employee_id]) lateSummary[l.employee_id] = { emp, count:0, totalMin:0 };
    lateSummary[l.employee_id].count++;
    lateSummary[l.employee_id].totalMin += lateMin;
  });
  lateRows.sort((a,b) => b.date.localeCompare(a.date));

  const lateDetailRows = lateRows.map(r => `<tr>
    <td>${r.date}</td>
    <td><div class="row"><div class="av ${avc(r.emp?.role||'technician')}" style="width:22px;height:22px;font-size:9px">${ini(r.emp?.name||'?')}</div><span style="font-weight:600">${r.emp?.name||'?'}</span></div></td>
    <td>${r.scheduled}</td>
    <td>${r.actual}</td>
    <td style="color:var(--err-text);font-weight:700">+${r.lateMin}m</td>
  </tr>`).join('');

  const lateSummaryRows = Object.values(lateSummary).sort((a,b)=>b.count-a.count).map(s => `<tr>
    <td><div class="row"><div class="av ${avc(s.emp?.role||'technician')}" style="width:22px;height:22px;font-size:9px">${ini(s.emp?.name||'?')}</div><span style="font-weight:600">${s.emp?.name||'?'}</span></div></td>
    <td style="font-weight:700;color:var(--err-text)">${s.count}</td>
    <td>${Math.round(s.totalMin/s.count)}m avg</td>
    <td class="muted">${s.totalMin}m total</td>
  </tr>`).join('');

  return `<div class="ph">Reports</div><div class="ps">Flagged clocks & late arrivals</div>
    <div class="card" style="margin-bottom:16px">
      <div class="ctitle" style="margin-bottom:12px">Date range</div>
      <div class="row" style="gap:10px;flex-wrap:wrap">
        <div class="fg" style="flex:1;min-width:140px"><label>From</label><input type="date" id="rptFrom" value="${from}" onchange="_rptFromDate=this.value;render()"></div>
        <div class="fg" style="flex:1;min-width:140px"><label>To</label><input type="date" id="rptTo" value="${to}" onchange="_rptToDate=this.value;render()"></div>
        <div style="display:flex;align-items:flex-end;gap:8px">
          <button class="btn bsm" onclick="rptThisWeek()">This week</button>
          <button class="btn bsm" onclick="rptThisMonth()">This month</button>
          <button class="btn bsm bgn" onclick="exportFlaggedCSV()">⬇ Export flagged</button>
          <button class="btn bsm bgn" onclick="exportLateCSV()">⬇ Export late</button>
        </div>
      </div>
    </div>

    <div class="g2" style="margin-bottom:20px">
      <div class="sc" style="border-left:3px solid var(--err-bdr)"><div style="font-size:24px;font-weight:800;color:var(--err-text)">${flagged.length}</div><div class="muted" style="margin-top:4px">Flagged clock entries</div></div>
      <div class="sc" style="border-left:3px solid var(--warn-text)"><div style="font-size:24px;font-weight:800;color:var(--warn-text)">${lateRows.length}</div><div class="muted" style="margin-top:4px">Late arrivals</div></div>
    </div>

    <div style="margin-bottom:24px">
      <div class="ctitle" style="margin-bottom:10px">⚑ Flagged clocks <span style="font-weight:400;color:var(--muted)">(${flagged.length})</span></div>
      ${flagged.length ? `<div class="twrap"><table class="tbl"><thead><tr><th>Date</th><th>Employee</th><th>Type</th><th>In</th><th>Out</th><th>Location</th></tr></thead>
      <tbody>${flagRows}</tbody></table></div>` : '<p class="muted" style="font-size:13px">No flagged clocks in this range.</p>'}
    </div>

    <div class="g2">
      <div>
        <div class="ctitle" style="margin-bottom:10px">⏰ Late arrivals — summary <span style="font-weight:400;color:var(--muted)">(${Object.keys(lateSummary).length} employees)</span></div>
        ${lateSummaryRows ? `<div class="twrap"><table class="tbl"><thead><tr><th>Employee</th><th>Times late</th><th>Avg delay</th><th>Total delay</th></tr></thead>
        <tbody>${lateSummaryRows}</tbody></table></div>` : '<p class="muted" style="font-size:13px">No late arrivals in this range.</p>'}
      </div>
      <div>
        <div class="ctitle" style="margin-bottom:10px">⏰ Late arrivals — detail</div>
        ${lateDetailRows ? `<div class="twrap"><table class="tbl"><thead><tr><th>Date</th><th>Employee</th><th>Scheduled</th><th>Clocked in</th><th>Late by</th></tr></thead>
        <tbody>${lateDetailRows}</tbody></table></div>` : '<p class="muted" style="font-size:13px">No late arrivals in this range.</p>'}
      </div>
    </div>`;
}

function rptThisWeek() {
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
  _rptFromDate=mon.toISOString().split('T')[0]; _rptToDate=TODAY; render();
}
function rptThisMonth() {
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  _rptFromDate=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-01'; _rptToDate=TODAY; render();
}

function exportFlaggedCSV() {
  const from=_rptFromDate, to=_rptToDate;
  const flagged=C.logs.filter(l=>l.flagged&&l.log_date>=from&&l.log_date<=to).sort((a,b)=>b.log_date.localeCompare(a.log_date));
  let csv='Date,Employee,Role,Type,Clock In,Clock Out,Lat,Lng\n';
  flagged.forEach(l=>{
    const emp=ge(l.employee_id);
    csv+=`${l.log_date},"${emp?.name||l.employee_id}","${emp?.role||''}","${l.log_type}","${fmtTime(l.clock_in)}","${l.clock_out?fmtTime(l.clock_out):''}","${l.lat||''}","${l.lng||''}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='flagged_clocks_'+from+'_to_'+to+'.csv'; a.click();
  notif('Flagged clocks exported');
}

function exportLateCSV() {
  const from=_rptFromDate, to=_rptToDate;
  let csv='Date,Employee,Role,Scheduled,Clocked In,Late By (min)\n';
  C.logs.filter(l=>l.log_type==='work'&&l.log_date>=from&&l.log_date<=to&&l.clock_in).forEach(l=>{
    const sh=C.shifts.find(s=>s.employee_id===l.employee_id&&s.shift_date===l.log_date);
    if(!sh)return;
    const [sh2,sm2]=sh.start_time.split(':').map(Number), [ch,cm]=l.clock_in.split(':').map(Number);
    const lateMin=(ch*60+cm)-(sh2*60+sm2);
    if(lateMin<=5)return;
    const emp=ge(l.employee_id);
    csv+=`${l.log_date},"${emp?.name||l.employee_id}","${emp?.role||''}","${fmtTime(sh.start_time)}","${fmtTime(l.clock_in)}",${lateMin}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='late_arrivals_'+from+'_to_'+to+'.csv'; a.click();
  notif('Late arrivals exported');
}

// ── ANNOUNCEMENTS (admin) ─────────────────────────────────
function aAnnouncements() {
  const anns=C.announcements.filter(a=>!a.expires_at||new Date(a.expires_at)>new Date());
  const rows=anns.length?anns.map(a=>`<div class="card" style="margin-bottom:12px;border-left:3px solid ${a.priority==='urgent'?'#A32D2D':'var(--accent)'}">
    <div class="btw"><div>
      <div style="font-weight:700;font-size:15px">${a.priority==='urgent'?'🚨 ':' '}${a.title}</div>
      <div class="muted" style="margin-top:4px;font-size:13px">${a.body}</div>
      <div class="muted" style="font-size:11px;margin-top:8px">Posted ${new Date(a.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}${a.created_by_name?' · '+a.created_by_name:''}${a.expires_at?' · Expires '+new Date(a.expires_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</div>
    </div>
    <button class="btn bsm brd" data-delann="${a.id}" style="flex-shrink:0">Delete</button></div>
  </div>`).join(''):'<div class="card emp">No active announcements</div>';
  return `<div class="btw" style="margin-bottom:20px">
    <div><div class="ph">Announcements</div><div class="ps">Notices visible to all employees on login</div></div>
    <button class="btn bb" id="newAnnBtn">+ New notice</button>
  </div>${rows}`;
}

// ── ATTENDANCE EXPORT ──────────────────────────────────────
function exportAttendanceCSV() {
  const mo=S.hrMonth, yr=CURRENT_YEAR;
  const prefix=yr+'-'+(mo+1<10?'0':'')+(mo+1);
  const staff=C.employees.filter(e=>e.role!=='admin'&&e.is_active!==false);
  const days=[];
  const dcount=new Date(yr,mo+1,0).getDate();
  for(let i=1;i<=dcount;i++) days.push(yr+'-'+(mo+1<10?'0':'')+(mo+1)+'-'+(i<10?'0':'')+i);
  const workDays=days.filter(d=>!isHol(d));
  let csv='Employee,Role,'+workDays.map(d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'})).join(',')+',Days Worked,Days Absent,Hours Logged,Scheduled Hours\n';
  staff.forEach(e=>{
    const schd=C.shifts.filter(s=>s.employee_id===e.id&&s.shift_date.startsWith(prefix));
    const logs=C.logs.filter(l=>l.employee_id===e.id&&l.log_date.startsWith(prefix)&&l.log_type==='work'&&l.clock_out);
    const workedDays=new Set(logs.map(l=>l.log_date));
    const schedDays=new Set(schd.map(s=>s.shift_date));
    const hoursLogged=logs.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0);
    const schedHours=schd.reduce((a,s)=>a+cH(s.start_time,s.end_time),0);
    const absent=[...schedDays].filter(d=>!workedDays.has(d)).length;
    const dayCells=workDays.map(d=>{
      if(isHol(d)) return 'Holiday';
      if(isDO(e,dow(d))) return 'Day Off';
      if(!schedDays.has(d)) return '';
      if(workedDays.has(d)){const dl=logs.filter(l=>l.log_date===d);return dl.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0).toFixed(1)+'h';}
      return 'Absent';
    });
    csv+='"'+e.name+'","'+rl(e.role)+'",'+dayCells.join(',')+','+workedDays.size+','+absent+','+hoursLogged.toFixed(1)+','+schedHours.toFixed(1)+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='attendance_'+MONTH_NAMES[mo]+'_'+yr+'.csv'; a.click();
  URL.revokeObjectURL(url);
  notif('Attendance report downloaded');
}

// ── ADMIN CLOCK CONTROLS ─────────────────────────────────
async function adminClockIn(eid) {
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const {data,error}=await sb.from('clock_logs').insert({
    employee_id:eid, log_date:TODAY, clock_in:t, log_type:'work'
  }).select().single();
  if(error){notif('Error: '+error.message,'err');return;}
  C.logs.push(data);
  notif('Clocked in '+ge(eid)?.name+' at '+fmtM(now));
  sysLog('auto_action','Admin clock-in',`${S.employee?.name} manually clocked in ${ge(eid)?.name} at ${fmtM(now)}`,'info');
  render();
}

async function adminClockOut(eid) {
  const log=C.logs.find(l=>l.employee_id===eid&&l.log_date===TODAY&&l.log_type==='work'&&!l.clock_out);
  if(!log){notif('No open clock-in found','err');return;}
  // End any open lunch first
  const lunchLog=C.logs.find(l=>l.employee_id===eid&&l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  if(lunchLog){
    await sb.from('clock_logs').update({clock_out:t}).eq('id',lunchLog.id);
    const li=C.logs.findIndex(l=>l.id===lunchLog.id); if(li>=0) C.logs[li].clock_out=t;
  }
  await sb.from('clock_logs').update({clock_out:t}).eq('id',log.id);
  const idx=C.logs.findIndex(l=>l.id===log.id); if(idx>=0) C.logs[idx].clock_out=t;
  notif('Clocked out '+ge(eid)?.name+' at '+fmtM(now));
  sysLog('auto_action','Admin clock-out',`${S.employee?.name} manually clocked out ${ge(eid)?.name} at ${fmtM(now)}`,'info');
  render();
}

async function adminLunchOut(eid) {
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const {data,error}=await sb.from('clock_logs').insert({
    employee_id:eid, log_date:TODAY, clock_in:t, log_type:'lunch'
  }).select().single();
  if(error){notif('Error: '+error.message,'err');return;}
  C.logs.push(data);
  notif(ge(eid)?.name+' started lunch at '+fmtM(now),'lunch');
  render();
}

async function adminLunchIn(eid) {
  const log=C.logs.find(l=>l.employee_id===eid&&l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
  if(!log){notif('No open lunch found','err');return;}
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  await sb.from('clock_logs').update({clock_out:t}).eq('id',log.id);
  const idx=C.logs.findIndex(l=>l.id===log.id); if(idx>=0) C.logs[idx].clock_out=t;
  notif(ge(eid)?.name+' returned from lunch at '+fmtM(now),'lunch');
  render();
}

async function removeEmployee(eid) {
  const emp = C.employees.find(e => e.id === eid);
  const now = new Date().toISOString();
  const { error } = await sb.from('employees').update({ deleted_at: now }).eq('id', eid);
  if (error) { notif('Error: ' + error.message, 'err'); return; }
  sysLog('auto_action','Employee soft-deleted',`${S.employee?.name} removed employee: ${emp?.name||eid} (restorable)`,'warning');
  S.md = null; await loadAll();
  notif(emp?.name + ' removed (restorable via System Log)', 'err');
  render();
}

async function toggleEmployeeActive(eid) {
  const emp = C.employees.find(e => e.id === eid);
  if (!emp) return;
  const nowActive = emp.is_active !== false; // treat null/undefined as active
  const action = nowActive ? 'deactivate' : 'reactivate';
  if (!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} ${emp.name}?${nowActive ? ' This will cancel all future shifts and block their access to Workforce.' : ''}`)) return;

  const { error } = await sb.from('employees').update({ is_active: !nowActive }).eq('id', eid);
  if (error) { notif('Error: ' + error.message, 'err'); return; }

  if (nowActive) {
    // Cancel all future shifts
    const today = jmNow().date;
    await sb.from('shifts').update({ cancelled: true }).eq('employee_id', eid).gte('shift_date', today);
    sysLog('auto_action','Employee deactivated',`${S.employee?.name} deactivated ${emp.name} — future shifts cancelled`,'warning');
    notif(emp.name + ' deactivated — future shifts cancelled', 'err');
  } else {
    sysLog('auto_action','Employee reactivated',`${S.employee?.name} reactivated ${emp.name}`,'info');
    notif(emp.name + ' reactivated');
  }
  S.md = null; await loadAll(); render();
}

// ── AUTO CLOCK-OUT ────────────────────────────────────────


// ── TICK ─────────────────────────────────────────────────
setInterval(()=>{
  S.now=new Date();
  // Refresh TODAY in case midnight passed in Jamaica
  const _jmDate=jmNow().dateStr; if(_jmDate!==TODAY){location.reload();}  // refresh at JM midnight
  const lk=document.getElementById('lck'); if(lk) lk.textContent=fmtNow(S.now);
  const sbClk=document.getElementById('sbClk'); if(sbClk) sbClk.textContent=fmtNow(S.now);
  const openLog=S.session&&S.employee?myOpenWorkLog():null;
  const dr=document.getElementById('dur'); if(dr&&openLog) dr.textContent=eld(openLog.created_at);
  const lunchLog=S.session&&S.employee?myOpenLunchLog():null;
  const ld=document.getElementById('ldur'); if(ld&&lunchLog) ld.textContent=eld(lunchLog.created_at);
  // Update admin live timers
  C.logs.filter(l=>l.log_date===TODAY&&!l.clock_out).forEach(l=>{
    const el=document.getElementById('lv'+l.employee_id); if(el) el.textContent=eld(l.created_at);
  });
  // Auto clock-out: fire when current Jamaica time >= shift end + 60 min
  if(S.session&&S.employee&&isClocked()) {
    const openLog=myOpenWorkLog();
    const sh=C.shifts.find(s=>s.employee_id===S.employee.id&&s.shift_date===TODAY);
    if(sh&&openLog) {
      const jm=jmNow();
      const nowMin=jm.h*60+jm.m;
      const [eh,em]=sh.end_time.split(':').map(Number);
      const cutoffMin=(eh*60+em)+60; // 1 hour past shift end
      if(nowMin>=cutoffMin) {
        doClockOut().then(()=>{
          notif('Auto clocked out — 1 hr past shift end','err');
          sysLog('auto_action','Auto clock-out',`${S.employee?.name} auto clocked out 1hr past shift end (${sh.end_time})`,'info');
        });
      }
    }
  }
},1000);

// ── INACTIVITY TIMEOUT (45 min) ───────────────────────────
let _lastActivity = Date.now();
const INACTIVITY_MS = 45 * 60 * 1000; // 45 minutes

function resetActivityTimer() { _lastActivity = Date.now(); }
['click','keydown','touchstart','mousemove','scroll'].forEach(ev =>
  document.addEventListener(ev, resetActivityTimer, { passive: true })
);

setInterval(async () => {
  if (!S.session) return; // not logged in
  if (Date.now() - _lastActivity >= INACTIVITY_MS) {
    sysLog('auto_action', 'Session timeout', `${S.employee?.name||'User'} auto logged out after 45min inactivity`, 'info');
    await sb.auth.signOut();
    S.session = null; S.employee = null; S.tab = 'clock'; S.atab = 'live'; S.md = null;
    notif('Logged out due to inactivity', 'err');
    render();
  }
}, 60000); // check every minute

// ── BOOT ──────────────────────────────────────────────────
function withTimeout(promise, ms) {
  return Promise.race([promise, new Promise(res => setTimeout(() => res({data:{session:null}}), ms))]);
}
// ── REALTIME ──────────────────────────────────────────────
function initRealtime() {
  sb.channel('clock_logs_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'clock_logs' }, payload => {
      const { eventType, new: newRow, old: oldRow } = payload;
      if (eventType === 'INSERT') {
        if (!newRow.deleted_at && !C.logs.find(l => l.id === newRow.id)) C.logs.push(newRow);
      } else if (eventType === 'UPDATE') {
        const idx = C.logs.findIndex(l => l.id === newRow.id);
        if (idx >= 0) C.logs[idx] = newRow;
        else if (!newRow.deleted_at) C.logs.push(newRow);
        if (newRow.deleted_at) C.logs = C.logs.filter(l => l.id !== newRow.id);
      } else if (eventType === 'DELETE') {
        C.logs = C.logs.filter(l => l.id !== oldRow.id);
      }
      // Only re-render if admin is on Live Status tab
      if (S.employee?.role === 'admin' && S.atab === 'live') render();
    })
    .subscribe();
}

(async function boot() {
  try {
    if(window.location.hash.includes('type=recovery')) {
      const { data: { session } } = await withTimeout(sb.auth.getSession(), 5000);
      if(session) { S.session=session; S.passwordReset=true; render(); return; }
    }
    const { data: { session } } = await withTimeout(sb.auth.getSession(), 5000);
    if(session) {
      S.session=session;
      await loadAll();
      S.employee=C.employees.find(e=>e.auth_id===session.user.id);
    }
  } catch(e) {
    console.error('Boot error:', e);
  }
  render();
  sb.auth.onAuthStateChange((event, session) => {
    S.session=session;
    if(!session) { S.employee=null; render(); }
  });
})();
