<script>
// ── SUPABASE CLIENT ───────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(

  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpd2lsbHRheGJhdnZza2F1Z2R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTU0MDcsImV4cCI6MjA5MTM3MTQwN30.b-SQ6v9n4nyrj7aInoTUHUcKSTIPC59SRrAC0aV-j60'
);

// ── TIMEZONE ──────────────────────────────────────────────
const TZ = 'America/Jamaica';
function jmNow() {
  const now = new Date();
  const parts = Object.fromEntries(
    new Intl.DateTimeFormat('en-US', {
      timeZone: TZ, year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
    }).formatToParts(now).map(p => [p.type, p.value])
  );
  return {
    date: now,
    dateStr: parts.year + '-' + parts.month + '-' + parts.day,
    timeStr: (parts.hour === '24' ? '00' : parts.hour) + ':' + parts.minute,
    h: parseInt(parts.hour === '24' ? '0' : parts.hour),
    m: parseInt(parts.minute),
    s: parseInt(parts.second),
  };
}

// ── CONSTANTS ─────────────────────────────────────────────
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const TODAY = jmNow().dateStr; // Jamaica local date
const CURRENT_YEAR = parseInt(jmNow().dateStr.split('-')[0]);
const HOLIDAYS = {
  '2026-01-01':"New Year's Day",'2026-02-18':'Ash Wednesday',
  '2026-04-03':'Good Friday','2026-04-06':'Easter Monday',
  '2026-05-23':'National Labour Day','2026-08-01':'Emancipation Day',
  '2026-08-06':'Independence Day','2026-10-19':'National Heroes Day',
  '2026-12-25':'Christmas Day','2026-12-26':'Boxing Day',
};
const LEAVE_TYPES = [
  {id:'sick',     label:'Sick Day', color:'#185FA5'},
  {id:'vacation', label:'Vacation', color:'#E24B4A'},
  {id:'pto',      label:'PTO',      color:'#1D9E75'},
];
const GEO_RADIUS_M = 200;

// ── APP STATE ─────────────────────────────────────────────
let S = {
  session: null, employee: null,
  tab:'clock', atab:'live',
  sv:'week', hrView:'monthly', hrEmp:'all',
  hrMonth: parseInt(jmNow().dateStr.split('-')[1])-1,
  hrDay: TODAY, hrWeek: null,
  md: null, now: new Date(),
  forgotPassword: false, passwordReset: false,
  // live clock state
  activeLog: null,   // current open work clock_log row
  lunchLog: null,    // current open lunch clock_log row
};

// ── DATA CACHE ────────────────────────────────────────────
let C = {
  employees: [], shifts: [], logs: [], timeOff: [],
  balances: [], locations: [], liveStatus: {}, announcements: [], perfTechs: [], perfJobs: [], sysLogs: [],
};

// ── HELPERS ───────────────────────────────────────────────
const p2  = n => String(n).padStart(2,'0');
const ini = n => n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const ge  = id => C.employees.find(e=>e.id===id);
const avc = r => r==='technician'?'avt':r==='csr'?'avc':'ava';
const bxc = r => r==='technician'?'bt':r==='csr'?'bc':'ba';
const rl  = r => r==='csr'?'CSR':r==='technician'?'Tech':'Admin';
const isHol = d => HOLIDAYS[d]||null;
const dow = d => (new Date(d+'T12:00:00').getDay()+6)%7;
const isDO = (emp,di) => emp&&emp.days_off&&emp.days_off.includes(di);
const fmtTime = t => { if(!t) return '—'; const [h,m]=t.split(':').map(Number),ap=h>=12?'PM':'AM',h12=h%12||12; return h12+':'+p2(m)+' '+ap; };
const fmtNow = d => d.toLocaleTimeString('en-US',{timeZone:TZ,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
const fmtM = d => d.toLocaleTimeString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit',hour12:true});
const fmtShiftTime = t => { if(!t) return ''; const [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; return (h%12||12)+':'+(m<10?'0':'')+m+' '+ap; };
const fmtDateShort = d => { if(!d) return ''; const [,mo,dy]=d.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+parseInt(dy); };
const cH = (i,o) => { const[ih,im]=i.split(':').map(Number),[oh,om]=o.split(':').map(Number); return((oh*60+om)-(ih*60+im))/60; };
const eld = s => { const ms=Date.now()-new Date(s).getTime(),h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),sc=Math.floor((ms%60000)/1000); return p2(h)+':'+p2(m)+':'+p2(sc); };
const dstr = d => d instanceof Date ? d.toISOString().split('T')[0] : d;

function wkDates(weekStr) {
  const base = weekStr || TODAY;
  const d=new Date(base+'T12:00:00'),dy=d.getDay(),m=new Date(d);
  m.setDate(d.getDate()-(dy===0?6:dy-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x;});
}
function mnDates(y,mo) {
  const days=[],c=new Date(y,mo+1,0).getDate();
  for(let i=1;i<=c;i++) days.push(new Date(y,mo,i));
  return days;
}

function notif(msg,t='ok') {
  document.querySelectorAll('.notif').forEach(n=>n.remove());
  const n=document.createElement('div'); n.className='notif';
  n.style.borderLeft='3px solid '+(t==='ok'?'#1D9E75':t==='lunch'?'#D97706':'#A32D2D');
  const dot=document.createElement('div');

  n.appendChild(dot); n.appendChild(document.createTextNode(msg));
  document.body.appendChild(n); setTimeout(()=>n.remove(),3000);
}

function clockConfirm(type, timeStr) {
  // type: 'in' | 'out' | 'lunch-out' | 'lunch-in'
  document.querySelectorAll('.clock-confirm').forEach(e=>e.remove());
  const cfg = {
    'in':       {icon:'✅', title:'Clocked In',         color:'#1D9E75', sub:'You are now clocked in'},
    'out':      {icon:'👋', title:'Clocked Out',        color:'#185FA5', sub:'Your session has been recorded'},
    'lunch-out':{icon:'🍽️', title:'Lunch Started',     color:'#D97706', sub:'Enjoy your break'},
    'lunch-in': {icon:'💼', title:'Back from Lunch',    color:'#1D9E75', sub:'Welcome back'},
  }[type] || {icon:'✅', title:'Done', color:'#1D9E75', sub:''};

  const overlay = document.createElement('div');
  overlay.className = 'clock-confirm';
  overlay.innerHTML = `<div class="clock-confirm-box">
    <div class="clock-confirm-icon">${cfg.icon}</div>
    <div class="clock-confirm-title" style="color:${cfg.color}">${cfg.title}</div>
    <div class="clock-confirm-time" style="color:${cfg.color}">${timeStr}</div>
    <div class="clock-confirm-sub">${cfg.sub}</div>
  </div>`;
  document.body.appendChild(overlay);
  // Tap anywhere or auto-dismiss after 3s
  overlay.onclick = () => overlay.remove();
  setTimeout(() => overlay.remove(), 3000);
}

// Balance helpers
function getBalance(empId, type) {
  return C.balances.find(b=>b.employee_id===empId&&b.leave_type===type) || {initial_days:0,adjustment:0,used_days:0};
}
function leaveTotal(empId, type) { const b=getBalance(empId,type); return b.initial_days+b.adjustment; }
function leaveRemaining(empId, type) { const b=getBalance(empId,type); return Math.max(0,leaveTotal(empId,type)-b.used_days); }

// Clock state helpers
function myOpenWorkLog() {
  return C.logs.find(l=>l.employee_id===S.employee.id&&l.log_date===TODAY&&l.log_type==='work'&&!l.clock_out);
}
function myOpenLunchLog() {
  return C.logs.find(l=>l.employee_id===S.employee.id&&l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
}
function isClocked() { return !!myOpenWorkLog(); }
function onLunch()   { return !!myOpenLunchLog(); }


// ── LOCATION FLAGGING ─────────────────────────────────────
function shouldFlag(lat, lng, logType, empRole) {
  // Never flag technician lunch clocks
  if (logType === 'lunch' && empRole === 'technician') return false;
  // If no location recorded, don't flag (admin-clocked entries etc.)
  if (lat == null || lng == null) return false;
  // Flag if not within range of any approved location
  const near = C.locations.some(loc => distanceM(lat, lng, loc.lat, loc.lng) <= loc.radius_m);
  return !near;
}

// ── LOCATION-GATED CLOCK ─────────────────────────────────
function requireLocationThen(action) {
  const btn=$('ctbtn'); if(btn){btn.disabled=true;btn.style.opacity='0.6';}
  const msg=$('geoMsg'); if(msg){msg.textContent='📍 Getting location…';msg.style.color='var(--muted)';}
  const restore=()=>{if(btn){btn.disabled=false;btn.style.opacity='1';}if(msg)msg.textContent='';};
  if(!navigator.geolocation){
    notif('Location services not available on this device','err');
    if(msg){msg.textContent='⚠ Location unavailable';msg.style.color='var(--err-text)';}
    if(btn){btn.disabled=false;btn.style.opacity='1';} return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      if(msg){msg.textContent='✓ Location recorded';msg.style.color='var(--ok-text)';}
      setTimeout(restore, 1500);
      action(pos.coords.latitude, pos.coords.longitude);
    },
    err=>{
      restore();
      const txt=err.code===1?'⚠ Location permission denied — enable in browser settings'
               :err.code===2?'⚠ Unable to get location — try again outdoors'
               :'⚠ Location timed out — please try again';
      if(msg){msg.textContent=txt;msg.style.color='var(--err-text)';}
      const errMsg=err.code===1?'Location permission denied — please enable location access'
               :err.code===2?'Unable to determine location — try again outdoors'
               :'Location request timed out — please try again';
      notif(errMsg,'err');
      sysLog('warning','Clock blocked — location failure',`${S.employee?.name||'Unknown'}: ${errMsg} (code ${err.code})`,'warning');
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:30000}
  );
}

async function doClockOutWithLoc(lat, lng) {
  await doClockOut(lat, lng);
}

async function doClockIn(lat, lng) {
  // Guard: block if already clocked in (local cache check)
  if (myOpenWorkLog()) {
    notif('You are already clocked in','err');
    sysLog('warning','Duplicate clock-in blocked',`${S.employee?.name} attempted to clock in while already active`,'warning');
    return;
  }
  // Server-side guard: check DB directly to catch race conditions
  const { data: existing } = await sb.from('clock_logs')
    .select('id').eq('employee_id', S.employee.id)
    .eq('log_date', TODAY).eq('log_type', 'work')
    .is('clock_out', null).is('deleted_at', null).limit(1);
  if (existing && existing.length > 0) {
    notif('You are already clocked in','err');
    sysLog('warning','Duplicate clock-in blocked (server check)',`${S.employee?.name} attempted double clock-in — caught by server check`,'warning');
    await loadLogs(); render(); return;
  }
  const jm=jmNow(), now=jm.date, timeStr=jm.timeStr;
  const flagged = shouldFlag(lat, lng, 'work', S.employee.role);
  const { data, error } = await sb.from('clock_logs').insert({
    employee_id: S.employee.id,
    log_date: TODAY,
    clock_in: timeStr,
    log_type: 'work',
    lat: lat||null,
    lng: lng||null,
    flagged,
  }).select().single();
  if (error) { notif('Clock-in failed: '+error.message,'err'); return; }
  C.logs.push(data);
  notif('Clocked in at '+fmtM(now)); clockConfirm('in', fmtM(now));
  if(flagged) sysLog('warning','Flagged clock-in',`${S.employee?.name} clocked in outside approved location (${lat?.toFixed(5)}, ${lng?.toFixed(5)})`,'warning');
  render();
}

async function doClockOut(lat, lng) {
  const log = myOpenWorkLog(); if(!log) return;
  // End any open lunch first
  const lunchLog = myOpenLunchLog();
  if (lunchLog) {
    const jm=jmNow(), now=jm.date, t=jm.timeStr;
    await sb.from('clock_logs').update({clock_out:t}).eq('id',lunchLog.id);
    const idx = C.logs.findIndex(l=>l.id===lunchLog.id);
    if(idx>=0) C.logs[idx].clock_out=t;
  }
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const hoursWorked = cH(log.clock_in, t);
  const partial_shift = hoursWorked < 7;
  const updates={clock_out:t, partial_shift};
  if(lat!=null&&lng!=null){updates.lat=lat;updates.lng=lng;}
  await sb.from('clock_logs').update(updates).eq('id',log.id);
  const idx = C.logs.findIndex(l=>l.id===log.id);
  if(idx>=0){C.logs[idx].clock_out=t;C.logs[idx].partial_shift=partial_shift;if(lat!=null)C.logs[idx].lat=lat;if(lng!=null)C.logs[idx].lng=lng;}
  if(partial_shift) sysLog('warning','Partial shift',`${S.employee?.name} clocked out after ${hoursWorked.toFixed(1)}h (less than 7h)`,'warning');
  notif(partial_shift?'Clocked out — partial shift ('+hoursWorked.toFixed(1)+'h)':'Clocked out at '+fmtM(now));
  clockConfirm('out', fmtM(now));
  render();
}

async function doLunchOut(lat, lng) {
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const flagged = shouldFlag(lat, lng, 'lunch', S.employee.role);
  const { data, error } = await sb.from('clock_logs').insert({
    employee_id: S.employee.id,
    log_date: TODAY, clock_in: t, log_type: 'lunch',
    lat: lat||null, lng: lng||null,
    flagged,
  }).select().single();
  if(error){ notif('Error: '+error.message,'err'); return; }
  C.logs.push(data);
  notif('Lunch break started at '+fmtM(now),'lunch'); clockConfirm('lunch-out', fmtM(now));
  render();
}

async function doLunchIn(lat, lng) {
  const log = myOpenLunchLog(); if(!log) return;
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const updates={clock_out:t};
  if(lat!=null&&lng!=null){updates.lat=lat;updates.lng=lng;}
  await sb.from('clock_logs').update(updates).eq('id',log.id);
  const idx = C.logs.findIndex(l=>l.id===log.id);
  if(idx>=0){C.logs[idx].clock_out=t;if(lat!=null)C.logs[idx].lat=lat;if(lng!=null)C.logs[idx].lng=lng;}
  notif('Back from lunch at '+fmtM(now),'lunch'); clockConfirm('lunch-in', fmtM(now));
  render();
}


async function deleteLog(id) {
  if (!confirm('Delete this clock entry? It can be restored from the System Log.')) return;
  const dl = C.logs.find(l => l.id === id);
  const now = new Date().toISOString();
  const { error } = await sb.from('clock_logs').update({ deleted_at: now }).eq('id', id);
  if (error) { notif('Error: ' + error.message, 'err'); return; }
  C.logs = C.logs.filter(l => l.id !== id);
  sysLog('auto_action','Clock log soft-deleted',`${S.employee?.name} deleted clock entry for ${ge(dl?.employee_id)?.name||'unknown'} on ${dl?.log_date||'unknown'} (restorable)`,'warning');
  notif('Clock entry deleted (restorable via System Log)', 'err');
  render();
}

async function restoreLog(id) {
  const { error } = await sb.from('clock_logs').update({ deleted_at: null }).eq('id', id);
  if (error) { notif('Error: ' + error.message, 'err'); return; }
  sysLog('auto_action','Clock log restored',`${S.employee?.name} restored clock entry ${id}`,'info');
  notif('Clock entry restored ✓');
  await loadLogs(); render();
}

// ── GEOLOCATION ───────────────────────────────────────────
function distanceM(lat1,lng1,lat2,lng2) {
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function forgotPasswordV() {
  return `<div class="lw"><div class="lcard">
    <div style="padding:0;border:none;margin-bottom:20px;text-align:center">
      <div class="logo" style="font-size:22px;font-weight:800"><span class="ac">NET</span>FLAIR Workforce</div>
      <div class="logo-s">Reset your password</div>
    </div>
    <div class="eb" id="fperr" style="display:none">Could not send reset email. Please check the address.</div>
    <div id="fpok" style="display:none;background:var(--ok-bg);color:var(--ok-text);border-radius:var(--rs);padding:9px 12px;font-size:13px;margin-bottom:13px;font-weight:500">
      ✓ Reset link sent! Check your email inbox.
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Enter your work email address and we'll send you a link to reset your password.</p>
    <div class="fg"><label>Work email</label><input id="fpemail" type="email" placeholder="you@netflair.com" autocomplete="email"></div>
    <button class="btn bb bfw" id="fpbtn" style="margin-top:4px;font-size:14px">Send reset link</button>
    <button class="btn bfw" id="backToLogin" style="margin-top:8px;font-size:13px">← Back to sign in</button>
  </div></div>`;
}

// ── RESET PASSWORD (arrives via email link) ───────────────
function resetPasswordV() {
  return `<div class="lw"><div class="lcard">
    <div style="padding:0;border:none;margin-bottom:20px;text-align:center">
      <div class="logo" style="font-size:22px;font-weight:800"><span class="ac">NET</span>FLAIR Workforce</div>
      <div class="logo-s">Set new password</div>
    </div>
    <div class="eb" id="rperr" style="display:none">Passwords do not match or are too short (min 8 characters).</div>
    <div class="fg"><label>New password</label><input id="rppw1" type="password" placeholder="At least 8 characters" autocomplete="new-password"></div>
    <div class="fg"><label>Confirm new password</label><input id="rppw2" type="password" placeholder="Repeat password" autocomplete="new-password"></div>
    <button class="btn bb bfw" id="rpbtn" style="margin-top:4px;font-size:14px">Set new password</button>
  </div></div>`;
}
function empLayout() {

  return `<div class="app"><nav class="sb">
    <div class="logo-a"><div class="logo"><span class="ac">NET</span>FLAIR</div><div class="logo-s">Workforce</div><div id="sbClk" style="font-family:'SF Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);margin-top:5px;letter-spacing:.5px"></div></div>
    ${tabs.map(t=>`<div class="ni${S.tab===t.id?' on':''}" data-tab="${t.id}">${t.l}</div>`).join('')}

function empContent() { switch(S.tab){case 'clock':return clockV();case 'schedule':return schedV();case 'timeoff':return toV();case 'hours':return hrV();case 'inventory':return eInventory();case 'troubleshoot':return aTroubleshoot();case 'calllog':return aCallLog();case 'fleet':return eFleet();} return ''; }

// ── CLOCK VIEW ────────────────────────────────────────────
function clockV() {
  const emp=S.employee;
  const activeAnns=C.announcements.filter(a=>!a.expires_at||new Date(a.expires_at)>new Date());
  const annBanner=activeAnns.length?activeAnns.map(a=>`<div style="background:${a.priority==='urgent'?'var(--err-bg)':'var(--accent-light)'};border:.5px solid ${a.priority==='urgent'?'var(--err-bdr)':'var(--accent)'};border-radius:var(--rs);padding:10px 14px;margin-bottom:10px">
    <div style="font-weight:700;font-size:13px;color:${a.priority==='urgent'?'var(--err-text)':'var(--accent)'}">${a.priority==='urgent'?'🚨 ':' 📢 '}${a.title}</div>
    <div style="font-size:13px;color:var(--text);margin-top:2px">${a.body}</div>
  </div>`).join(''):'';
  const ts=C.shifts.find(s=>s.employee_id===emp.id&&s.shift_date===TODAY&&!s.cancelled);
  const isIn=isClocked(), isLunch=onLunch(), isCsr=emp.role==='csr';
  // ── Employee summary ───────────────────────────────────────
  const upcoming=C.shifts.filter(s=>s.employee_id===emp.id&&s.shift_date>TODAY&&!s.cancelled).sort((a,b)=>a.shift_date.localeCompare(b.shift_date)).slice(0,2);
  const annualRem=leaveRemaining(emp.id,'annual');
  const summaryCard=`<div class="card" style="margin-bottom:14px;padding:14px 16px">
    <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.5px">MY SUMMARY</div>
    <div class="g2" style="gap:10px;margin-bottom:${upcoming.length?'10px':'0'}">
      <div style="background:var(--surface2);border-radius:8px;padding:10px 12px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:2px">Today's shift</div>
        <div style="font-weight:700;font-size:13px">${ts?fmtShiftTime(ts.start_time)+' – '+fmtShiftTime(ts.end_time):'No shift today'}</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:10px 12px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:2px">Annual leave left</div>
        <div style="font-weight:700;font-size:13px;color:${annualRem<=3?'#ef4444':'var(--text)'}">${annualRem} day${annualRem!==1?'s':''}</div>
      </div>
    </div>
    ${upcoming.length?`<div style="font-size:12px;color:var(--muted)">
      <span style="font-weight:600">Next shifts:</span>
      ${upcoming.map(s=>`<span style="margin-left:8px;background:var(--surface2);padding:2px 8px;border-radius:20px">${s.shift_date} ${fmtShiftTime(s.start_time)}</span>`).join('')}
    </div>`:''}
  </div>`;
  const openLog=myOpenWorkLog();
  const clr=isIn?'#A32D2D':'#1D9E75', bg=isIn?'var(--err-bg)':'var(--ok-bg)', tc=isIn?'var(--err-text)':'var(--ok-text)';
  const myLogs=C.logs.filter(l=>l.employee_id===emp.id).sort((a,b)=>b.log_date.localeCompare(a.log_date)||a.log_type.localeCompare(b.log_type)).slice(0,10);

  let lunchArea='';
  if(isCsr&&isIn) {
    if(isLunch) {
      const ll=myOpenLunchLog();
      lunchArea=`<hr class="divider">
        <div class="lunch-banner" style="justify-content:center;margin-bottom:12px"><div class="ldot"></div>On lunch — <span id="ldur">${eld(ll.created_at)}</span></div>
        <button class="lbtn lbtn-ret" id="lunchIn">&#8634;<span>Back</span></button>
        <div class="muted" style="text-align:center;margin-top:10px">Since ${fmtTime(ll.clock_in)}</div>`;
    } else {
      lunchArea=`<hr class="divider">
        <div class="muted" style="text-align:center;margin-bottom:10px">Lunch break</div>
        <button class="lbtn" id="lunchOut">&#9749;<span>Lunch Out</span></button>`;
    }
  }

  return `<div class="ph">Clock In / Out</div><div class="ps">${new Date().toLocaleDateString('en-US',{timeZone:TZ,weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
  ${summaryCard}
  <div class="g2">
    <div class="card" style="text-align:center;padding:28px 20px">
      <div id="geoMsg" style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px;min-height:16px"></div>
      <div id="lck" class="cknum">${fmtNow(S.now)}</div>
      <div class="muted" style="margin-bottom:18px">Current time</div>
      <div class="row" style="justify-content:center;margin-bottom:16px">
        <div class="dot" style="background:${isLunch?'#D97706':isIn?'#1D9E75':'var(--muted)'}"></div>
        <span style="font-size:13px;font-weight:500;color:${isLunch?'var(--lunch-text)':isIn?'#1D9E75':'var(--muted)'}">
          ${isLunch?'On lunch break':isIn?'Clocked in':'Not clocked in'}
        </span>
      </div>
      ${isIn&&openLog?`<div style="font-family:monospace;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:3px" id="dur">${eld(openLog.created_at)}</div>
        <div class="muted" style="margin-bottom:14px">Since ${fmtTime(openLog.clock_in)}</div>`:'<div style="height:50px"></div>'}
      <button id="ctbtn" class="ckbtn ${isIn?'ckbtn-out':'ckbtn-in'}" style="border-color:${clr};background:${bg};color:${tc};margin-bottom:12px">${isIn?'Clock Out':'Clock In'}</button>
      <div class="muted">${ts?'Shift: '+fmtTime(ts.start_time)+' – '+fmtTime(ts.end_time):'No shift scheduled today'}</div>
      ${lunchArea}
    </div>
    <div class="card"><div class="ctitle">Activity log</div>
      ${myLogs.length?`<table class="tbl" style="font-size:12px">
        <thead><tr><th>Date</th><th>Type</th><th>In</th><th>Out</th><th>Dur</th></tr></thead>
        <tbody>${myLogs.map(l=>`<tr class="${l.log_type==='lunch'?'lrow':''}">
          <td>${l.log_date}</td>
          <td><span class="badge ${l.log_type==='lunch'?'blun':'bt'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>
          <td>${fmtTime(l.clock_in)}</td>
          <td>${l.clock_out?fmtTime(l.clock_out):'—'}</td>

        </tr>`).join('')}</tbody>

  </div>`;
}

function schedV() {
  const emp=S.employee;
  if(!S.hrWeek) S.hrWeek=TODAY;

  const wd=wkDates(S.hrWeek);
  if(S.sv==='month') {
    const mo=(parseInt(jmNow().dateStr.split('-')[1])-1), yr=parseInt(jmNow().dateStr.split('-')[0]);
    return `<div class="btw" style="margin-bottom:20px">
      <div><div class="ph">My Schedule</div><div class="ps">${MONTH_NAMES[mo]} ${yr}</div></div>${tog}</div>
      <div style="display:grid;grid-template-columns:1fr 270px;gap:16px;align-items:start">
        ${empMonthGrid(emp)}<div>${holPanel()}</div></div>`;
  }
  return `<div class="btw" style="margin-bottom:20px">
    <div><div class="ph">My Schedule</div><div class="ps">${wd[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${wd[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div></div>${tog}</div>
    <div style="display:grid;grid-template-columns:1fr 270px;gap:16px;align-items:start">
      <div class="card" style="padding:0;overflow:hidden"><div class="twrap">
        <div class="wg" style="grid-template-columns:82px repeat(7,1fr);min-width:560px">
          <div class="wh"></div>${weekHeaders(wd)}
          <div class="wl" style="font-size:11px">Shifts</div>${empWeekCells(emp,wd)}
        </div></div></div>
      <div>${holPanel()}</div>
    </div>
    ${eSwapPanel()}`;
}

function togBtn() {
  return `<div class="vtog"><button class="${S.sv==='week'?'von':''}" id="togWk">Week</button>
    <button class="${S.sv==='month'?'von':''}" id="togMo">Month</button></div>`;
}

function weekHeaders(wd) {
  return wd.map(d=>{
    const dd=dstr(d),t=dd===TODAY,h=isHol(dd);
    return `<div class="wh${t?' th':''}${h?' hh':''}">
      <span class="whs">${d.toLocaleDateString('en-US',{weekday:'short'})}</span>
      <span class="whn">${d.getDate()}</span>
      ${h?`<span class="whhol">${HOLIDAYS[dd]}</span>`:''}
    </div>`;
  }).join('');
}

function empWeekCells(emp, wd) {
  return wd.map(d=>{
    const dd=dstr(d),t=dd===TODAY,h=isHol(dd),doff=isDO(emp,dow(dd));
    const sh=C.shifts.find(s=>s.employee_id===emp.id&&s.shift_date===dd);
    let cls=`wc${t?' tc':''}${h?' hc':''}${doff&&!h?' doc':''}`;
    let content='';
    if(h) content=`<div class="sp sph">${HOLIDAYS[dd]}</div>`;
    else if(doff) content=`<div class="do-tag">Day off</div>`;
    else if(sh) content=`<div class="sp ${emp.role==='csr'?'spc':'spt'}">${fmtTime(sh.start_time)}–${fmtTime(sh.end_time)}</div>`;
    return `<div class="${cls}">${content}</div>`;
  }).join('');
}

function empMonthGrid(emp) {
  const yr=parseInt(jmNow().dateStr.split('-')[0]), mo=(parseInt(jmNow().dateStr.split('-')[1])-1);
  const days=mnDates(yr,mo), offset=(new Date(yr,mo,1).getDay()+6)%7;
  let cells='';
  for(let i=0;i<offset;i++) cells+='<div class="mcal-cell empty"></div>';
  days.forEach(d=>{
    const dd=dstr(d),isT=dd===TODAY,h=isHol(dd),doff=isDO(emp,dow(dd));
    const sh=C.shifts.find(s=>s.employee_id===emp.id&&s.shift_date===dd);
    let cls=`mcal-cell${isT?' tc':''}${h?' hc':''}${doff&&!h?' doc':''}`;
    let dn=isT?`<span class="td-circle">${d.getDate()}</span>`:`<span>${d.getDate()}</span>`;
    let content='';
    if(h) content=`<div class="msp msp-h">${HOLIDAYS[dd]}</div>`;
    else if(doff) content='<div class="do-tag">Day off</div>';
    else if(sh) content=`<div class="msp ${emp.role==='csr'?'msp-c':'msp-t'}">${fmtTime(sh.start_time)}–${fmtTime(sh.end_time)}</div>`;
    cells+=`<div class="${cls}"><div class="mcal-dn${isT?' tn':''}">${dn}</div>${content}</div>`;
  });
  return `<div class="mcal"><div class="mcal-head">${DAYS.map(d=>`<div class="mcal-dh">${d}</div>`).join('')}</div><div class="mcal-body">${cells}</div></div>`;
}

function holPanel() {
  const now=TODAY;
  const upcoming=Object.entries(HOLIDAYS).filter(([d])=>d>=now).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,5);
  return `<div class="card"><div class="ctitle">Jamaica public holidays</div>
    ${upcoming.map(([d,n])=>`<div class="hrow"><div class="hdot"></div>
      <div style="flex:1;font-size:13px;font-weight:500">${n}</div>
      <div class="muted">${new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
    </div>`).join('')}</div>`;
}

// ── TIME OFF VIEW ─────────────────────────────────────────
function toV() {
  const emp=S.employee;
  const myR=C.timeOff.filter(r=>r.employee_id===emp.id);
  const balCards=LEAVE_TYPES.map(lt=>{
    const b=getBalance(emp.id,lt.id);
    const total=leaveTotal(emp.id,lt.id), rem=leaveRemaining(emp.id,lt.id);
    const pct=total>0?Math.round(b.used_days/total*100):0;
    return `<div class="sc" style="border-left:3px solid ${lt.color}">
      <div style="font-size:13px;font-weight:700;margin-bottom:2px">${lt.label}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Days / Year</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-size:22px;font-weight:700;color:${lt.color}">${rem}</span>
        <span class="muted">of ${total}</span></div>
      <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${lt.color};border-radius:4px"></div></div>
      <div class="muted" style="margin-top:5px">Used: <strong>${b.used_days}</strong></div>
    </div>`;
  }).join('');
  return `<div class="ph">Time Off</div><div class="ps">Submit requests and track your leave balances</div>
  <div class="g3" style="margin-bottom:20px">${balCards}</div>
  <div class="g2">
    <div class="card"><div class="ctitle">New request</div>
      <div class="fg"><label>Leave type</label><select id="ttype">${LEAVE_TYPES.map(lt=>`<option value="${lt.id}">${lt.label}</option>`).join('')}</select></div>
      <div class="fg"><label>From date</label><input type="date" id="tf" min="${TODAY}"></div>
      <div class="fg"><label>To date</label><input type="date" id="tt" min="${TODAY}"></div>
      <div class="fg"><label>Reason</label><textarea id="tr" rows="3" placeholder="Brief description…"></textarea></div>
      <button class="btn bb bfw" id="subTO">Submit request</button>
    </div>
    <div><div class="ctitle" style="margin-bottom:12px">My requests</div>
      ${myR.length?myR.map(r=>{
        const lt=LEAVE_TYPES.find(t=>t.id===r.leave_type)||{label:'Leave',color:'var(--muted)'};
        return `<div class="rq"><div style="flex:1">
          <div class="row" style="margin-bottom:3px;gap:6px">
            <span class="badge" style="background:${lt.color}22;color:${lt.color}">${lt.label}</span>
            <span style="font-size:13px;font-weight:600">${r.from_date===r.to_date?r.from_date:r.from_date+' – '+r.to_date}</span>
          </div>
          <div class="muted">${r.reason} · ${r.submitted_at}${r.days?' · '+r.days+' day'+(r.days!==1?'s':''):''}
          </div></div>
          <span class="badge b${r.status==='pending'?'pend':r.status==='approved'?'appr':'deny'}">${r.status}</span>
        </div>`;
      }).join(''):'<div class="emp">No requests yet</div>'}
    </div>
  </div>`;
}

// ── HOURS VIEW (employee) ─────────────────────────────────
function hrV() {
  const emp=S.employee;
  const wd=wkDates(S.hrWeek||TODAY);
  const wl=C.logs.filter(l=>l.employee_id===emp.id&&wd.some(d=>dstr(d)===l.log_date));
  const wk=wl.filter(l=>l.log_type==='work'), lk=wl.filter(l=>l.log_type==='lunch');
  const totW=wk.reduce((a,l)=>a+(l.clock_out?cH(l.clock_in,l.clock_out):0),0);
  const totL=lk.reduce((a,l)=>a+(l.clock_out?cH(l.clock_in,l.clock_out):0),0);
  const isCsr=emp.role==='csr';
  const bars=wd.slice(0,5).map(d=>{
    const dd=dstr(d),hol=isHol(dd);
    const dw=wk.filter(l=>l.log_date===dd).reduce((a,l)=>a+(l.clock_out?cH(l.clock_in,l.clock_out):0),0);
    const pct=Math.min(dw/10*100,100);
    return `<div class="hbr">
      <div class="muted" style="width:30px;text-align:right">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="hbt">${hol
        ?`<div style="width:100%;height:100%;background:var(--hol-bg);display:flex;align-items:center;padding:0 8px;font-size:10px;color:var(--hol-text);font-weight:600">${HOLIDAYS[dd]}</div>`
        :`<div class="hbf" style="width:${pct}%;background:${isCsr?'#7F77DD':'#378ADD'}">${dw>0?dw.toFixed(1)+'h':''}</div>`}
      </div>
      <div style="font-size:11px;color:var(--muted);width:36px;text-align:right">${hol?'—':dw>0?dw.toFixed(1)+'h':'—'}</div>
    </div>`;
  }).join('');
  return `<div class="ph">My Hours</div><div class="ps">This week's summary</div>
  <div class="g2">
    <div class="card"><div class="ctitle">Daily breakdown</div>${bars}</div>
    <div>
      <div class="g2" style="margin-bottom:14px">
        <div class="sc"><div style="font-size:24px;font-weight:700;color:${isCsr?'var(--csr)':'var(--accent)'}">${totW.toFixed(1)}</div><div class="muted" style="margin-top:5px">Work hours</div></div>
        ${isCsr?`<div class="sc"><div style="font-size:24px;font-weight:700;color:var(--lunch-text)">${totL.toFixed(1)}</div><div class="muted" style="margin-top:5px">Lunch hours</div></div>`
                :`<div class="sc"><div style="font-size:24px;font-weight:700">${wk.filter(l=>l.clock_out).length}</div><div class="muted" style="margin-top:5px">Days worked</div></div>`}
      </div>
      <div class="card"><div class="ctitle">Log details</div>
        <table class="tbl" style="font-size:12px"><thead><tr><th>Day</th>${isCsr?'<th>Type</th>':''}<th>In</th><th>Out</th><th>Hrs</th></tr></thead>
        <tbody>${wl.length?wl.sort((a,b)=>a.log_date.localeCompare(b.log_date)||a.log_type.localeCompare(b.log_type)).map(l=>`<tr class="${l.log_type==='lunch'?'lrow':''}">
          <td>${new Date(l.log_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})}</td>
          ${isCsr?`<td><span class="badge ${l.log_type==='lunch'?'blun':'bc'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>`:''}
          <td>${fmtTime(l.clock_in)}</td><td>${l.clock_out?fmtTime(l.clock_out):'—'}</td>
          <td style="font-weight:600;color:${l.log_type==='lunch'?'var(--lunch-text)':'var(--accent)'}">
            ${l.clock_out?cH(l.clock_in,l.clock_out).toFixed(1):'—'}</td>
        </tr>`).join(''):`<tr><td colspan="${isCsr?5:4}" class="emp">No logs this week</td></tr>`}</tbody></table>
      </div>
    </div>
  </div>`;
}

function adminContent() { switch(S.atab){case 'live':return aLive();case 'schedule':return aSch();case 'timeoff':return aTO();case 'hours':return aHours();case 'employees':return aEmp();case 'announcements':return aAnnouncements();case 'performance':return aPerformance();case 'reports':return aReports();case 'inventory':return aInventory();case 'troubleshoot':return aTroubleshoot();case 'calllog':return aCallLog();case 'fleet':return aFleet();case 'syslog':return aSysLog();} return ''; }

// ── ADMIN LIVE ────────────────────────────────────────────

// ── LOCATION HELPER ───────────────────────────────────────
function locCell(l) {
  if (!l.lat || !l.lng) return '<span class="muted" style="font-size:11px">—</span>';
  const url = `https://www.google.com/maps?q=${l.lat},${l.lng}`;
  return `<a href="${url}" target="_blank" rel="noopener" title="${l.lat.toFixed(5)}, ${l.lng.toFixed(5)}"
    style="font-size:11px;color:var(--accent);text-decoration:none;white-space:nowrap">
    📍 View</a>`;
}

function aLive() {
  const staff=C.employees.filter(e=>e.role!=='admin'&&e.is_active!==false);
  const openLogs=C.logs.filter(l=>l.log_date===TODAY&&l.log_type==='work'&&!l.clock_out);
  const openLunch=C.logs.filter(l=>l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
  const clocked=openLogs.map(l=>({emp:ge(l.employee_id),log:l,onLunch:openLunch.some(ll=>ll.employee_id===l.employee_id)})).filter(x=>x.emp);
  const todHol=isHol(TODAY);
  const todayLogs=C.logs.filter(l=>l.log_date===TODAY).sort((a,b)=>a.log_type.localeCompare(b.log_type)||a.clock_in.localeCompare(b.clock_in));
  const todayRows=todayLogs.length?todayLogs.map(l=>{
    const emp=ge(l.employee_id); if(!emp) return '';
    const typBadge=l.log_type==='lunch'?'<span class="badge blun">Lunch</span>':'<span class="badge bt">Work</span>';
    const outCell=l.clock_out?fmtTime(l.clock_out):'<span class="muted">Active</span>';
    const hrsCell=l.clock_out?cH(l.clock_in,l.clock_out).toFixed(1)+'h':'—';
    const flagStyle=l.flagged?'background:var(--err-bg)':'';
    const flagBadge=l.flagged?'<span class="badge" style="background:var(--err-bg);color:var(--err-text);margin-left:4px" title="Outside approved location">⚑ Flagged</span>':'';
    return '<tr style="'+flagStyle+'"><td><div class="row"><div class="av '+avc(emp.role)+'" style="width:24px;height:24px;font-size:9px">'+ini(emp.name)+'</div><span style="font-weight:600">'+emp.name+'</span>'+flagBadge+'</div></td>'
      +'<td>'+typBadge+'</td>'
      +'<td>'+fmtTime(l.clock_in)+'</td>'
      +'<td>'+outCell+'</td>'
      +'<td style="font-weight:600;color:var(--accent)">'+hrsCell+'</td>'
      +'<td>'+locCell(l)+'</td>'
      +'<td style="display:flex;gap:6px"><button class="btn bsm" style="color:var(--accent);border-color:var(--accent)" data-editlog="'+l.id+'">Edit</button><button class="btn bsm" style="color:var(--err-text);border-color:var(--err-bdr)" data-dellog="'+l.id+'">Del</button></td></tr>';
  }).join(''):'<tr><td colspan="8" class="emp">No logs yet today</td></tr>';
  return `<div class="ph">Live Status</div><div class="ps">Real-time clock-in board · ${new Date().toLocaleDateString('en-US',{timeZone:TZ,weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
  ${todHol?`<div style="background:var(--hol-bg);border:.5px solid var(--hol-bdr);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--hol-text);margin-bottom:16px;display:flex;align-items:center;gap:9px;font-weight:500"><div class="hdot"></div>Public holiday: <strong>${todHol}</strong></div>`:''}
  <div class="g4" style="margin-bottom:20px">
    ${(()=>{const todayFlagged=C.logs.filter(l=>l.log_date===TODAY&&l.flagged).length;
    return [{v:clocked.length,l:'Clocked in',c:'var(--accent)'},{v:openLunch.length,l:'On lunch',c:'var(--lunch-text)'},
       {v:todayFlagged,l:'Flagged clocks',c:todayFlagged>0?'var(--err-text)':'inherit'},{v:staff.filter(e=>e.role==='csr').length,l:'CSRs'}];})()
      .map(x=>`<div class="sc"><div style="font-size:24px;font-weight:700;color:${x.c||'inherit'}">${x.v}</div><div class="muted" style="margin-top:5px">${x.l}</div></div>`).join('')}
  </div>
  <div class="ctitle" style="margin-bottom:12px">Clocked in now</div>
  ${clocked.length?`<div class="g3" style="margin-bottom:20px">${clocked.map(({emp,log,onLunch})=>`
    <div class="lvc lvc-${emp.role==='csr'?'csr':'tech'}" style="${onLunch?'border-top-color:#D97706':''}">
      <div class="row" style="margin-bottom:12px">
        <div class="av ${avc(emp.role)}" style="width:34px;height:34px">${ini(emp.name)}</div>
        <div><div style="font-size:14px;font-weight:700">${emp.name}</div>
          <div class="row" style="gap:5px;margin-top:2px"><span class="badge ${bxc(emp.role)}">${rl(emp.role)}</span>
          ${onLunch?'<span class="badge blun">On Lunch</span>':''}</div></div>
      </div>
      ${onLunch
        ?`<div style="font-family:monospace;font-size:20px;font-weight:700;color:var(--lunch-text)" id="lv${emp.id}">${eld(openLunch.find(l=>l.employee_id===emp.id)?.created_at)}</div><div class="muted">On lunch</div>`
        :`<div style="font-family:monospace;font-size:20px;font-weight:700;color:#1D9E75" id="lv${emp.id}">${eld(log.created_at)}</div><div class="muted">Since ${fmtTime(log.clock_in)}</div>`}
    </div>`).join('')}</div>`:'<div class="card emp" style="margin-bottom:20px">No one currently clocked in</div>'}
  <div class="ctitle" style="margin-bottom:12px">All staff today</div>
  <div class="card"><table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Shift</th><th>Actions</th></tr></thead><tbody>
  ${staff.map(e=>{
    const ol=openLogs.find(l=>l.employee_id===e.id), lun=openLunch.find(l=>l.employee_id===e.id);
    const ts=C.shifts.find(s=>s.employee_id===e.id&&s.shift_date===TODAY);
    const cinBtn=`<button class="btn bsm bgn" data-admin-cin="${e.id}">Clock In</button>`;
    const coutBtn=`<button class="btn bsm brd" data-admin-cout="${e.id}">Clock Out</button>`;
    const lunInBtn=`<button class="btn bsm" style="border-color:var(--lunch-bdr);color:var(--lunch-text)" data-admin-lunchout="${e.id}">Start Lunch</button>`;
    const lunOutBtn=`<button class="btn bsm" style="border-color:var(--ok-bdr);color:var(--ok-text)" data-admin-lunchin="${e.id}">End Lunch</button>`;
    let actions;
    if(lun) actions=lunOutBtn+' '+coutBtn;
    else if(ol) actions=lunInBtn+' '+coutBtn;
    else actions=cinBtn;
    return `<tr>
      <td><div class="row"><div class="av ${avc(e.role)}" style="width:26px;height:26px;font-size:10px">${ini(e.name)}</div><span style="font-weight:600">${e.name}</span></div></td>
      <td><span class="badge ${bxc(e.role)}">${rl(e.role)}</span></td>
      <td>${(()=>{
        const[sh,sm]=ts?ts.start_time.split(':').map(Number):[0,0];
        const jmH=jmNow().h, jmM=jmNow().m;
        const nowMin=jmH*60+jmM, shiftMin=sh*60+sm;
        const hasWorkedToday=C.logs.some(l=>l.employee_id===e.id&&l.log_date===TODAY&&l.log_type==='work'&&!l.deleted_at);
        const isAbsent=!ol&&ts&&!hasWorkedToday&&(nowMin-shiftMin)>=30&&nowMin<(()=>{const[eh,em]=ts.end_time.split(':').map(Number);return eh*60+em+60;})();
        if(isAbsent) return '<div class="row" style="gap:5px"><div class="dot" style="background:#A32D2D"></div><span style="font-size:13px;font-weight:600;color:#A32D2D">Absent</span></div>';
        const lateMin=(ol&&ts)?((()=>{const[ch,cm]=ol.clock_in.split(':').map(Number);return(ch*60+cm)-shiftMin;})()):-1;
        const lateBadge=lateMin>5?'<span class="badge" style="background:#FCEBEB;color:#A32D2D;font-size:10px;margin-left:4px">Late '+lateMin+'m</span>':'';
        // Check for partial shift (clocked out today with < 7h)
        const todayWorkLogs=C.logs.filter(l=>l.employee_id===e.id&&l.log_date===TODAY&&l.log_type==='work'&&l.clock_out&&!l.deleted_at);
        const hasPartial=!ol&&todayWorkLogs.some(l=>l.partial_shift);
        if(hasPartial) return '<div class="row" style="gap:5px"><div class="dot" style="background:#D97706"></div><span style="font-size:13px;font-weight:600;color:#D97706">Partial Shift</span></div>';
        return '<div class="row" style="gap:5px"><div class="dot" style="background:'+( lun?'#D97706':ol?'#1D9E75':'var(--muted)')+'"></div><span style="font-size:13px;font-weight:'+(ol?600:400)+'">'+(lun?'On Lunch':ol?'In':'Out')+'</span>'+lateBadge+'</div>';
      })()}</td>
      <td class="muted">${ts?fmtTime(ts.start_time)+'–'+fmtTime(ts.end_time):'—'}</td>
      <td><div class="row" style="gap:5px">${actions}</div></td>
    </tr>`;
  }).join('')}</tbody></table></div>
  <div class="ctitle" style="margin-top:24px;margin-bottom:12px">Today's clock logs</div>
  <div class="card" style="padding:0"><table class="tbl"><thead><tr><th>Employee</th><th>Type</th><th>In</th><th>Out</th><th>Hrs</th><th>Location</th><th>Actions</th></tr></thead>
  <tbody>${todayRows}</tbody></table></div>`;
}

// ── ADMIN SCHEDULE ────────────────────────────────────────
function aSch() {
  const st=C.employees.filter(e=>e.role!=='admin'&&e.is_active!==false);
  if(!S.hrWeek) S.hrWeek=TODAY;
  const wd=wkDates(S.hrWeek);
  const tog=togBtn();
  const mo=(parseInt(jmNow().dateStr.split('-')[1])-1), yr=parseInt(jmNow().dateStr.split('-')[0]);
  const hdr=`<div class="btw" style="margin-bottom:16px">
    <div><div class="ph">Schedules</div><div class="ps">${S.sv==='month'?MONTH_NAMES[mo]+' '+yr:wd[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+wd[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div></div>
    <div class="row">${tog}<button class="btn bb" id="addShBtn">+ Add shift</button>
    <button class="btn" id="genShBtn" style="color:var(--ok-text);border-color:var(--ok-bdr)">&#9881; Generate shifts</button>
    <button class="btn" id="regenShBtn" style="color:var(--csr);border-color:var(--csr)">&#8635; Regen ${MONTH_NAMES[mo]}</button></div></div>`;
  if(S.sv==='month') {
    const legend=`<div class="card"><div class="ctitle">Legend</div>${st.map(e=>`<div class="row" style="margin-bottom:8px"><div class="emp-dot ${e.role==='csr'?'edc':'edt'}">${ini(e.name)}</div><span style="font-size:13px">${e.name}</span><span class="badge ${bxc(e.role)}" style="font-size:10px;margin-left:auto">${rl(e.role)}</span></div>`).join('')}</div>`;
    return hdr+`<div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">${adminMonthGrid(st, yr, mo)}<div>${holPanel()}${legend}</div></div>`;
  }
  const empRows=st.map(e=>`
    <div class="wl" style="flex-direction:column;align-items:flex-start;gap:3px;padding:7px 10px">
      <span style="font-size:12px;font-weight:700">${e.name.split(' ')[0]}</span>
      <span class="badge ${bxc(e.role)}" style="font-size:10px">${rl(e.role)}</span>
    </div>${empWeekCells(e,wd)}`).join('');
  return hdr+`<div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">
    <div class="card" style="padding:0;overflow:hidden"><div class="twrap">
      <div class="wg" style="grid-template-columns:116px repeat(7,1fr);min-width:640px">
        <div class="wh">Employee</div>${weekHeaders(wd)}${empRows}
      </div></div></div>
    ${holPanel()}</div>`;
}

function adminMonthGrid(staff, yr, mo) {
  const days=mnDates(yr,mo), offset=(new Date(yr,mo,1).getDay()+6)%7;
  let cells='';
  for(let i=0;i<offset;i++) cells+='<div class="mcal-cell empty"></div>';
  days.forEach(d=>{
    const dd=dstr(d),isT=dd===TODAY,h=isHol(dd);
    const working=staff.filter(e=>C.shifts.some(s=>s.employee_id===e.id&&s.shift_date===dd)&&!isDO(e,dow(dd)));
    const offDay=staff.filter(e=>isDO(e,dow(dd)));
    cells+=`<div class="mcal-cell${isT?' tc':''}${h?' hc':''}">
      <div class="mcal-dn${isT?' tn':''}">${isT?`<span class="td-circle">${d.getDate()}</span>`:`<span>${d.getDate()}</span>`}</div>
      ${h?`<div class="msp msp-h">${HOLIDAYS[dd]}</div>`:''}
      <div style="display:flex;flex-wrap:wrap;margin-top:2px">
        ${working.map(e=>`<div class="emp-dot ${e.role==='csr'?'edc':'edt'}" title="${e.name}">${ini(e.name)}</div>`).join('')}
        ${offDay.map(e=>`<div class="emp-dot" title="${e.name} — Day off" style="background:var(--surface2);color:var(--muted);text-decoration:line-through">${ini(e.name)}</div>`).join('')}
      </div>
    </div>`;
  });
  return `<div class="mcal"><div class="mcal-head">${DAYS.map(d=>`<div class="mcal-dh">${d}</div>`).join('')}</div><div class="mcal-body">${cells}</div></div>`;
}

// ── ADMIN TIME OFF ────────────────────────────────────────
function aTO() {
  const pend=C.timeOff.filter(r=>r.status==='pending');
  const res=C.timeOff.filter(r=>r.status!=='pending');
  const pendRows=pend.map(r=>{
    const e=ge(r.employee_id); if(!e) return '';
    const lt=LEAVE_TYPES.find(t=>t.id===r.leave_type)||{label:'Leave',color:'var(--muted)'};
    const rem=leaveRemaining(r.employee_id,r.leave_type);
    return `<div class="rq">
      <div class="av ${avc(e.role)}" style="width:36px;height:36px;font-size:13px">${ini(e.name)}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700">${e.name}</div>
        <div class="row" style="margin:3px 0;gap:6px">
          <span class="badge" style="background:${lt.color}22;color:${lt.color}">${lt.label}</span>
          <span style="font-size:13px">${r.from_date===r.to_date?r.from_date:r.from_date+' – '+r.to_date}</span>
          ${r.days?`<span class="muted">${r.days} day${r.days!==1?'s':''}</span>`:''}
        </div>
        <div class="muted">${r.reason} · ${r.submitted_at}</div>
        <div style="font-size:11px;margin-top:4px;color:var(--muted)">After approval: <strong style="color:${rem-(r.days||0)>=0?'var(--ok-text)':'var(--err-text)'}">${Math.max(0,rem-(r.days||0))}</strong> days remaining</div>
      </div>
      <div class="row"><button class="btn bgn bsm" data-app="${r.id}">Approve</button><button class="btn brd bsm" data-den="${r.id}">Deny</button></div>
    </div>`;
  }).join('');
  const resRows=res.map(r=>{
    const e=ge(r.employee_id); if(!e) return '';
    const lt=LEAVE_TYPES.find(t=>t.id===r.leave_type)||{label:'Leave',color:'var(--muted)'};
    return `<div class="rq" style="opacity:.6">
      <div class="av ${avc(e.role)}" style="width:30px;height:30px;font-size:11px">${ini(e.name)}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${e.name}</div>
        <div class="row" style="gap:6px">
          <span class="badge" style="background:${lt.color}22;color:${lt.color};font-size:10px">${lt.label}</span>
          <span class="muted">${r.from_date===r.to_date?r.from_date:r.from_date+' – '+r.to_date} · ${r.reason}</span>
        </div></div>
      <span class="badge b${r.status==='approved'?'appr':'deny'}">${r.status}</span>
    </div>`;
  }).join('');
  return `<div class="ph">Time Off Requests</div><div class="ps">${pend.length} pending approval</div>
    ${pend.length?`<div class="ctitle" style="margin-bottom:12px">Pending review</div>${pendRows}`:'<div class="card emp">All caught up — no pending requests.</div>'}
    ${res.length?`<div class="ctitle" style="margin:20px 0 12px">Past requests</div>${resRows}`:''}
    ${aSwapPanel()}`;
}

// ── ADMIN HOURS ───────────────────────────────────────────
function aHours() {
  const staff=C.employees.filter(e=>e.role!=='admin'&&e.is_active!==false);
  const filtered=S.hrEmp==='all'?staff:staff.filter(e=>e.id===S.hrEmp);
  const mo=S.hrMonth, yr=CURRENT_YEAR;
  const prefix=`${yr}-${p2(mo+1)}`;
  const viewTog=`<div class="vtog">
    <button class="${S.hrView==='daily'?'von':''}" id="hrDaily">Daily</button>
    <button class="${S.hrView==='weekly'?'von':''}" id="hrWeekly">Weekly</button>
    <button class="${S.hrView==='monthly'?'von':''}" id="hrMonthly">Monthly</button>
  </div>`;
  const empSel=`<select id="hrEmpSel" style="width:160px;padding:6px 10px;font-size:13px">
    <option value="all"${S.hrEmp==='all'?' selected':''}>All employees</option>
    ${staff.map(e=>`<option value="${e.id}"${S.hrEmp===e.id?' selected':''}>${e.name}</option>`).join('')}
  </select>`;
  const mLogs=C.logs.filter(l=>l.log_date.startsWith(prefix)&&l.log_type==='work'&&l.clock_out);
  const totH=mLogs.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0);
  const ytdCards=`<div class="g4" style="margin-bottom:20px">
    <div class="sc"><div style="font-size:24px;font-weight:700;color:var(--accent)">${totH.toFixed(0)}</div><div class="muted" style="margin-top:5px">Hours logged</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700">${new Set(mLogs.map(l=>l.employee_id)).size}</div><div class="muted" style="margin-top:5px">Active employees</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700;color:var(--warn-text)">${C.timeOff.filter(r=>r.status==='pending').length}</div><div class="muted" style="margin-top:5px">Pending requests</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700">${filtered.length>0?(totH/Math.max(filtered.length,1)).toFixed(1):'—'}</div><div class="muted" style="margin-top:5px">Avg hrs/employee</div></div>
  </div>`;
  const monthPick=`<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:16px">
    ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map((mn,mi)=>
      `<button class="btn bsm ${S.hrMonth===mi?'bb':''}" id="hrMon${mi}">${mn}</button>`).join('')}
  </div>`;
  const empRows=filtered.map(e=>{
    const el=C.logs.filter(l=>l.employee_id===e.id&&l.log_date.startsWith(prefix)&&l.log_type==='work'&&l.clock_out);
    const worked=el.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0);
    const schd=C.shifts.filter(s=>s.employee_id===e.id&&s.shift_date.startsWith(prefix));
    const schedH=schd.reduce((a,s)=>a+cH(s.start_time,s.end_time),0);
    const att=schd.length>0?Math.round(new Set(el.map(l=>l.log_date)).size/schd.length*100):0;
    const barClr=att>=90?'#1D9E75':att>=70?'#378ADD':'#E24B4A';
    return `<tr>
      <td><div class="row"><div class="av ${avc(e.role)}" style="width:26px;height:26px;font-size:10px">${ini(e.name)}</div><span style="font-weight:600">${e.name}</span></div></td>
      <td style="font-weight:700;color:var(--accent)">${worked.toFixed(1)}h</td>
      <td>${schedH.toFixed(1)}h</td>
      <td style="text-align:center">${new Set(el.map(l=>l.log_date)).size} / ${schd.length}</td>
      <td style="min-width:100px"><div style="display:flex;align-items:center;gap:6px">
        <div style="flex:1;background:var(--surface2);border-radius:4px;height:16px;overflow:hidden;border:.5px solid var(--border)">
          <div style="width:${att}%;height:100%;background:${barClr}"></div></div>
        <span style="font-size:12px;font-weight:600;color:${barClr};min-width:34px">${att}%</span>
      </div></td>
    </tr>`;
  }).join('');
  const detailLogs=S.hrEmp!=='all'?C.logs.filter(l=>l.employee_id===S.hrEmp&&l.log_date.startsWith(prefix)).sort((a,b)=>a.log_date.localeCompare(b.log_date)||a.log_type.localeCompare(b.log_type)):[];
  const detailSection=S.hrEmp!=='all'?`
    <div class="ctitle" style="margin-top:20px;margin-bottom:12px">Log details — ${C.employees.find(e=>e.id===S.hrEmp)?.name||''}</div>
    <div class="card" style="padding:0"><table class="tbl"><thead><tr><th>Date</th><th>Type</th><th>In</th><th>Out</th><th>Hrs</th><th>Location</th><th>Flag</th><th>Actions</th></tr></thead><tbody>
    ${detailLogs.length?detailLogs.map(l=>`<tr class="${l.log_type==='lunch'?'lrow':''}">
      <td>${l.log_date}</td>
      <td><span class="badge ${l.log_type==='lunch'?'blun':'bt'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>
      <td>${fmtTime(l.clock_in)}</td>
      <td>${l.clock_out?fmtTime(l.clock_out):'<span class="muted">Active</span>'}</td>
      <td style="font-weight:600;color:var(--accent)">${l.clock_out?cH(l.clock_in,l.clock_out).toFixed(1)+'h':'—'}</td>
      <td>${locCell(l)}</td>
      <td>${l.flagged?'<span class="badge" style="background:var(--err-bg);color:var(--err-text)">⚑ Flagged</span>':'<span class="muted">—</span>'}</td>
      <td style="display:flex;gap:6px"><button class="btn bsm" style="color:var(--accent);border-color:var(--accent)" data-editlog="${l.id}">Edit</button><button class="btn bsm" style="color:var(--err-text);border-color:var(--err-bdr)" data-dellog="${l.id}">Del</button></td>
    </tr>`).join(''):`<tr><td colspan="8" class="emp">No logs this month</td></tr>`}
    </tbody></table></div>`:'';
  return `<div class="btw" style="margin-bottom:4px"><div><div class="ph">Hours Tracker</div><div class="ps">${MONTH_NAMES[mo]} ${yr}</div></div><button class="btn" id="exportCSV" style="color:var(--ok-text);border-color:var(--ok-bdr)">⬇ Export CSV</button></div>
    ${ytdCards}<div class="btw" style="margin-bottom:16px">${viewTog}${empSel}</div>
    ${monthPick}
    <div class="card" style="padding:0"><table class="tbl"><thead><tr><th>Employee</th><th>Logged</th><th>Scheduled</th><th style="text-align:center">Days worked</th><th>Attendance</th></tr></thead>
    <tbody>${empRows||'<tr><td colspan="5" class="emp">No data for this period</td></tr>'}</tbody></table></div>
    ${detailSection}`;
}

// ── ADMIN EMPLOYEES ───────────────────────────────────────

    <div class="row" style="gap:8px">

// ── MODALS ────────────────────────────────────────────────
function rMd() {
  if(S.md&&S.md.startsWith('dayoff:')) {
    const eid=S.md.split(':')[1], e=C.employees.find(x=>x.id===eid);
    const cur=e.days_off||[], full=cur.length>=2;
    const dayBtns=DAYS.map((d,i)=>{const sel=cur.includes(i),dis=full&&!sel;
      return `<button class="${sel?'sel':''}" data-di="${i}"${dis?' disabled':''} style="${dis?'opacity:.32;cursor:not-allowed':''}"> ${d}</button>`;}).join('');
    const ready=cur.length===2;
    return `<div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">Days Off — ${e.name}</div>
      <div class="muted" style="margin-bottom:16px">Select exactly 2 days off per week</div>
      <div class="daypick" id="dpick">${dayBtns}</div>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0 4px">
        <span style="font-size:12px;font-weight:600;color:${ready?'var(--ok-text)':'var(--err-text)'}">${cur.length}/2 selected</span>
        ${ready?'<span style="font-size:12px;color:var(--ok-text)">✓ Ready to save</span>':`<span class="muted">— select ${2-cur.length} more</span>`}
      </div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn bb" id="saveDO" data-eid="${eid}"${ready?'':' disabled style="opacity:.5;cursor:not-allowed"'}>Save</button></div>
    </div>`;
  }

      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Remove Employee?</div>
      <div class="muted" style="margin-bottom:20px">This will permanently remove <strong>${e.name}</strong> and cannot be undone.</div>
      <div style="background:var(--err-bg);border:.5px solid var(--err-bdr);border-radius:var(--rs);padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--err-text)">
        <div class="row"><div class="av ${avc(e.role)}" style="width:32px;height:32px">${ini(e.name)}</div>
        <div><div style="font-weight:700">${e.name}</div><div class="muted">${rl(e.role)} · @${e.username}</div></div></div>
      </div>
      <div class="fg"><label>Type the employee's username to confirm</label><input type="text" id="removeConfirmInput" placeholder="${e.username}" autocomplete="off"></div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn brd" id="confirmRemoveBtn" data-eid="${eid}" disabled style="opacity:.4;cursor:not-allowed">Remove employee</button></div>
    </div>`;

  if(S.md==='changePw') return changePwModal();
  if(S.md==='addEmp') return `<div class="modal-box">
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">Add Employee</div>
    <div class="fg"><label>Full name</label><input type="text" id="en" placeholder="First Last"></div>
    <div class="fg"><label>Email</label><input type="email" id="ee" placeholder="employee@netflair.com"></div>

  if(S.md==='addShift') return `<div class="modal-box">
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">Add Shift</div>
    <div class="fg"><label>Employee</label><select id="se">${C.employees.filter(e=>e.role!=='admin').map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div>
    <div class="fg"><label>Date</label><input type="date" id="sd" value="${TODAY}" onchange="(function(v){const d=new Date(v+'T00:00:00');const sat=d.getDay()===6;document.getElementById('ss').value=sat?'09:30':'09:00';document.getElementById('se2').value=sat?'14:00':'17:00';})(this.value)"></div>

  if(S.md==='newAnn') {
    return `<div class="modal-box">

  if(S.md&&S.md.startsWith('editLog:')) {

      <div class="muted" style="margin-bottom:16px">This will fill in any missing shifts for <strong>${MONTH_NAMES[mo]} ${yr}</strong> at 09:00–17:00. Existing shifts are preserved. Days off and holidays are skipped.</div>

        <button class="btn bb" id="confirmRegen" data-y="${yr}" data-m="${mo}">Regenerate ${MONTH_NAMES[mo]}</button></div>
    </div>`;
  }
  if(S.md==='genShifts') {
    const mo=(parseInt(jmNow().dateStr.split('-')[1])-1), yr=parseInt(jmNow().dateStr.split('-')[0]);
    const nextMo=mo===11?0:mo+1, nextYr=mo===11?yr+1:yr;
    return `<div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">Generate Shifts</div>
      <div class="muted" style="margin-bottom:16px">Generate working days for ${MONTH_NAMES[nextMo]} ${nextYr} at 09:00–17:00. Days off and holidays are skipped.</div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn bb" id="confirmGen" data-y="${nextYr}" data-m="${nextMo}">Generate ${MONTH_NAMES[nextMo]}</button></div>
    </div>`;
  }
  if(S.md==='scanning')    return rmdScanning();
  if(S.md==='reviewScan')  return rmdReviewScan();
  if(S.md==='addFuel')     return rmdFleetAddFuel();
  if(S.md==='addExp')      return rmdFleetAddExp();
  if(S.md==='addMaint')    return rmdFleetAddMaint();
  if(S.md==='addVehicle')  return rmdAddVehicle();
  if(S.md&&S.md.startsWith('editSchedule:')) return rmdEditSchedule();
  if(S.md&&S.md.startsWith('addSchedule:'))  return rmdAddSchedule();
  if(S.md&&S.md.startsWith('editVehicle:')) return rmdEditVehicle();
  if(S.md&&S.md.startsWith('viewVehicle:')) return rmdViewVehicle();
  if(S.md&&S.md.type==='inv_issue')       return invIssueForm(S.md.id, S.md.groupKey);
  if(S.md&&S.md.type==='inv_device_view') return invDeviceViewModal(S.md.item, S.md.history);
  if(S.md&&S.md.type==='inv_form')        return invForm(S.md.item);
  return '';
}

// ── AUTH ACTIONS ──────────────────────────────────────────
async function doChangePassword() {
  const pw1=$('cpPw1')?.value, pw2=$('cpPw2')?.value;
  const err=$('cpErr'), ok=$('cpOk');
  if(!pw1||pw1.length<8||pw1!==pw2){if(err)err.style.display='block';if(ok)ok.style.display='none';return;}
  if(err)err.style.display='none';
  const btn=$('cpSave');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const {error}=await sb.auth.updateUser({password:pw1});

async function saveAdminLeave() {
  const btn=$('saveAddLeave'); if(!btn) return;
  const eid=btn.dataset.eid;
  const type=$('al_type')?.value;
  const from=$('al_from')?.value;
  const to=$('al_to')?.value;
  const reason=$('al_reason')?.value||'';
  const err=$('alErr');
  if(!type||!from||!to){if(err)err.style.display='block';return;}
  if(err)err.style.display='none';
  btn.disabled=true; btn.textContent='Saving…';

  // Calculate number of days (inclusive, excluding weekends)
  const d1=new Date(from+'T12:00:00'), d2=new Date(to+'T12:00:00');
  if(d2<d1){notif('To date must be on or after From date','err');btn.disabled=false;btn.textContent='Add leave';return;}
  let days=0, cur=new Date(d1);
  while(cur<=d2){const wd=cur.getDay();if(wd!==0&&wd!==6)days++;cur.setDate(cur.getDate()+1);}
  if(!days){notif('No working days in selected range','err');btn.disabled=false;btn.textContent='Add leave';return;}

  // Insert time_off_request as admin-approved
  const {data:req, error:reqErr}=await sb.from('time_off_requests').insert({
    employee_id:eid, leave_type:type, from_date:from, to_date:to,
    status:'approved', notes:reason||null,
  }).select().single();
  if(reqErr){notif('Error: '+reqErr.message,'err');btn.disabled=false;btn.textContent='Add leave';return;}
  C.timeOff.unshift(req);

  // Update used_days in leave_balances
  const bal=getBalance(eid,type);
  const newUsed=(bal.used_days||0)+days;
  const {error:balErr}=await sb.from('leave_balances').upsert(
    {employee_id:eid,leave_type:type,year:CURRENT_YEAR,
     initial_days:bal.initial_days||0,adjustment:bal.adjustment||0,used_days:newUsed},
    {onConflict:'employee_id,leave_type,year'}
  );
  if(balErr){notif('Warning: leave logged but balance not updated','err');}
  else {
    const bi=C.balances.findIndex(b=>b.employee_id===eid&&b.leave_type===type);
    if(bi>=0) C.balances[bi].used_days=newUsed;
    else C.balances.push({employee_id:eid,leave_type:type,year:CURRENT_YEAR,initial_days:bal.initial_days||0,adjustment:bal.adjustment||0,used_days:newUsed});
  }

  S.md=null;
  notif(`${days} day${days!==1?'s':''} of ${LEAVE_TYPES.find(t=>t.id===type)?.label||'leave'} added for ${C.employees.find(e=>e.id===eid)?.name||'employee'}`);
  render();
}

// ── PERFORMANCE TRACKER ──────────────────────────────────
const PERF_POINTS = { WIFI_INSTALL:5, FIBER_INSTALL:6, REMOVAL:1, OUTAGE:5, FIBER_SUPPORT:4, WIFI_SUPPORT:3 };
const PERF_LABELS = { WIFI_INSTALL:'WiFi Install', FIBER_INSTALL:'Fiber Install', REMOVAL:'Removal', OUTAGE:'Outage', FIBER_SUPPORT:'Fiber Support', WIFI_SUPPORT:'WiFi Support' };
let _perfView = 'dashboard'; // dashboard | technicians | log | executive
let _perfShowAll = false;
let _perfAddRows = null;
let _perfCsvRows = [];
let _perfCsvFile = '';
let _perfCsvResult = null;

function perfWkBounds() {
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  const day = now.getDay(), diff = now.getDate()-day+(day===0?-6:1);
  const mon = new Date(now); mon.setDate(diff); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {start:mon,end:sun};
}
function perfMoBounds() {
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  return {start:new Date(now.getFullYear(),now.getMonth(),1,0,0,0), end:new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59)};
}
function perfParseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function perfFmt(n) { return new Intl.NumberFormat().format(n); }

function perfPenalties(jobs) {
  const pen = new Set();
  // Outages are never penalised — they are not the technician's fault
  const sorted = [...jobs].filter(j=>j.id&&j.client_name&&j.client_name.trim()&&j.job_type!=='OUTAGE').sort((a,b)=>a.job_date.localeCompare(b.job_date));
  const groups = {};
  for (const j of sorted) { const k=j.client_name.trim().toLowerCase(); (groups[k]=groups[k]||[]).push(j); }
  for (const list of Object.values(groups)) {
    if (list.length<2) continue;
    for (let i=1;i<list.length;i++) {
      const days=(perfParseDate(list[i].job_date)-perfParseDate(list[i-1].job_date))/86400000;
      if (days<=30&&list[i-1].id) pen.add(list[i-1].id);
    }
  }
  return pen;
}

function perfAgg() {
  const wb=perfWkBounds(), mb=perfMoBounds(), pen=perfPenalties(C.perfJobs);
  const byTech={}, jtW=Object.fromEntries(Object.keys(PERF_POINTS).map(k=>[k,0])), jtM=Object.fromEntries(Object.keys(PERF_POINTS).map(k=>[k,0])), byMo={};
  let totA=0,totW=0,totM=0;
  for (const j of C.perfJobs) {
    const d=perfParseDate(j.job_date), pts=(j.id&&pen.has(j.id))?0:(PERF_POINTS[j.job_type]||0), tid=String(j.technician_id);
    if (!byTech[tid]) byTech[tid]={total:0,week:0,month:0,jobsAll:0,jobsWeek:0,jobsMonth:0};
    const b=byTech[tid]; b.total+=pts; b.jobsAll++; totA+=pts;
    const inW=d>=wb.start&&d<=wb.end, inM=d>=mb.start&&d<=mb.end;
    if(inW){b.week+=pts;b.jobsWeek++;totW+=pts;jtW[j.job_type]=(jtW[j.job_type]||0)+1;}
    if(inM){b.month+=pts;b.jobsMonth++;totM+=pts;jtM[j.job_type]=(jtM[j.job_type]||0)+1;}
    const mk=d.getFullYear()+'-'+p2(d.getMonth()+1);
    if(!byMo[mk])byMo[mk]={year:d.getFullYear(),month:d.getMonth(),techs:{}};
    if(!byMo[mk].techs[tid])byMo[mk].techs[tid]={jobs:0,points:0,repeats:0};
    byMo[mk].techs[tid].jobs++; byMo[mk].techs[tid].points+=pts;
    if(j.id&&pen.has(j.id))byMo[mk].techs[tid].repeats++;
  }
  const tById=Object.fromEntries(C.perfTechs.map(t=>[String(t.id),t]));
  const lbW=Object.entries(byTech).map(([id,s])=>({id,name:tById[id]?.name||id,...s})).sort((a,b)=>b.week-a.week);
  const lbM=Object.entries(byTech).map(([id,s])=>({id,name:tById[id]?.name||id,...s})).sort((a,b)=>b.month-a.month);
  const moBreak=Object.entries(byMo).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>({key:k,label:MONTH_NAMES[v.month]+' '+v.year,techs:v.techs}));
  return {pen,totals:{all:totA,week:totW,month:totM},jtW,jtM,lbW,lbM,moBreak,wb,mb,tById};
}

function perfTable(headers, rows, extra='') {
  const ths=headers.map(h=>`<th>${h}</th>`).join('');
  const trs=rows.map(r=>`<tr ${extra}>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return `<div class="twrap" style="margin-bottom:4px"><table class="tbl"><thead><tr>${ths}</tr></thead><tbody>${trs||'<tr><td colspan="${headers.length}" class="emp">No data</td></tr>'}</tbody></table></div>`;
}

function aPerformance() {
  if (!C.perfJobs.length && !C.perfTechs.length) {
    loadPerf().then(()=>render());
    return '<div class="loading-page" style="min-height:40vh"><div class="spinner"></div><div class="muted">Loading performance data…</div></div>';
  }

  const agg = perfAgg();
  const wLabel=`${dstr(agg.wb.start)} – ${dstr(agg.wb.end)}`;
  const mLabel=`${dstr(agg.mb.start)} – ${dstr(agg.mb.end)}`;

  // Sub-nav
  const subNav=['dashboard','technicians','log','executive'].map(v=>
    `<button class="btn${_perfView===v?' bb':''} bsm" onclick="setPerfView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`
  ).join('');

  let body='';

  if (_perfView==='dashboard') {
    const lbWRows=agg.lbW.map((x,i)=>[`${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${x.name}`,`<strong style="color:var(--accent)">${perfFmt(x.week)}</strong>`,x.jobsWeek]);
    const jtRows=Object.entries(PERF_LABELS).map(([k,l])=>[l,PERF_POINTS[k],agg.jtW[k]||0]);
    const moHtml=agg.lbW.map(t=>`
      <div><div class="ctitle">${t.name} — Monthly</div>
      ${perfTable(['Month','Jobs','Points','Repeats'],agg.moBreak.map(m=>[m.label,m.techs[t.id]?.jobs||0,perfFmt(m.techs[t.id]?.points||0),m.techs[t.id]?.repeats||0]))}</div>`).join('');
    const penRows=C.perfJobs.filter(j=>j.id&&agg.pen.has(j.id)).sort((a,b)=>b.job_date.localeCompare(a.job_date))
      .map(j=>[j.job_date,agg.tById[j.technician_id]?.name||j.technician_id,PERF_LABELS[j.job_type]||j.job_type,j.client_name||'—',`<span style="color:var(--err-text)">−${PERF_POINTS[j.job_type]||0}</span>`]);
    body=`
      <div class="g4" style="margin-bottom:16px">
        <div class="sc"><div style="font-size:22px;font-weight:800;color:var(--accent)">${perfFmt(agg.totals.week)}</div><div class="muted" style="margin-top:4px">Pts this week</div><div style="font-size:11px;color:var(--muted)">${wLabel}</div></div>
        <div class="sc"><div style="font-size:22px;font-weight:800;color:var(--adm)">${perfFmt(agg.totals.month)}</div><div class="muted" style="margin-top:4px">Pts this month</div><div style="font-size:11px;color:var(--muted)">${mLabel}</div></div>
        <div class="sc"><div style="font-size:22px;font-weight:800">${perfFmt(agg.totals.all)}</div><div class="muted" style="margin-top:4px">All-time pts</div><div style="font-size:11px;color:var(--muted)">${C.perfJobs.length} jobs</div></div>

  else if (_perfView==='log') {

      <td><select onchange="perfRowUpdate(${i},'job_type',this.value)">${Object.entries(PERF_LABELS).map(([k,l])=>`<option value="${k}" ${r.job_type===k?'selected':''}>${l}</option>`).join('')}</select></td>
      <td><input type="text" placeholder="Client" value="${r.client_name||''}" oninput="perfRowUpdate(${i},'client_name',this.value)"></td>
      <td><input type="text" placeholder="Notes" value="${r.notes||''}" oninput="perfRowUpdate(${i},'notes',this.value)"></td>
      <td><button class="btn bsm brd" onclick="perfRemoveRow(${i})">✕</button></td>
    </tr>`).join('');
    const displayJobs=_perfShowAll?C.perfJobs:C.perfJobs.slice(0,30);
    const jobRows=displayJobs.map(j=>{
      const isPen=j.id&&agg.pen.has(j.id), pts=isPen?0:(PERF_POINTS[j.job_type]||0);

      return `<tr style="${isPen?'background:var(--err-bg)':''}">
