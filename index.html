<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Netflair Workforce</title>

<style>
:root{
  --bg:#f8f8f7;--surface:#fff;--surface2:#f1f0ed;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --text:#1a1a1a;--muted:#6b6b6b;
  --accent:#185FA5;--accent-light:#E6F1FB;
  --csr:#534AB7;--csr-light:#EEEDFE;
  --adm:#854F0B;--adm-light:#FAEEDA;
  --ok-bg:#EAF3DE;--ok-text:#27500A;--ok-bdr:#639922;
  --warn-bg:#FAEEDA;--warn-text:#854F0B;
  --err-bg:#FCEBEB;--err-text:#791F1F;--err-bdr:#A32D2D;
  --lunch-bg:#FEF3C7;--lunch-text:#92400E;--lunch-bdr:#D97706;
  --hol-bg:#FAEEDA;--hol-text:#854F0B;--hol-bdr:#BA7517;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;min-height:100vh}
.sb{width:200px;background:var(--surface2);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.mn{margin-left:200px;flex:1;padding:28px;min-height:100vh}
.logo-a{padding:14px 16px 12px;border-bottom:.5px solid var(--border);margin-bottom:8px}
.logo{font-size:19px;font-weight:700}.logo .ac{color:var(--accent)}
.logo-s{font-size:11px;color:var(--muted);margin-top:1px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;transition:all .12s}
.ni:hover{background:var(--surface);color:var(--text)}
.ni.on{border-left-color:var(--accent);color:var(--accent);background:rgba(24,95,165,.07);font-weight:600}
.sf{margin-top:auto;padding:12px 14px;border-top:.5px solid var(--border)}
.urow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.ctitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sc{background:var(--surface2);border-radius:var(--rs);padding:14px 16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);border:.5px solid var(--border2);background:transparent;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;font-weight:500;transition:background .12s}
.btn:hover{background:var(--surface2)}
.bb{background:var(--accent);color:#fff;border-color:var(--accent)}.bb:hover{background:#0C447C}
.bgn{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-bdr)}
.brd{background:var(--err-bg);color:var(--err-text);border-color:var(--err-bdr)}
.bfw{width:100%;justify-content:center;padding:10px 14px}.bsm{padding:5px 10px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.bt{background:var(--accent-light);color:var(--accent)}.bc{background:var(--csr-light);color:var(--csr)}
.ba{background:var(--adm-light);color:var(--adm)}.bpend{background:var(--warn-bg);color:var(--warn-text)}
.bappr{background:var(--ok-bg);color:var(--ok-text)}.bdeny{background:var(--err-bg);color:var(--err-text)}
.blun{background:var(--lunch-bg);color:var(--lunch-text)}
.av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.avt{background:var(--accent-light);color:var(--accent)}.avc{background:var(--csr-light);color:var(--csr)}.ava{background:var(--adm-light);color:var(--adm)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--muted);padding:8px 12px;border-bottom:.5px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:11px 12px;border-bottom:.5px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--surface2)}
.lrow td{background:rgba(217,119,6,.04);color:var(--lunch-text)}
input,select,textarea{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--rs);padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.fg{margin-bottom:13px}
.ph{font-size:22px;font-weight:700;margin-bottom:4px}.ps{font-size:13px;color:var(--muted);margin-bottom:20px}
.cknum{font-family:'SF Mono','Fira Mono',monospace;font-size:52px;font-weight:700;letter-spacing:2px;text-align:center;line-height:1;padding:10px 0 8px}
.ckbtn{width:128px;height:128px;border-radius:50%;border:2px solid;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;font-family:inherit;transition:transform .15s}
.ckbtn:hover{transform:scale(1.05)}
.ckbtn-in{background:var(--ok-bg);color:var(--ok-text);border-color:#1D9E75}
.ckbtn-out{background:var(--err-bg);color:var(--err-text);border-color:var(--err-bdr)}
.lbtn{width:84px;height:84px;border-radius:50%;border:2px solid var(--lunch-bdr);background:var(--lunch-bg);color:var(--lunch-text);font-size:12px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:inherit;transition:transform .15s;margin:0 auto}
.lbtn:hover{transform:scale(1.05)}
.lbtn-ret{border-color:var(--ok-bdr);background:var(--ok-bg);color:var(--ok-text)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.wg{display:grid;border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.wh{background:var(--surface2);padding:9px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);border-bottom:.5px solid var(--border);text-transform:uppercase}
.wh.th{color:var(--accent)}.wh.hh{background:var(--hol-bg)}
.whs{font-size:9px;display:block;letter-spacing:.5px}.whn{font-size:16px;font-weight:700;display:block}
.whhol{font-size:9px;color:var(--hol-text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;margin:0 auto}
.wc{border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);min-height:66px;padding:4px}
.wc:last-child{border-right:none}.wc.tc{background:rgba(24,95,165,.04)}.wc.hc{background:rgba(186,117,23,.05)}
.wc.doc{background:repeating-linear-gradient(135deg,var(--surface2) 0,var(--surface2) 3px,var(--bg) 3px,var(--bg) 8px)}
.wl{background:var(--surface2);border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);padding:7px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.sp{border-radius:0 3px 3px 0;padding:3px 6px;font-size:10px;font-weight:700;margin-bottom:2px;border-left:2px solid;line-height:1.4}
.spt{background:var(--accent-light);color:var(--accent);border-color:#378ADD}
.spc{background:var(--csr-light);color:var(--csr);border-color:#7F77DD}
.sph{background:var(--hol-bg);color:var(--hol-text);border-color:var(--hol-bdr);font-style:italic}
.do-tag{display:inline-block;background:var(--err-bg);color:var(--err-text);border:.5px solid var(--err-bdr);border-radius:3px;font-size:9px;font-weight:700;padding:2px 6px;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.mcal{border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.mcal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:.5px solid var(--border)}
.mcal-dh{padding:8px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.mcal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.mcal-cell{border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);min-height:82px;padding:5px}
.mcal-cell:nth-child(7n){border-right:none}
.mcal-cell.empty{background:var(--surface2);opacity:.4}
.mcal-cell.tc{background:rgba(24,95,165,.04)}.mcal-cell.hc{background:rgba(186,117,23,.05)}
.mcal-cell.doc{background:repeating-linear-gradient(135deg,var(--surface2) 0,var(--surface2) 4px,var(--bg) 4px,var(--bg) 10px)}
.mcal-dn{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:3px}
.mcal-dn.tn{color:var(--accent)}
.td-circle{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.msp{border-radius:3px;padding:2px 5px;font-size:9px;font-weight:700;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.msp-t{background:var(--accent-light);color:var(--accent)}.msp-c{background:var(--csr-light);color:var(--csr)}
.msp-h{background:var(--hol-bg);color:var(--hol-text);font-style:italic}
.emp-dot{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:700;margin:1px}
.edt{background:var(--accent-light);color:var(--accent)}.edc{background:var(--csr-light);color:var(--csr)}
.vtog{display:inline-flex;border:.5px solid var(--border2);border-radius:var(--rs);overflow:hidden}
.vtog button{padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:background .12s}
.vtog button.von{background:var(--accent);color:#fff}
.vtog button:not(.von):hover{background:var(--surface2)}
.daypick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.daypick button{width:44px;height:44px;border-radius:50%;border:.5px solid var(--border2);background:transparent;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .12s}
.daypick button.sel{background:var(--err-bg);color:var(--err-text);border-color:var(--err-bdr)}
.daypick button:not(.sel):not(:disabled):hover{background:var(--surface2)}
.daypick button:disabled{opacity:.32;cursor:not-allowed}
.row{display:flex;align-items:center;gap:8px}
.btw{display:flex;justify-content:space-between;align-items:center}
.muted{color:var(--muted);font-size:12px}.emp{text-align:center;padding:28px;color:var(--muted)}
.eb{background:var(--err-bg);color:var(--err-text);border-radius:var(--rs);padding:9px 12px;font-size:13px;margin-bottom:13px;display:none;font-weight:500}
.rq{display:flex;align-items:center;gap:12px;padding:13px 14px;border:.5px solid var(--border);border-radius:var(--rs);margin-bottom:10px;background:var(--surface)}
.hbr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hbt{flex:1;background:var(--surface2);border-radius:4px;height:24px;overflow:hidden;border:.5px solid var(--border)}
.hbf{height:100%;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;color:#fff}
.lvc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:16px;border-top:3px solid}
.lvc-tech{border-top-color:#378ADD}.lvc-csr{border-top-color:#7F77DD}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
.lcard{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:38px 34px;width:370px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.hdot{width:8px;height:8px;border-radius:50%;background:var(--hol-bdr);flex-shrink:0}
.hrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)}
.hrow:last-child{border-bottom:none}
.lunch-banner{background:var(--lunch-bg);border:.5px solid var(--lunch-bdr);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--lunch-text);margin-bottom:10px;display:flex;align-items:center;gap:9px;font-weight:600}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--lunch-bdr);flex-shrink:0;animation:lp 1.4s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.divider{border:none;border-top:.5px solid var(--border);margin:16px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:28px;width:420px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.notif{position:fixed;top:16px;right:16px;background:var(--surface);border:.5px solid var(--border2);border-radius:var(--rs);padding:11px 16px;font-size:13px;font-weight:500;z-index:999;display:flex;align-items:center;gap:9px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:280px;animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.twrap{overflow-x:auto}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--surface2)}
</style>

<body>
<div id="root"><div class="loading-page"><div class="spinner"></div><div class="muted">Loading Netflair Workforce…</div></div></div>

<script>
// ── SUPABASE CLIENT ───────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(
  'https://eiwilltaxbavvskaugdv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpd2lsbHRheGJhdnZza2F1Z2R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTU0MDcsImV4cCI6MjA5MTM3MTQwN30.b-SQ6v9n4nyrj7aInoTUHUcKSTIPC59SRrAC0aV-j60'
);

// ── CONSTANTS ─────────────────────────────────────────────
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const TODAY = new Date().toISOString().split('T')[0]; // real today
const CURRENT_YEAR = new Date().getFullYear();
const HOLIDAYS = {
  '2026-01-01':"New Year's Day",'2026-02-18':'Ash Wednesday',
  '2026-04-03':'Good Friday','2026-04-06':'Easter Monday',
  '2026-05-23':'National Labour Day','2026-08-01':'Emancipation Day',
  '2026-08-06':'Independence Day','2026-10-19':'National Heroes Day',
  '2026-12-25':'Christmas Day','2026-12-26':'Boxing Day',
};
const LEAVE_TYPES = [
  {id:'sick',     label:'Sick Day', color:'#185FA5'},
  {id:'vacation', label:'Vacation', color:'#E24B4A'},
  {id:'pto',      label:'PTO',      color:'#1D9E75'},
];
const GEO_RADIUS_M = 200;

// ── APP STATE ─────────────────────────────────────────────
let S = {
  session: null, employee: null,
  tab:'clock', atab:'live',
  sv:'week', hrView:'monthly', hrEmp:'all',
  hrMonth: new Date().getMonth(),
  hrDay: TODAY, hrWeek: null,
  md: null, now: new Date(),
  forgotPassword: false, passwordReset: false,
  // live clock state
  activeLog: null,   // current open work clock_log row
  lunchLog: null,    // current open lunch clock_log row
};

// ── DATA CACHE ────────────────────────────────────────────
let C = {
  employees: [], shifts: [], logs: [], timeOff: [],
  balances: [], locations: [], liveStatus: {},
};

// ── HELPERS ───────────────────────────────────────────────
const p2  = n => String(n).padStart(2,'0');
const ini = n => n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const ge  = id => C.employees.find(e=>e.id===id);
const avc = r => r==='technician'?'avt':r==='csr'?'avc':'ava';
const bxc = r => r==='technician'?'bt':r==='csr'?'bc':'ba';
const rl  = r => r==='csr'?'CSR':r==='technician'?'Tech':'Admin';
const isHol = d => HOLIDAYS[d]||null;
const dow = d => (new Date(d+'T12:00:00').getDay()+6)%7;
const isDO = (emp,di) => emp&&emp.days_off&&emp.days_off.includes(di);
const fmtTime = t => { if(!t) return '—'; const [h,m]=t.split(':').map(Number),ap=h>=12?'PM':'AM',h12=h%12||12; return h12+':'+p2(m)+' '+ap; };
const fmtNow = d => { const h=d.getHours(),m=d.getMinutes(),s=d.getSeconds(),ap=h>=12?'PM':'AM',h12=h%12||12; return p2(h12)+':'+p2(m)+':'+p2(s)+' '+ap; };
const fmtM = d => { const h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM',h12=h%12||12; return h12+':'+p2(m)+' '+ap; };
const cH = (i,o) => { const[ih,im]=i.split(':').map(Number),[oh,om]=o.split(':').map(Number); return((oh*60+om)-(ih*60+im))/60; };
const eld = s => { const ms=Date.now()-new Date(s).getTime(),h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),sc=Math.floor((ms%60000)/1000); return p2(h)+':'+p2(m)+':'+p2(sc); };
const dstr = d => d instanceof Date ? d.toISOString().split('T')[0] : d;

function wkDates(weekStr) {
  const base = weekStr || TODAY;
  const d=new Date(base+'T12:00:00'),dy=d.getDay(),m=new Date(d);
  m.setDate(d.getDate()-(dy===0?6:dy-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x;});
}
function mnDates(y,mo) {
  const days=[],c=new Date(y,mo+1,0).getDate();
  for(let i=1;i<=c;i++) days.push(new Date(y,mo,i));
  return days;
}

function notif(msg,t='ok') {
  document.querySelectorAll('.notif').forEach(n=>n.remove());
  const n=document.createElement('div'); n.className='notif';
  n.style.borderLeft='3px solid '+(t==='ok'?'#1D9E75':t==='lunch'?'#D97706':'#A32D2D');
  const dot=document.createElement('div');
  dot.style.cssText='width:8px;height:8px;border-radius:50%;flex-shrink:0;background:'+(t==='ok'?'#1D9E75':t==='lunch'?'#D97706':'#A32D2D');
  n.appendChild(dot); n.appendChild(document.createTextNode(msg));
  document.body.appendChild(n); setTimeout(()=>n.remove(),3000);
}

// ── DATA LAYER ────────────────────────────────────────────
async function loadAll() {
  const year = CURRENT_YEAR;
  const [emps, shifts, logs, to, bal, locs] = await Promise.all([
    sb.from('employees').select('*').order('name'),
    sb.from('shifts').select('*').gte('shift_date', year+'-01-01').lte('shift_date', year+'-12-31'),
    sb.from('clock_logs').select('*').gte('log_date', year+'-01-01'),
    sb.from('time_off_requests').select('*').order('created_at', {ascending:false}),
    sb.from('leave_balances').select('*').eq('year', year),
    sb.from('clock_locations').select('*').eq('active', true),
  ]);
  C.employees  = emps.data   || [];
  C.shifts     = shifts.data || [];
  C.logs       = logs.data   || [];
  C.timeOff    = to.data     || [];
  C.balances   = bal.data    || [];
  C.locations  = locs.data   || [];
}

async function reloadLogs() {
  const { data } = await sb.from('clock_logs').select('*').gte('log_date', CURRENT_YEAR+'-01-01');
  C.logs = data || [];
}
async function reloadTO() {
  const { data } = await sb.from('time_off_requests').select('*').order('created_at',{ascending:false});
  C.timeOff = data || [];
}
async function reloadBalances() {
  const { data } = await sb.from('leave_balances').select('*').eq('year', CURRENT_YEAR);
  C.balances = data || [];
}
async function reloadShifts() {
  const { data } = await sb.from('shifts').select('*').gte('shift_date', CURRENT_YEAR+'-01-01').lte('shift_date', CURRENT_YEAR+'-12-31');
  C.shifts = data || [];
}

// Balance helpers
function getBalance(empId, type) {
  return C.balances.find(b=>b.employee_id===empId&&b.leave_type===type) || {initial_days:0,adjustment:0,used_days:0};
}
function leaveTotal(empId, type) { const b=getBalance(empId,type); return b.initial_days+b.adjustment; }
function leaveRemaining(empId, type) { const b=getBalance(empId,type); return Math.max(0,leaveTotal(empId,type)-b.used_days); }

// Clock state helpers
function myOpenWorkLog() {
  return C.logs.find(l=>l.employee_id===S.employee.id&&l.log_date===TODAY&&l.log_type==='work'&&!l.clock_out);
}
function myOpenLunchLog() {
  return C.logs.find(l=>l.employee_id===S.employee.id&&l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
}
function isClocked() { return !!myOpenWorkLog(); }
function onLunch()   { return !!myOpenLunchLog(); }

// ── CLOCK IN/OUT ──────────────────────────────────────────
async function doClockIn(lat, lng) {
  const now = new Date();
  const timeStr = p2(now.getHours())+':'+p2(now.getMinutes());
  const { data, error } = await sb.from('clock_logs').insert({
    employee_id: S.employee.id,
    log_date: TODAY,
    clock_in: timeStr,
    log_type: 'work',
    lat: lat||null,
    lng: lng||null,
  }).select().single();
  if (error) { notif('Clock-in failed: '+error.message,'err'); return; }
  C.logs.push(data);
  notif('Clocked in at '+fmtM(now));
  render();
}

async function doClockOut() {
  const log = myOpenWorkLog(); if(!log) return;
  // End any open lunch first
  const lunchLog = myOpenLunchLog();
  if (lunchLog) {
    const now = new Date(), t = p2(now.getHours())+':'+p2(now.getMinutes());
    await sb.from('clock_logs').update({clock_out:t}).eq('id',lunchLog.id);
    const idx = C.logs.findIndex(l=>l.id===lunchLog.id);
    if(idx>=0) C.logs[idx].clock_out=t;
  }
  const now = new Date(), t = p2(now.getHours())+':'+p2(now.getMinutes());
  await sb.from('clock_logs').update({clock_out:t}).eq('id',log.id);
  const idx = C.logs.findIndex(l=>l.id===log.id);
  if(idx>=0) C.logs[idx].clock_out=t;
  notif('Clocked out at '+fmtM(now));
  render();
}

async function doLunchOut() {
  const now = new Date(), t = p2(now.getHours())+':'+p2(now.getMinutes());
  const { data, error } = await sb.from('clock_logs').insert({
    employee_id: S.employee.id,
    log_date: TODAY, clock_in: t, log_type: 'lunch',
  }).select().single();
  if(error){ notif('Error: '+error.message,'err'); return; }
  C.logs.push(data);
  notif('Lunch break started at '+fmtM(now),'lunch');
  render();
}

async function doLunchIn() {
  const log = myOpenLunchLog(); if(!log) return;
  const now = new Date(), t = p2(now.getHours())+':'+p2(now.getMinutes());
  await sb.from('clock_logs').update({clock_out:t}).eq('id',log.id);
  const idx = C.logs.findIndex(l=>l.id===log.id);
  if(idx>=0) C.logs[idx].clock_out=t;
  notif('Back from lunch at '+fmtM(now),'lunch');
  render();
}

// ── GEOLOCATION ───────────────────────────────────────────
function distanceM(lat1,lng1,lat2,lng2) {
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function verifyLocationAndClock(action) {
  const btn=document.getElementById('ctbtn'); if(btn){btn.disabled=true;btn.style.opacity='0.6';}
  setGeoStatus('checking','Verifying location…');
  if(!navigator.geolocation){setGeoStatus('err','Geolocation not supported');if(btn){btn.disabled=false;btn.style.opacity='1';}return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      if(btn){btn.disabled=false;btn.style.opacity='1';}
      const {latitude:lat,longitude:lng}=pos.coords;
      const ok=C.locations.some(loc=>distanceM(lat,lng,loc.lat,loc.lng)<=loc.radius_m);
      if(!ok){setGeoStatus('err','Not at an approved location');notif('Clock-in denied — wrong location','err');return;}
      setGeoStatus('ok','Location verified');
      action(lat,lng);
    },
    err=>{
      if(btn){btn.disabled=false;btn.style.opacity='1';}
      const msg=err.code===1?'Location permission denied':err.code===2?'Location unavailable':'Location request timed out';
      setGeoStatus('err',msg); notif(msg,'err');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:30000}
  );
}

function setGeoStatus(state,msg) {
  const el=document.getElementById('geoStatus'); if(!el) return;
  const colors={ok:'var(--ok-text)',err:'var(--err-text)',checking:'var(--muted)'};
  const icons={ok:'✓',err:'⚠',checking:'↻'};
  el.style.color=colors[state]; el.innerHTML='<span>'+icons[state]+'</span> '+msg;
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  document.querySelectorAll('.modal-bg').forEach(m=>m.remove());
  // Check URL hash for password recovery token
  const hash = window.location.hash;
  const isRecovery = hash.includes('type=recovery') || S.passwordReset;
  document.getElementById('root').innerHTML = isRecovery
    ? resetPasswordV()
    : S.session
      ? (S.employee?.role==='admin' ? adminLayout() : empLayout())
      : (S.forgotPassword ? forgotPasswordV() : loginV());
  if(S.md) { const mb=document.createElement('div'); mb.className='modal-bg'; mb.innerHTML=rMd(); document.body.appendChild(mb); mb.onclick=e=>{if(e.target===mb){S.md=null;render();}}; }
  bind();
}

// ── FORGOT PASSWORD ───────────────────────────────────────
function forgotPasswordV() {
  return `<div class="lw"><div class="lcard">
    <div style="padding:0;border:none;margin-bottom:20px;text-align:center">
      <div class="logo" style="font-size:22px;font-weight:800"><span class="ac">NET</span>FLAIR Workforce</div>
      <div class="logo-s">Reset your password</div>
    </div>
    <div class="eb" id="fperr" style="display:none">Could not send reset email. Please check the address.</div>
    <div id="fpok" style="display:none;background:var(--ok-bg);color:var(--ok-text);border-radius:var(--rs);padding:9px 12px;font-size:13px;margin-bottom:13px;font-weight:500">
      ✓ Reset link sent! Check your email inbox.
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Enter your work email address and we'll send you a link to reset your password.</p>
    <div class="fg"><label>Work email</label><input id="fpemail" type="email" placeholder="you@netflair.com" autocomplete="email"></div>
    <button class="btn bb bfw" id="fpbtn" style="margin-top:4px;font-size:14px">Send reset link</button>
    <button class="btn bfw" id="backToLogin" style="margin-top:8px;font-size:13px">← Back to sign in</button>
  </div></div>`;
}

// ── RESET PASSWORD (arrives via email link) ───────────────
function resetPasswordV() {
  return `<div class="lw"><div class="lcard">
    <div style="padding:0;border:none;margin-bottom:20px;text-align:center">
      <div class="logo" style="font-size:22px;font-weight:800"><span class="ac">NET</span>FLAIR Workforce</div>
      <div class="logo-s">Set new password</div>
    </div>
    <div class="eb" id="rperr" style="display:none">Passwords do not match or are too short (min 8 characters).</div>
    <div class="fg"><label>New password</label><input id="rppw1" type="password" placeholder="At least 8 characters" autocomplete="new-password"></div>
    <div class="fg"><label>Confirm new password</label><input id="rppw2" type="password" placeholder="Repeat password" autocomplete="new-password"></div>
    <button class="btn bb bfw" id="rpbtn" style="margin-top:4px;font-size:14px">Set new password</button>
  </div></div>`;
}
function empLayout() {
  const tabs=[{id:'clock',l:'Clock In/Out'},{id:'schedule',l:'My Schedule'},{id:'timeoff',l:'Time Off'},{id:'hours',l:'My Hours'}];
  return `<div class="app"><nav class="sb">
    <div class="logo-a"><div class="logo"><span class="ac">NET</span>FLAIR</div><div class="logo-s">Workforce</div></div>
    ${tabs.map(t=>`<div class="ni${S.tab===t.id?' on':''}" data-tab="${t.id}">${t.l}</div>`).join('')}

function empContent() { switch(S.tab){case 'clock':return clockV();case 'schedule':return schedV();case 'timeoff':return toV();case 'hours':return hrV();} return ''; }

// ── CLOCK VIEW ────────────────────────────────────────────
function clockV() {
  const emp=S.employee;
  const ts=C.shifts.find(s=>s.employee_id===emp.id&&s.shift_date===TODAY);
  const isIn=isClocked(), isLunch=onLunch(), isCsr=emp.role==='csr';
  const openLog=myOpenWorkLog();
  const clr=isIn?'#A32D2D':'#1D9E75', bg=isIn?'var(--err-bg)':'var(--ok-bg)', tc=isIn?'var(--err-text)':'var(--ok-text)';
  const myLogs=C.logs.filter(l=>l.employee_id===emp.id).sort((a,b)=>b.log_date.localeCompare(a.log_date)||a.log_type.localeCompare(b.log_type)).slice(0,10);

  let lunchArea='';
  if(isCsr&&isIn) {
    if(isLunch) {
      const ll=myOpenLunchLog();
      lunchArea=`<hr class="divider">
        <div class="lunch-banner" style="justify-content:center;margin-bottom:12px"><div class="ldot"></div>On lunch — <span id="ldur">${eld(ll.created_at)}</span></div>
        <button class="lbtn lbtn-ret" id="lunchIn">&#8634;<span>Back</span></button>
        <div class="muted" style="text-align:center;margin-top:10px">Since ${fmtTime(ll.clock_in)}</div>`;
    } else {
      lunchArea=`<hr class="divider">
        <div class="muted" style="text-align:center;margin-bottom:10px">Lunch break</div>
        <button class="lbtn" id="lunchOut">&#9749;<span>Lunch Out</span></button>`;
    }
  }

  return `<div class="ph">Clock In / Out</div><div class="ps">${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
  <div class="g2">
    <div class="card" style="text-align:center;padding:28px 20px">
      <div id="lck" class="cknum">${fmtNow(S.now)}</div>
      <div class="muted" style="margin-bottom:18px">Current time</div>
      <div class="row" style="justify-content:center;margin-bottom:16px">
        <div class="dot" style="background:${isLunch?'#D97706':isIn?'#1D9E75':'var(--muted)'}"></div>
        <span style="font-size:13px;font-weight:500;color:${isLunch?'var(--lunch-text)':isIn?'#1D9E75':'var(--muted)'}">
          ${isLunch?'On lunch break':isIn?'Clocked in':'Not clocked in'}
        </span>
      </div>
      ${isIn&&openLog?`<div style="font-family:monospace;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:3px" id="dur">${eld(openLog.created_at)}</div>
        <div class="muted" style="margin-bottom:14px">Since ${fmtTime(openLog.clock_in)}</div>`:'<div style="height:50px"></div>'}
      <button id="ctbtn" class="ckbtn ${isIn?'ckbtn-out':'ckbtn-in'}" style="border-color:${clr};background:${bg};color:${tc};margin-bottom:12px">${isIn?'Clock Out':'Clock In'}</button>
      <div id="geoStatus" style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:10px;min-height:16px">Tap to verify location &amp; clock ${isIn?'out':'in'}</div>
      <div class="muted">${ts?'Shift: '+fmtTime(ts.start_time)+' – '+fmtTime(ts.end_time):'No shift scheduled today'}</div>
      ${lunchArea}
    </div>
    <div class="card"><div class="ctitle">Activity log</div>
      ${myLogs.length?`<table class="tbl" style="font-size:12px">
        <thead><tr><th>Date</th><th>Type</th><th>In</th><th>Out</th><th>Dur</th></tr></thead>
        <tbody>${myLogs.map(l=>`<tr class="${l.log_type==='lunch'?'lrow':''}">
          <td>${l.log_date}</td>
          <td><span class="badge ${l.log_type==='lunch'?'blun':'bt'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>
          <td>${fmtTime(l.clock_in)}</td>
          <td>${l.clock_out?fmtTime(l.clock_out):'—'}</td>
          <td style="font-weight:600;color:${l.log_type==='lunch'?'var(--lunch-text)':'var(--accent)'}">
            ${l.clock_out?cH(l.clock_in,l.clock_out).toFixed(1)+'h':'—'}</td>
        </tr>`).join('')}</tbody>
      </table>`:'<div class="emp">No activity yet</div>'}
    </div>
  </div>`;
}

// ── SCHEDULE VIEW ─────────────────────────────────────────
function schedV() {
  const emp=S.employee;
  if(!S.hrWeek) S.hrWeek=TODAY;
  const tog=togBtn();
  const wd=wkDates(S.hrWeek);
  if(S.sv==='month') {
    const mo=new Date().getMonth(), yr=new Date().getFullYear();
    return `<div class="btw" style="margin-bottom:20px">
      <div><div class="ph">My Schedule</div><div class="ps">${MONTH_NAMES[mo]} ${yr}</div></div>${tog}</div>
      <div style="display:grid;grid-template-columns:1fr 270px;gap:16px;align-items:start">
        ${empMonthGrid(emp)}<div>${holPanel()}</div></div>`;
  }
  return `<div class="btw" style="margin-bottom:20px">
    <div><div class="ph">My Schedule</div><div class="ps">${wd[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${wd[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div></div>${tog}</div>
    <div style="display:grid;grid-template-columns:1fr 270px;gap:16px;align-items:start">
      <div class="card" style="padding:0;overflow:hidden"><div class="twrap">
        <div class="wg" style="grid-template-columns:82px repeat(7,1fr);min-width:560px">
          <div class="wh"></div>${weekHeaders(wd)}
          <div class="wl" style="font-size:11px">Shifts</div>${empWeekCells(emp,wd)}
        </div></div></div>
      <div>${holPanel()}</div>
    </div>`;
}

function togBtn() {
  return `<div class="vtog"><button class="${S.sv==='week'?'von':''}" id="togWk">Week</button>
    <button class="${S.sv==='month'?'von':''}" id="togMo">Month</button></div>`;
}

function weekHeaders(wd) {
  return wd.map(d=>{
    const dd=dstr(d),t=dd===TODAY,h=isHol(dd);
    return `<div class="wh${t?' th':''}${h?' hh':''}">
      <span class="whs">${d.toLocaleDateString('en-US',{weekday:'short'})}</span>
      <span class="whn">${d.getDate()}</span>
      ${h?`<span class="whhol">${HOLIDAYS[dd]}</span>`:''}
    </div>`;
  }).join('');
}

function empWeekCells(emp, wd) {
  return wd.map(d=>{
    const dd=dstr(d),t=dd===TODAY,h=isHol(dd),doff=isDO(emp,dow(dd));
    const sh=C.shifts.find(s=>s.employee_id===emp.id&&s.shift_date===dd);
    let cls=`wc${t?' tc':''}${h?' hc':''}${doff&&!h?' doc':''}`;
    let content='';
    if(h) content=`<div class="sp sph">${HOLIDAYS[dd]}</div>`;
    else if(doff) content=`<div class="do-tag">Day off</div>`;
    else if(sh) content=`<div class="sp ${emp.role==='csr'?'spc':'spt'}">${fmtTime(sh.start_time)}–${fmtTime(sh.end_time)}</div>`;
    return `<div class="${cls}">${content}</div>`;
  }).join('');
}

function empMonthGrid(emp) {
  const yr=new Date().getFullYear(), mo=new Date().getMonth();
  const days=mnDates(yr,mo), offset=(new Date(yr,mo,1).getDay()+6)%7;
  let cells='';
  for(let i=0;i<offset;i++) cells+='<div class="mcal-cell empty"></div>';
  days.forEach(d=>{
    const dd=dstr(d),isT=dd===TODAY,h=isHol(dd),doff=isDO(emp,dow(dd));
    const sh=C.shifts.find(s=>s.employee_id===emp.id&&s.shift_date===dd);
    let cls=`mcal-cell${isT?' tc':''}${h?' hc':''}${doff&&!h?' doc':''}`;
    let dn=isT?`<span class="td-circle">${d.getDate()}</span>`:`<span>${d.getDate()}</span>`;
    let content='';
    if(h) content=`<div class="msp msp-h">${HOLIDAYS[dd]}</div>`;
    else if(doff) content='<div class="do-tag">Day off</div>';
    else if(sh) content=`<div class="msp ${emp.role==='csr'?'msp-c':'msp-t'}">${fmtTime(sh.start_time)}–${fmtTime(sh.end_time)}</div>`;
    cells+=`<div class="${cls}"><div class="mcal-dn${isT?' tn':''}">${dn}</div>${content}</div>`;
  });
  return `<div class="mcal"><div class="mcal-head">${DAYS.map(d=>`<div class="mcal-dh">${d}</div>`).join('')}</div><div class="mcal-body">${cells}</div></div>`;
}

function holPanel() {
  const now=TODAY;
  const upcoming=Object.entries(HOLIDAYS).filter(([d])=>d>=now).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,5);
  return `<div class="card"><div class="ctitle">Jamaica public holidays</div>
    ${upcoming.map(([d,n])=>`<div class="hrow"><div class="hdot"></div>
      <div style="flex:1;font-size:13px;font-weight:500">${n}</div>
      <div class="muted">${new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
    </div>`).join('')}</div>`;
}

// ── TIME OFF VIEW ─────────────────────────────────────────
function toV() {
  const emp=S.employee;
  const myR=C.timeOff.filter(r=>r.employee_id===emp.id);
  const balCards=LEAVE_TYPES.map(lt=>{
    const b=getBalance(emp.id,lt.id);
    const total=leaveTotal(emp.id,lt.id), rem=leaveRemaining(emp.id,lt.id);
    const pct=total>0?Math.round(b.used_days/total*100):0;
    return `<div class="sc" style="border-left:3px solid ${lt.color}">
      <div style="font-size:13px;font-weight:700;margin-bottom:2px">${lt.label}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Days / Year</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-size:22px;font-weight:700;color:${lt.color}">${rem}</span>
        <span class="muted">of ${total}</span></div>
      <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${lt.color};border-radius:4px"></div></div>
      <div class="muted" style="margin-top:5px">Used: <strong>${b.used_days}</strong></div>
    </div>`;
  }).join('');
  return `<div class="ph">Time Off</div><div class="ps">Submit requests and track your leave balances</div>
  <div class="g3" style="margin-bottom:20px">${balCards}</div>
  <div class="g2">
    <div class="card"><div class="ctitle">New request</div>
      <div class="fg"><label>Leave type</label><select id="ttype">${LEAVE_TYPES.map(lt=>`<option value="${lt.id}">${lt.label}</option>`).join('')}</select></div>
      <div class="fg"><label>From date</label><input type="date" id="tf" min="${TODAY}"></div>
      <div class="fg"><label>To date</label><input type="date" id="tt" min="${TODAY}"></div>
      <div class="fg"><label>Reason</label><textarea id="tr" rows="3" placeholder="Brief description…"></textarea></div>
      <button class="btn bb bfw" id="subTO">Submit request</button>
    </div>
    <div><div class="ctitle" style="margin-bottom:12px">My requests</div>
      ${myR.length?myR.map(r=>{
        const lt=LEAVE_TYPES.find(t=>t.id===r.leave_type)||{label:'Leave',color:'var(--muted)'};
        return `<div class="rq"><div style="flex:1">
          <div class="row" style="margin-bottom:3px;gap:6px">
            <span class="badge" style="background:${lt.color}22;color:${lt.color}">${lt.label}</span>
            <span style="font-size:13px;font-weight:600">${r.from_date===r.to_date?r.from_date:r.from_date+' – '+r.to_date}</span>
          </div>
          <div class="muted">${r.reason} · ${r.submitted_at}${r.days?' · '+r.days+' day'+(r.days!==1?'s':''):''}
          </div></div>
          <span class="badge b${r.status==='pending'?'pend':r.status==='approved'?'appr':'deny'}">${r.status}</span>
        </div>`;
      }).join(''):'<div class="emp">No requests yet</div>'}
    </div>
  </div>`;
}

// ── HOURS VIEW (employee) ─────────────────────────────────
function hrV() {
  const emp=S.employee;
  const wd=wkDates(S.hrWeek||TODAY);
  const wl=C.logs.filter(l=>l.employee_id===emp.id&&wd.some(d=>dstr(d)===l.log_date));
  const wk=wl.filter(l=>l.log_type==='work'), lk=wl.filter(l=>l.log_type==='lunch');
  const totW=wk.reduce((a,l)=>a+(l.clock_out?cH(l.clock_in,l.clock_out):0),0);
  const totL=lk.reduce((a,l)=>a+(l.clock_out?cH(l.clock_in,l.clock_out):0),0);
  const isCsr=emp.role==='csr';
  const bars=wd.slice(0,5).map(d=>{
    const dd=dstr(d),hol=isHol(dd);
    const dw=wk.filter(l=>l.log_date===dd).reduce((a,l)=>a+(l.clock_out?cH(l.clock_in,l.clock_out):0),0);
    const pct=Math.min(dw/10*100,100);
    return `<div class="hbr">
      <div class="muted" style="width:30px;text-align:right">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="hbt">${hol
        ?`<div style="width:100%;height:100%;background:var(--hol-bg);display:flex;align-items:center;padding:0 8px;font-size:10px;color:var(--hol-text);font-weight:600">${HOLIDAYS[dd]}</div>`
        :`<div class="hbf" style="width:${pct}%;background:${isCsr?'#7F77DD':'#378ADD'}">${dw>0?dw.toFixed(1)+'h':''}</div>`}
      </div>
      <div style="font-size:11px;color:var(--muted);width:36px;text-align:right">${hol?'—':dw>0?dw.toFixed(1)+'h':'—'}</div>
    </div>`;
  }).join('');
  return `<div class="ph">My Hours</div><div class="ps">This week's summary</div>
  <div class="g2">
    <div class="card"><div class="ctitle">Daily breakdown</div>${bars}</div>
    <div>
      <div class="g2" style="margin-bottom:14px">
        <div class="sc"><div style="font-size:24px;font-weight:700;color:${isCsr?'var(--csr)':'var(--accent)'}">${totW.toFixed(1)}</div><div class="muted" style="margin-top:5px">Work hours</div></div>
        ${isCsr?`<div class="sc"><div style="font-size:24px;font-weight:700;color:var(--lunch-text)">${totL.toFixed(1)}</div><div class="muted" style="margin-top:5px">Lunch hours</div></div>`
                :`<div class="sc"><div style="font-size:24px;font-weight:700">${wk.filter(l=>l.clock_out).length}</div><div class="muted" style="margin-top:5px">Days worked</div></div>`}
      </div>
      <div class="card"><div class="ctitle">Log details</div>
        <table class="tbl" style="font-size:12px"><thead><tr><th>Day</th>${isCsr?'<th>Type</th>':''}<th>In</th><th>Out</th><th>Hrs</th></tr></thead>
        <tbody>${wl.length?wl.sort((a,b)=>a.log_date.localeCompare(b.log_date)||a.log_type.localeCompare(b.log_type)).map(l=>`<tr class="${l.log_type==='lunch'?'lrow':''}">
          <td>${new Date(l.log_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})}</td>
          ${isCsr?`<td><span class="badge ${l.log_type==='lunch'?'blun':'bc'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>`:''}
          <td>${fmtTime(l.clock_in)}</td><td>${l.clock_out?fmtTime(l.clock_out):'—'}</td>
          <td style="font-weight:600;color:${l.log_type==='lunch'?'var(--lunch-text)':'var(--accent)'}">
            ${l.clock_out?cH(l.clock_in,l.clock_out).toFixed(1):'—'}</td>
        </tr>`).join(''):`<tr><td colspan="${isCsr?5:4}" class="emp">No logs this week</td></tr>`}</tbody></table>
      </div>
    </div>
  </div>`;
}

function adminContent() { switch(S.atab){case 'live':return aLive();case 'schedule':return aSch();case 'timeoff':return aTO();case 'hours':return aHours();case 'employees':return aEmp();} return ''; }

// ── ADMIN LIVE ────────────────────────────────────────────
function aLive() {
  const staff=C.employees.filter(e=>e.role!=='admin');
  const openLogs=C.logs.filter(l=>l.log_date===TODAY&&l.log_type==='work'&&!l.clock_out);
  const openLunch=C.logs.filter(l=>l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
  const clocked=openLogs.map(l=>({emp:ge(l.employee_id),log:l,onLunch:openLunch.some(ll=>ll.employee_id===l.employee_id)})).filter(x=>x.emp);
  const todHol=isHol(TODAY);
  return `<div class="ph">Live Status</div><div class="ps">Real-time clock-in board · ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
  ${todHol?`<div style="background:var(--hol-bg);border:.5px solid var(--hol-bdr);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--hol-text);margin-bottom:16px;display:flex;align-items:center;gap:9px;font-weight:500"><div class="hdot"></div>Public holiday: <strong>${todHol}</strong></div>`:''}
  <div class="g4" style="margin-bottom:20px">
    ${[{v:clocked.length,l:'Clocked in',c:'var(--accent)'},{v:openLunch.length,l:'On lunch',c:'var(--lunch-text)'},
       {v:staff.filter(e=>e.role==='technician').length,l:'Technicians'},{v:staff.filter(e=>e.role==='csr').length,l:'CSRs'}]
      .map(x=>`<div class="sc"><div style="font-size:24px;font-weight:700;color:${x.c||'inherit'}">${x.v}</div><div class="muted" style="margin-top:5px">${x.l}</div></div>`).join('')}
  </div>
  <div class="ctitle" style="margin-bottom:12px">Clocked in now</div>
  ${clocked.length?`<div class="g3" style="margin-bottom:20px">${clocked.map(({emp,log,onLunch})=>`
    <div class="lvc lvc-${emp.role==='csr'?'csr':'tech'}" style="${onLunch?'border-top-color:#D97706':''}">
      <div class="row" style="margin-bottom:12px">
        <div class="av ${avc(emp.role)}" style="width:34px;height:34px">${ini(emp.name)}</div>
        <div><div style="font-size:14px;font-weight:700">${emp.name}</div>
          <div class="row" style="gap:5px;margin-top:2px"><span class="badge ${bxc(emp.role)}">${rl(emp.role)}</span>
          ${onLunch?'<span class="badge blun">On Lunch</span>':''}</div></div>
      </div>
      ${onLunch
        ?`<div style="font-family:monospace;font-size:20px;font-weight:700;color:var(--lunch-text)" id="lv${emp.id}">${eld(openLunch.find(l=>l.employee_id===emp.id)?.created_at)}</div><div class="muted">On lunch</div>`
        :`<div style="font-family:monospace;font-size:20px;font-weight:700;color:#1D9E75" id="lv${emp.id}">${eld(log.created_at)}</div><div class="muted">Since ${fmtTime(log.clock_in)}</div>`}
    </div>`).join('')}</div>`:'<div class="card emp" style="margin-bottom:20px">No one currently clocked in</div>'}
  <div class="ctitle" style="margin-bottom:12px">All staff today</div>
  <div class="card"><table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Shift</th></tr></thead><tbody>
  ${staff.map(e=>{
    const ol=openLogs.find(l=>l.employee_id===e.id), lun=openLunch.find(l=>l.employee_id===e.id);
    const ts=C.shifts.find(s=>s.employee_id===e.id&&s.shift_date===TODAY);
    return `<tr>
      <td><div class="row"><div class="av ${avc(e.role)}" style="width:26px;height:26px;font-size:10px">${ini(e.name)}</div><span style="font-weight:600">${e.name}</span></div></td>
      <td><span class="badge ${bxc(e.role)}">${rl(e.role)}</span></td>
      <td><div class="row"><div class="dot" style="background:${lun?'#D97706':ol?'#1D9E75':'var(--muted)'}"></div>
        <span style="font-size:13px;font-weight:${ol?600:400}">${lun?'On Lunch':ol?'In':'Out'}</span></div></td>
      <td class="muted">${ts?fmtTime(ts.start_time)+'–'+fmtTime(ts.end_time):'—'}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}

// ── ADMIN SCHEDULE ────────────────────────────────────────
function aSch() {
  const st=C.employees.filter(e=>e.role!=='admin');
  if(!S.hrWeek) S.hrWeek=TODAY;
  const wd=wkDates(S.hrWeek);
  const tog=togBtn();
  const mo=new Date().getMonth(), yr=new Date().getFullYear();
  const hdr=`<div class="btw" style="margin-bottom:16px">
    <div><div class="ph">Schedules</div><div class="ps">${S.sv==='month'?MONTH_NAMES[mo]+' '+yr:wd[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+wd[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div></div>
    <div class="row">${tog}<button class="btn bb" id="addShBtn">+ Add shift</button>
    <button class="btn" id="genShBtn" style="color:var(--ok-text);border-color:var(--ok-bdr)">&#9881; Generate shifts</button>
    <button class="btn" id="regenShBtn" style="color:var(--csr);border-color:var(--csr)">&#8635; Regen ${MONTH_NAMES[mo]}</button></div></div>`;
  if(S.sv==='month') {

    return hdr+`<div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">${adminMonthGrid(st, yr, mo)}<div>${holPanel()}${legend}</div></div>`;
  }
  const empRows=st.map(e=>`
    <div class="wl" style="flex-direction:column;align-items:flex-start;gap:3px;padding:7px 10px">
      <span style="font-size:12px;font-weight:700">${e.name.split(' ')[0]}</span>
      <span class="badge ${bxc(e.role)}" style="font-size:10px">${rl(e.role)}</span>
    </div>${empWeekCells(e,wd)}`).join('');
  return hdr+`<div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">
    <div class="card" style="padding:0;overflow:hidden"><div class="twrap">
      <div class="wg" style="grid-template-columns:116px repeat(7,1fr);min-width:640px">
        <div class="wh">Employee</div>${weekHeaders(wd)}${empRows}
      </div></div></div>

}

function adminMonthGrid(staff, yr, mo) {
  const days=mnDates(yr,mo), offset=(new Date(yr,mo,1).getDay()+6)%7;
  let cells='';
  for(let i=0;i<offset;i++) cells+='<div class="mcal-cell empty"></div>';
  days.forEach(d=>{
    const dd=dstr(d),isT=dd===TODAY,h=isHol(dd);
    const working=staff.filter(e=>C.shifts.some(s=>s.employee_id===e.id&&s.shift_date===dd)&&!isDO(e,dow(dd)));
    const offDay=staff.filter(e=>isDO(e,dow(dd)));
    cells+=`<div class="mcal-cell${isT?' tc':''}${h?' hc':''}">
      <div class="mcal-dn${isT?' tn':''}">${isT?`<span class="td-circle">${d.getDate()}</span>`:`<span>${d.getDate()}</span>`}</div>
      ${h?`<div class="msp msp-h">${HOLIDAYS[dd]}</div>`:''}
      <div style="display:flex;flex-wrap:wrap;margin-top:2px">
        ${working.map(e=>`<div class="emp-dot ${e.role==='csr'?'edc':'edt'}" title="${e.name}">${ini(e.name)}</div>`).join('')}
        ${offDay.map(e=>`<div class="emp-dot" title="${e.name} — Day off" style="background:var(--surface2);color:var(--muted);text-decoration:line-through">${ini(e.name)}</div>`).join('')}
      </div>
    </div>`;
  });
  return `<div class="mcal"><div class="mcal-head">${DAYS.map(d=>`<div class="mcal-dh">${d}</div>`).join('')}</div><div class="mcal-body">${cells}</div></div>`;
}

// ── ADMIN TIME OFF ────────────────────────────────────────
function aTO() {
  const pend=C.timeOff.filter(r=>r.status==='pending');

  const pendRows=pend.map(r=>{
    const e=ge(r.employee_id); if(!e) return '';
    const lt=LEAVE_TYPES.find(t=>t.id===r.leave_type)||{label:'Leave',color:'var(--muted)'};
    const rem=leaveRemaining(r.employee_id,r.leave_type);
    return `<div class="rq">
      <div class="av ${avc(e.role)}" style="width:36px;height:36px;font-size:13px">${ini(e.name)}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700">${e.name}</div>
        <div class="row" style="margin:3px 0;gap:6px">
          <span class="badge" style="background:${lt.color}22;color:${lt.color}">${lt.label}</span>
          <span style="font-size:13px">${r.from_date===r.to_date?r.from_date:r.from_date+' – '+r.to_date}</span>
          ${r.days?`<span class="muted">${r.days} day${r.days!==1?'s':''}</span>`:''}
        </div>
        <div class="muted">${r.reason} · ${r.submitted_at}</div>
        <div style="font-size:11px;margin-top:4px;color:var(--muted)">After approval: <strong style="color:${rem-(r.days||0)>=0?'var(--ok-text)':'var(--err-text)'}">${Math.max(0,rem-(r.days||0))}</strong> days remaining</div>
      </div>
      <div class="row"><button class="btn bgn bsm" data-app="${r.id}">Approve</button><button class="btn brd bsm" data-den="${r.id}">Deny</button></div>
    </div>`;
  }).join('');
  const resRows=res.map(r=>{
    const e=ge(r.employee_id); if(!e) return '';
    const lt=LEAVE_TYPES.find(t=>t.id===r.leave_type)||{label:'Leave',color:'var(--muted)'};
    return `<div class="rq" style="opacity:.6">
      <div class="av ${avc(e.role)}" style="width:30px;height:30px;font-size:11px">${ini(e.name)}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${e.name}</div>
        <div class="row" style="gap:6px">
          <span class="badge" style="background:${lt.color}22;color:${lt.color};font-size:10px">${lt.label}</span>

  }).join('');
  return `<div class="ph">Time Off Requests</div><div class="ps">${pend.length} pending approval</div>
    ${pend.length?`<div class="ctitle" style="margin-bottom:12px">Pending review</div>${pendRows}`:'<div class="card emp">All caught up — no pending requests.</div>'}

}

function aHours() {
  const staff=C.employees.filter(e=>e.role!=='admin');
  const filtered=S.hrEmp==='all'?staff:staff.filter(e=>e.id===S.hrEmp);
  const mo=S.hrMonth, yr=CURRENT_YEAR;
  const prefix=`${yr}-${p2(mo+1)}`;
  const viewTog=`<div class="vtog">
    <button class="${S.hrView==='daily'?'von':''}" id="hrDaily">Daily</button>
    <button class="${S.hrView==='weekly'?'von':''}" id="hrWeekly">Weekly</button>
    <button class="${S.hrView==='monthly'?'von':''}" id="hrMonthly">Monthly</button>
  </div>`;
  const empSel=`<select id="hrEmpSel" style="width:160px;padding:6px 10px;font-size:13px">
    <option value="all"${S.hrEmp==='all'?' selected':''}>All employees</option>
    ${staff.map(e=>`<option value="${e.id}"${S.hrEmp===e.id?' selected':''}>${e.name}</option>`).join('')}
  </select>`;
  const mLogs=C.logs.filter(l=>l.log_date.startsWith(prefix)&&l.log_type==='work'&&l.clock_out);
  const totH=mLogs.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0);
  const ytdCards=`<div class="g4" style="margin-bottom:20px">
    <div class="sc"><div style="font-size:24px;font-weight:700;color:var(--accent)">${totH.toFixed(0)}</div><div class="muted" style="margin-top:5px">Hours logged</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700">${new Set(mLogs.map(l=>l.employee_id)).size}</div><div class="muted" style="margin-top:5px">Active employees</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700;color:var(--warn-text)">${C.timeOff.filter(r=>r.status==='pending').length}</div><div class="muted" style="margin-top:5px">Pending requests</div></div>
    <div class="sc"><div style="font-size:24px;font-weight:700">${filtered.length>0?(totH/Math.max(filtered.length,1)).toFixed(1):'—'}</div><div class="muted" style="margin-top:5px">Avg hrs/employee</div></div>
  </div>`;
  const monthPick=`<div class="row" style="gap:6px;flex-wrap:wrap;margin-bottom:16px">
    ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map((mn,mi)=>
      `<button class="btn bsm ${S.hrMonth===mi?'bb':''}" id="hrMon${mi}">${mn}</button>`).join('')}
  </div>`;
  const empRows=filtered.map(e=>{
    const el=C.logs.filter(l=>l.employee_id===e.id&&l.log_date.startsWith(prefix)&&l.log_type==='work'&&l.clock_out);
    const worked=el.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0);
    const schd=C.shifts.filter(s=>s.employee_id===e.id&&s.shift_date.startsWith(prefix));
    const schedH=schd.reduce((a,s)=>a+cH(s.start_time,s.end_time),0);
    const att=schd.length>0?Math.round(new Set(el.map(l=>l.log_date)).size/schd.length*100):0;
    const barClr=att>=90?'#1D9E75':att>=70?'#378ADD':'#E24B4A';
    return `<tr>
      <td><div class="row"><div class="av ${avc(e.role)}" style="width:26px;height:26px;font-size:10px">${ini(e.name)}</div><span style="font-weight:600">${e.name}</span></div></td>
      <td style="font-weight:700;color:var(--accent)">${worked.toFixed(1)}h</td>
      <td>${schedH.toFixed(1)}h</td>
      <td style="text-align:center">${new Set(el.map(l=>l.log_date)).size} / ${schd.length}</td>
      <td style="min-width:100px"><div style="display:flex;align-items:center;gap:6px">
        <div style="flex:1;background:var(--surface2);border-radius:4px;height:16px;overflow:hidden;border:.5px solid var(--border)">
          <div style="width:${att}%;height:100%;background:${barClr}"></div></div>
        <span style="font-size:12px;font-weight:600;color:${barClr};min-width:34px">${att}%</span>
      </div></td>
    </tr>`;
  }).join('');
  return `<div class="ph">Hours Tracker</div><div class="ps">${MONTH_NAMES[mo]} ${yr}</div>
    ${ytdCards}<div class="btw" style="margin-bottom:16px">${viewTog}${empSel}</div>
    ${monthPick}
    <div class="card" style="padding:0"><table class="tbl"><thead><tr><th>Employee</th><th>Logged</th><th>Scheduled</th><th style="text-align:center">Days worked</th><th>Attendance</th></tr></thead>
    <tbody>${empRows||'<tr><td colspan="5" class="emp">No data for this period</td></tr>'}</tbody></table></div>`;
}

function rMd() {
  if(S.md&&S.md.startsWith('dayoff:')) {
    const eid=S.md.split(':')[1], e=C.employees.find(x=>x.id===eid);
    const cur=e.days_off||[], full=cur.length>=2;
    const dayBtns=DAYS.map((d,i)=>{const sel=cur.includes(i),dis=full&&!sel;
      return `<button class="${sel?'sel':''}" data-di="${i}"${dis?' disabled':''} style="${dis?'opacity:.32;cursor:not-allowed':''}"> ${d}</button>`;}).join('');
    const ready=cur.length===2;
    return `<div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">Days Off — ${e.name}</div>
      <div class="muted" style="margin-bottom:16px">Select exactly 2 days off per week</div>
      <div class="daypick" id="dpick">${dayBtns}</div>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0 4px">
        <span style="font-size:12px;font-weight:600;color:${ready?'var(--ok-text)':'var(--err-text)'}">${cur.length}/2 selected</span>
        ${ready?'<span style="font-size:12px;color:var(--ok-text)">✓ Ready to save</span>':`<span class="muted">— select ${2-cur.length} more</span>`}
      </div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn bb" id="saveDO" data-eid="${eid}"${ready?'':' disabled style="opacity:.5;cursor:not-allowed"'}>Save</button></div>
    </div>`;

  if(S.md&&S.md.startsWith('leaveBal:')) {

    const rows=LEAVE_TYPES.map(lt=>{
      const b=getBalance(eid,lt.id);
      const total=b.initial_days+b.adjustment, rem=Math.max(0,total-b.used_days);

      return `<div style="padding:14px 0;border-bottom:.5px solid var(--border)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:4px;height:36px;border-radius:2px;background:${lt.color};flex-shrink:0"></div>

          <div style="text-align:right"><div style="font-size:18px;font-weight:700;color:${lt.color}">${rem} <span style="font-size:13px;color:var(--muted);font-weight:400">of ${total}</span></div>
            <div class="muted">Used: ${b.used_days}</div></div>
        </div>
        <div style="background:var(--border);border-radius:4px;height:5px;overflow:hidden;margin-bottom:10px">
          <div style="width:${pct}%;height:100%;background:${lt.color}"></div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div><label style="font-size:11px">Initial</label><input type="number" min="0" max="365" id="lb_init_${lt.id}" value="${b.initial_days}" style="padding:6px 8px;font-size:13px"></div>
          <div><label style="font-size:11px">Adjustment</label><input type="number" min="-30" max="30" id="lb_adj_${lt.id}" value="${b.adjustment}" style="padding:6px 8px;font-size:13px"></div>
          <div><label style="font-size:11px">Used</label><input type="number" min="0" max="365" id="lb_used_${lt.id}" value="${b.used_days}" style="padding:6px 8px;font-size:13px"></div>
        </div>
      </div>`;
    }).join('');
    return `<div class="modal-box"><div style="font-size:17px;font-weight:700;margin-bottom:4px">Leave Balances — ${e.name}</div>
      <div class="muted" style="margin-bottom:16px">Edit initial balance, adjustments, and used days.</div>
      ${rows}
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button><button class="btn bb" id="saveLB" data-eid="${eid}">Save balances</button></div>
    </div>`;
  }
  if(S.md&&S.md.startsWith('confirmRemove:')) {
    const eid=S.md.split(':')[1], e=C.employees.find(x=>x.id===eid);
    return `<div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Remove Employee?</div>
      <div class="muted" style="margin-bottom:20px">This will permanently remove <strong>${e.name}</strong> and cannot be undone.</div>
      <div style="background:var(--err-bg);border:.5px solid var(--err-bdr);border-radius:var(--rs);padding:12px 14px;margin-bottom:20px;font-size:13px;color:var(--err-text)">
        <div class="row"><div class="av ${avc(e.role)}" style="width:32px;height:32px">${ini(e.name)}</div>
        <div><div style="font-weight:700">${e.name}</div><div class="muted">${rl(e.role)} · @${e.username}</div></div></div>
      </div>
      <div class="fg"><label>Type the employee's username to confirm</label><input type="text" id="removeConfirmInput" placeholder="${e.username}" autocomplete="off"></div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn brd" id="confirmRemoveBtn" data-eid="${eid}" disabled style="opacity:.4;cursor:not-allowed">Remove employee</button></div>
    </div>`;
  }
  if(S.md==='changePw') return `<div class="modal-box">
    <div style="font-size:17px;font-weight:700;margin-bottom:4px">Change Password</div>
    <div class="muted" style="margin-bottom:18px">Choose a new password for your account.</div>
    <div class="eb" id="cpErr" style="display:none">Passwords don't match or are too short (min 8 characters).</div>
    <div id="cpOk" style="display:none;background:var(--ok-bg);color:var(--ok-text);border-radius:var(--rs);padding:9px 12px;font-size:13px;margin-bottom:13px;font-weight:500">✓ Password updated successfully!</div>
    <div class="fg"><label>New password</label><input type="password" id="cpPw1" placeholder="At least 8 characters" autocomplete="new-password"></div>
    <div class="fg"><label>Confirm new password</label><input type="password" id="cpPw2" placeholder="Repeat password" autocomplete="new-password"></div>
    <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
      <button class="btn bb" id="cpSave">Update password</button></div>
  </div>`;
  if(S.md==='addEmp') return `<div class="modal-box">
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">Add Employee</div>
    <div class="fg"><label>Full name</label><input type="text" id="en" placeholder="First Last"></div>
    <div class="fg"><label>Email</label><input type="email" id="ee" placeholder="employee@netflair.com"></div>
    <div class="fg"><label>Username</label><input type="text" id="eu" placeholder="e.g. jdoe"></div>
    <div class="fg"><label>Temporary password</label><input type="password" id="epw" placeholder="Min 6 characters"></div>
    <div class="fg"><label>Role</label><select id="er"><option value="technician">Technician</option><option value="csr">CSR</option><option value="admin">Admin</option></select></div>
    <div class="mfoot"><button class="btn" id="mcancel">Cancel</button><button class="btn bb" id="saveE">Add employee</button></div>
  </div>`;
  if(S.md==='addShift') return `<div class="modal-box">
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">Add Shift</div>
    <div class="fg"><label>Employee</label><select id="se">${C.employees.filter(e=>e.role!=='admin').map(e=>`<option value="${e.id}">${e.name}</option>`).join('')}</select></div>
    <div class="fg"><label>Date</label><input type="date" id="sd" value="${TODAY}"></div>
    <div class="fg"><label>Start time</label><input type="time" id="ss" value="09:00"></div>
    <div class="fg"><label>End time</label><input type="time" id="se2" value="17:00"></div>
    <div class="mfoot"><button class="btn" id="mcancel">Cancel</button><button class="btn bb" id="saveSh">Add shift</button></div>
  </div>`;
  if(S.md==='regenShifts') {
    const mo=new Date().getMonth(), yr=new Date().getFullYear();
    return `<div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">Regenerate Shifts</div>
      <div class="muted" style="margin-bottom:16px">This will fill in any missing shifts for <strong>${MONTH_NAMES[mo]} ${yr}</strong> at 09:00–17:00. Existing shifts are preserved. Days off and holidays are skipped.</div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn bb" id="confirmRegen" data-y="${yr}" data-m="${mo}">Regenerate ${MONTH_NAMES[mo]}</button></div>
    </div>`;
  }
  if(S.md==='genShifts') {
    const mo=new Date().getMonth(), yr=new Date().getFullYear();
    const nextMo=mo===11?0:mo+1, nextYr=mo===11?yr+1:yr;
    return `<div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">Generate Shifts</div>
      <div class="muted" style="margin-bottom:16px">Generate working days for ${MONTH_NAMES[nextMo]} ${nextYr} at 09:00–17:00. Days off and holidays are skipped.</div>
      <div class="mfoot"><button class="btn" id="mcancel">Cancel</button>
        <button class="btn bb" id="confirmGen" data-y="${nextYr}" data-m="${nextMo}">Generate ${MONTH_NAMES[nextMo]}</button></div>
    </div>`;
  }
  return '';
}

  if($('fpbtn'))  $('fpbtn').onclick=doForgotPassword;
  if($('fpemail')) $('fpemail').onkeydown=e=>{if(e.key==='Enter')doForgotPassword();};
  if($('rpbtn'))  $('rpbtn').onclick=doResetPassword;
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.tab=el.dataset.tab;render();});
  document.querySelectorAll('[data-atab]').forEach(el=>el.onclick=()=>{S.atab=el.dataset.atab;render();});
  if($('ctbtn'))    $('ctbtn').onclick=()=>{ isClocked()?verifyLocationAndClock((_,__)=>doClockOut()):verifyLocationAndClock(doClockIn); };
  if($('lunchOut')) $('lunchOut').onclick=doLunchOut;
  if($('lunchIn'))  $('lunchIn').onclick=doLunchIn;
  if($('subTO'))    $('subTO').onclick=submitTO;
  if($('togWk'))    $('togWk').onclick=()=>{S.sv='week';render();};
  if($('togMo'))    $('togMo').onclick=()=>{S.sv='month';render();};
  if($('addShBtn')) $('addShBtn').onclick=()=>{S.md='addShift';render();};
  if($('addEBtn'))  $('addEBtn').onclick=()=>{S.md='addEmp';render();};
  if($('genShBtn')) $('genShBtn').onclick=()=>{S.md='genShifts';render();};
  if($('mcancel'))  $('mcancel').onclick=()=>{S.md=null;render();};
  if($('regenShBtn')) $('regenShBtn').onclick=()=>{S.md='regenShifts';render();};
  if($('confirmRegen')) $('confirmRegen').onclick=regenShifts;
  if($('saveE'))    $('saveE').onclick=saveEmployee;
  if($('saveSh'))   $('saveSh').onclick=saveShift;
  if($('saveDO'))   $('saveDO').onclick=saveDaysOff;
  if($('saveLB'))   $('saveLB').onclick=saveLeaveBalance;
  if($('confirmGen')) $('confirmGen').onclick=generateShifts;
  // Hours controls
  if($('hrDaily'))   $('hrDaily').onclick=()=>{S.hrView='daily';render();};
  if($('hrWeekly'))  $('hrWeekly').onclick=()=>{S.hrView='weekly';render();};
  if($('hrMonthly')) $('hrMonthly').onclick=()=>{S.hrView='monthly';render();};
  if($('hrEmpSel'))  $('hrEmpSel').onchange=function(){S.hrEmp=this.value;render();};
  for(let mi=0;mi<12;mi++){(function(m){const b=$('hrMon'+m);if(b)b.onclick=()=>{S.hrMonth=m;render();};})(mi);}
  // Time off
  document.querySelectorAll('[data-app]').forEach(b=>b.onclick=()=>approveTO(b.dataset.app));
  document.querySelectorAll('[data-den]').forEach(b=>b.onclick=()=>denyTO(b.dataset.den));
  document.querySelectorAll('[data-do]').forEach(b=>b.onclick=()=>{S.md='dayoff:'+b.dataset.do;render();});
  document.querySelectorAll('[data-lb]').forEach(b=>b.onclick=()=>{S.md='leaveBal:'+b.dataset.lb;render();});
  document.querySelectorAll('[data-rem]').forEach(b=>b.onclick=()=>{
    if(b.dataset.rem===S.employee?.id){notif('Cannot remove yourself','err');return;}
    S.md='confirmRemove:'+b.dataset.rem; render();
  });
  // Day picker
  document.querySelectorAll('.daypick button').forEach(b=>b.onclick=()=>{
    if(b.disabled) return;
    const i=parseInt(b.dataset.di), eid=$('saveDO')?.dataset.eid;
    const e=C.employees.find(x=>x.id===eid); if(!e) return;
    const cur=e.days_off||[];
    if(cur.includes(i)) e.days_off=cur.filter(x=>x!==i);
    else if(cur.length>=2) return;
    else e.days_off=[...cur,i];
    const mb=document.querySelector('.modal-bg'); if(mb){mb.innerHTML=rMd();bind();}
  });
  // Remove confirm input
  if($('removeConfirmInput')) {
    const btn=$('confirmRemoveBtn'), inp=$('removeConfirmInput');
    const eid=btn.dataset.eid, e=C.employees.find(x=>x.id===eid);
    inp.oninput=function(){const ok=this.value.trim()===e.username;btn.disabled=!ok;btn.style.opacity=ok?'1':'0.4';btn.style.cursor=ok?'pointer':'not-allowed';};
    btn.onclick=async()=>{ if(btn.disabled) return; await removeEmployee(eid); };
  }
}

// ── AUTH ACTIONS ──────────────────────────────────────────
async function doChangePassword() {
  const pw1=$('cpPw1')?.value, pw2=$('cpPw2')?.value;
  const err=$('cpErr'), ok=$('cpOk');
  if(!pw1||pw1.length<8||pw1!==pw2){if(err)err.style.display='block';if(ok)ok.style.display='none';return;}
  if(err)err.style.display='none';
  const btn=$('cpSave');if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const {error}=await sb.auth.updateUser({password:pw1});
  if(btn){btn.disabled=false;btn.textContent='Update password';}
  if(error){if(err){err.textContent='Error: '+error.message;err.style.display='block';}return;}
  if(ok)ok.style.display='block';
  if($('cpPw1'))$('cpPw1').value='';
  if($('cpPw2'))$('cpPw2').value='';
  setTimeout(()=>{S.md=null;render();notif('Password updated successfully!');},1500);
}

async function doLogin() {
  const email=$('lemail')?.value.trim(), pw=$('lpw')?.value;
  if(!email||!pw){const e=$('lerr');if(e)e.style.display='block';return;}
  const btn=$('lbtn'); if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){const e=$('lerr');if(e)e.style.display='block';if(btn){btn.disabled=false;btn.textContent='Sign in';}return;}
  S.session=data.session;
  await loadAll();
  S.employee=C.employees.find(e=>e.auth_id===data.user.id);
  render();
}

async function doForgotPassword() {
  const email=$('fpemail')?.value.trim();
  if(!email){return;}
  const btn=$('fpbtn'); if(btn){btn.disabled=true;btn.textContent='Sending…';}
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname,
  });
  if(btn){btn.disabled=false;btn.textContent='Send reset link';}
  if(error){const e=$('fperr');if(e)e.style.display='block';return;}
  const ok=$('fpok');if(ok)ok.style.display='block';
  const err=$('fperr');if(err)err.style.display='none';
}

async function doResetPassword() {
  const pw1=$('rppw1')?.value, pw2=$('rppw2')?.value;
  const err=$('rperr');
  if(!pw1||pw1.length<8||pw1!==pw2){if(err)err.style.display='block';return;}
  if(err)err.style.display='none';
  const btn=$('rpbtn'); if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const {error}=await sb.auth.updateUser({password:pw1});
  if(btn){btn.disabled=false;btn.textContent='Set new password';}
  if(error){if(err){err.textContent='Error: '+error.message;err.style.display='block';}return;}
  // Clear hash and redirect to login
  S.passwordReset=false;
  window.location.hash='';
  await sb.auth.signOut();
  S.session=null; S.employee=null;
  notif('Password updated! Please sign in with your new password.');
  render();
}

// ── DATA ACTIONS ──────────────────────────────────────────
async function submitTO() {
  const lt=$('ttype')?.value||'vacation';
  const f=$('tf')?.value, t=$('tt')?.value, r=$('tr')?.value.trim();
  if(!f||!t||!r){notif('Please fill in all fields','err');return;}
  if(t<f){notif('End date must be after start','err');return;}
  // Count working days
  let days=0,cur=new Date(f+'T12:00:00'),end=new Date(t+'T12:00:00');
  while(cur<=end){const dd=dstr(cur);if(!isHol(dd)&&!isDO(S.employee,dow(dd)))days++;cur.setDate(cur.getDate()+1);}
  if(leaveRemaining(S.employee.id,lt)<days){notif('Not enough '+LEAVE_TYPES.find(x=>x.id===lt).label+' balance','err');return;}
  const {error}=await sb.from('time_off_requests').insert({
    employee_id:S.employee.id, leave_type:lt, from_date:f, to_date:t,
    reason:r, days, status:'pending', submitted_at:TODAY,
  });
  if(error){notif('Error: '+error.message,'err');return;}
  await reloadTO(); notif('Request submitted!'); render();
}

async function approveTO(id) {
  const {error}=await sb.from('time_off_requests').update({status:'approved'}).eq('id',id);
  if(error){notif('Error: '+error.message,'err');return;}
  await reloadTO(); await reloadBalances();
  notif('Request approved'); render();
}

async function denyTO(id) {
  const {error}=await sb.from('time_off_requests').update({status:'denied'}).eq('id',id);
  if(error){notif('Error: '+error.message,'err');return;}
  await reloadTO(); notif('Request denied','err'); render();
}

async function saveEmployee() {
  const n=$('en')?.value.trim(), email=$('ee')?.value.trim();
  const u=$('eu')?.value.trim(), pw=$('epw')?.value, r=$('er')?.value;
  if(!n||!email||!u||!pw){notif('All fields required','err');return;}
  // Create auth user via Supabase
  const { data, error } = await sb.auth.admin?.createUser
    ? await sb.auth.admin.createUser({email, password:pw, email_confirm:true})
    : {data:null, error:{message:'Admin API not available in browser — user must register'}};
  if(error){notif('Cannot create user: '+error.message,'err');return;}
  const { error: empErr } = await sb.from('employees').insert({
    auth_id: data.user.id, name:n, username:u, role:r, days_off:[],
  });
  if(empErr){notif('Error: '+empErr.message,'err');return;}
  S.md=null; await loadAll(); notif('Added '+n); render();
}

async function saveShift() {
  const uid=$('se')?.value, d=$('sd')?.value, s=$('ss')?.value, e=$('se2')?.value;
  if(!uid||!d||!s||!e){notif('All fields required','err');return;}
  if(e<=s){notif('End must be after start','err');return;}
  const {error}=await sb.from('shifts').upsert({employee_id:uid,shift_date:d,start_time:s,end_time:e},{onConflict:'employee_id,shift_date'});
  if(error){notif('Error: '+error.message,'err');return;}
  S.md=null; await reloadShifts(); notif('Shift saved!'); render();
}

async function saveDaysOff() {
  const eid=$('saveDO')?.dataset.eid;
  const e=C.employees.find(x=>x.id===eid);
  if(!e||(e.days_off||[]).length!==2){notif('Select exactly 2 days off','err');return;}
  const {error}=await sb.from('employees').update({days_off:e.days_off}).eq('id',eid);
  if(error){notif('Error: '+error.message,'err');return;}
  S.md=null; await loadAll(); notif('Days off saved for '+e.name); render();
}

async function saveLeaveBalance() {
  const eid=$('saveLB')?.dataset.eid;
  for(const lt of LEAVE_TYPES) {
    const init=parseInt($('lb_init_'+lt.id)?.value)||0;
    const adj=parseInt($('lb_adj_'+lt.id)?.value)||0;
    const used=parseInt($('lb_used_'+lt.id)?.value)||0;
    const {error}=await sb.from('leave_balances').upsert(
      {employee_id:eid,leave_type:lt.id,year:CURRENT_YEAR,initial_days:Math.max(0,init),adjustment:adj,used_days:Math.max(0,used)},
      {onConflict:'employee_id,leave_type,year'}
    );
    if(error){notif('Error: '+error.message,'err');return;}
  }
  S.md=null; await reloadBalances();
  const e=C.employees.find(x=>x.id===eid);
  notif('Leave balances saved'+(e?' for '+e.name:'')); render();
}

async function regenShifts() {
  const btn=$('confirmRegen'); if(!btn) return;
  const yr=parseInt(btn.dataset.y), mo=parseInt(btn.dataset.m);
  const staff=C.employees.filter(e=>e.role!=='admin');
  const days=[], c=new Date(yr,mo+1,0).getDate();
  for(let i=1;i<=c;i++) days.push(new Date(yr,mo,i));
  const inserts=[];
  staff.forEach(e=>{
    days.forEach(d=>{
      const dd=dstr(d),h=isHol(dd),doff=isDO(e,dow(dd));
      if(h||doff) return;
      inserts.push({employee_id:e.id,shift_date:dd,start_time:'09:00',end_time:'17:00'});
    });
  });
  const {error}=await sb.from('shifts').upsert(inserts,{onConflict:'employee_id,shift_date',ignoreDuplicates:true});
  if(error){notif('Error: '+error.message,'err');return;}
  S.md=null; await reloadShifts();
  notif('Shifts regenerated for '+MONTH_NAMES[mo]+' '+yr); render();
}

async function generateShifts() {
  const btn=$('confirmGen'); if(!btn) return;
  const yr=parseInt(btn.dataset.y), mo=parseInt(btn.dataset.m);
  const staff=C.employees.filter(e=>e.role!=='admin');
  const days=[];
  const c=new Date(yr,mo+1,0).getDate();
  for(let i=1;i<=c;i++) days.push(new Date(yr,mo,i));
  const inserts=[];
  staff.forEach(e=>{
    days.forEach(d=>{
      const dd=dstr(d),h=isHol(dd),doff=isDO(e,dow(dd));
      if(h||doff) return;
      inserts.push({employee_id:e.id,shift_date:dd,start_time:'09:00',end_time:'17:00'});
    });
  });
  const {error}=await sb.from('shifts').upsert(inserts,{onConflict:'employee_id,shift_date',ignoreDuplicates:true});
  if(error){notif('Error: '+error.message,'err');return;}
  S.md=null; await reloadShifts();
  notif('Generated shifts for '+MONTH_NAMES[mo]+' '+yr); render();
}

async function removeEmployee(eid) {
  const {error}=await sb.from('employees').delete().eq('id',eid);
  if(error){notif('Error: '+error.message,'err');return;}
  S.md=null; await loadAll(); notif('Employee removed','err'); render();
}

// ── AUTO CLOCK-OUT ────────────────────────────────────────


// ── TICK ─────────────────────────────────────────────────
setInterval(()=>{
  S.now=new Date();
  const lk=document.getElementById('lck'); if(lk) lk.textContent=fmtNow(S.now);
  const openLog=S.session&&S.employee?myOpenWorkLog():null;
  const dr=document.getElementById('dur'); if(dr&&openLog) dr.textContent=eld(openLog.created_at);
  const lunchLog=S.session&&S.employee?myOpenLunchLog():null;
  const ld=document.getElementById('ldur'); if(ld&&lunchLog) ld.textContent=eld(lunchLog.created_at);
  // Update admin live timers
  C.logs.filter(l=>l.log_date===TODAY&&!l.clock_out).forEach(l=>{
    const el=document.getElementById('lv'+l.employee_id); if(el) el.textContent=eld(l.created_at);
  });
  // Auto clock-out check
  if(S.session&&S.employee&&isClocked()) {
    const openLog=myOpenWorkLog();
    const sh=C.shifts.find(s=>s.employee_id===S.employee.id&&s.shift_date===TODAY);
    if(sh&&openLog) {
      const [sh2,sm2]=sh.start_time.split(':').map(Number),[eh2,em2]=sh.end_time.split(':').map(Number);
      const durMs=((eh2*60+em2)-(sh2*60+sm2))*60000+60*60000;
      if(Date.now()-new Date(openLog.created_at).getTime()>=durMs) {
        doClockOut().then(()=>notif('Auto clocked out — 1 hr past shift end','err'));
      }
    }
  }
},1000);

// ── BOOT ──────────────────────────────────────────────────
function withTimeout(promise, ms) {
  return Promise.race([promise, new Promise(res => setTimeout(() => res({data:{session:null}}), ms))]);
}
(async function boot() {
  try {
    if(window.location.hash.includes('type=recovery')) {
      const { data: { session } } = await withTimeout(sb.auth.getSession(), 5000);
      if(session) { S.session=session; S.passwordReset=true; render(); return; }
    }
    const { data: { session } } = await withTimeout(sb.auth.getSession(), 5000);
    if(session) {
      S.session=session;
      await loadAll();
      S.employee=C.employees.find(e=>e.auth_id===session.user.id);
    }
  } catch(e) {
    console.error('Boot error:', e);
  }
  render();
  sb.auth.onAuthStateChange((event, session) => {
    S.session=session;
    if(!session) { S.employee=null; render(); }
  });
})();
</script>
