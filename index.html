        <td>${PERF_LABELS[j.job_type]||j.job_type}</td><td>${j.client_name||''}</td>
        <td>${isPen?`<span style="color:var(--err-text)">⚠ 0 <s style="color:var(--muted);font-size:11px">${PERF_POINTS[j.job_type]||0}</s></span>`:`<strong style="color:var(--accent)">${pts}</strong>`}</td>
        <td class="muted">${j.notes||''}</td>
        <td><div class="row" style="gap:4px">
          ${hasComplaint
            ? `<span title="${j.complaint_note}" style="cursor:pointer;color:var(--err-text);font-size:13px">⚠️</span><button class="btn bsm" style="color:var(--err-text);border-color:var(--err-bdr);font-size:11px" onclick="clearComplaint('${j.id}')">Clear</button>`
            : `<button class="btn bsm" style="font-size:11px;color:var(--muted)" onclick="S.md='complaint:${j.id}';render()">Complaint</button>`}
          <button class="btn bsm brd" style="color:var(--err-text);border-color:var(--err-bdr)" onclick="perfDeleteJob('${j.id}')">Del</button>
        </div></td>
      </tr>`;
    }).join('');
    let csvPreview='';
    if (_perfCsvRows.length) {
      const valid=_perfCsvRows.filter(r=>!r.error).length, errs=_perfCsvRows.filter(r=>r.error).length;
      csvPreview=`<div class="btw" style="margin-bottom:8px"><span class="muted">${valid} valid · ${errs} errors</span><button class="btn bsm bb" onclick="perfCsvImport()" id="perfCsvBtn">Import ${valid} jobs</button></div>
        <div class="twrap" style="max-height:200px;overflow-y:auto;margin-bottom:8px"><table class="tbl" style="font-size:12px"><thead><tr><th>Date</th><th>Tech</th><th>Type</th><th>Client</th><th>Pts</th><th></th></tr></thead>
        <tbody>${_perfCsvRows.map(r=>`<tr style="${r.error?'background:var(--err-bg)':''}"><td>${r.date}</td><td>${r.technician_name}</td><td>${r.error?'—':PERF_LABELS[r.job_type]}</td><td>${r.client_name||''}</td><td>${r.error?'—':r.points}</td><td style="color:var(--err-text);font-size:11px">${r.error||''}</td></tr>`).join('')}</tbody></table></div>`;
    }
    const csvRes=_perfCsvResult?`<div style="margin-top:8px;font-size:13px;font-weight:500;color:${_perfCsvResult.startsWith('✅')?'var(--ok-text)':_perfCsvResult.startsWith('⚠')?'var(--warn-text)':'var(--err-text)'}">${_perfCsvResult}</div>`:'';
    body=`
      <div class="card" style="margin-bottom:14px">
        <div class="btw" style="margin-bottom:12px">
          <div><div style="font-weight:700">Import CSV</div><div class="muted" style="font-size:12px">Upload export — previewed before import</div></div>
          <label class="btn bsm" style="cursor:pointer">${_perfCsvFile?'📄 '+_perfCsvFile:'Choose CSV…'}<input type="file" accept=".csv" style="display:none" onchange="perfCsvFile(this)"></label>
        </div>${csvPreview}${csvRes}
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="btw" style="margin-bottom:12px">
          <div><div style="font-weight:700">Manual entry</div><div class="muted" style="font-size:12px">Add rows, then submit all at once</div></div>
          <button class="btn bsm" onclick="perfAddRow()">+ Add row</button>
        </div>
        <div class="twrap"><table class="tbl"><thead><tr><th>Date</th><th>Tech</th><th>Type</th><th>Client</th><th>Notes</th><th></th></tr></thead><tbody>${addRowsHtml}</tbody></table></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn bb" id="perfSubmitBtn" onclick="perfSubmit()">Submit rows</button>
          <button class="btn" onclick="perfResetRows()">Reset</button>
        </div>
      </div>
      <div>
        <div class="btw" style="margin-bottom:8px">
          <div class="muted">${_perfShowAll?'All jobs ('+C.perfJobs.length+')':'Recent (30)'} <span style="font-size:11px;color:var(--err-text);margin-left:8px">⚠ = repeat client within 30d</span></div>
          <button class="btn bsm" onclick="perfToggleAll()">${_perfShowAll?'Show recent':'All ('+C.perfJobs.length+')'}</button>
        </div>
        <div class="twrap"><table class="tbl"><thead><tr><th>Date</th><th>Tech</th><th>Type</th><th>Client</th><th>Points</th><th>Notes</th><th></th></tr></thead><tbody>${jobRows||'<tr><td colspan="6" class="emp">No jobs yet</td></tr>'}</tbody></table></div>
      </div>`;
  }
  else if (_perfView==='executive') {
    const topW=agg.lbW.slice(0,5).map((x,i)=>[`${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${x.name}`,perfFmt(x.week),x.jobsWeek]);
    const topM=agg.lbM.slice(0,5).map((x,i)=>[`${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${x.name}`,perfFmt(x.month),x.jobsMonth]);
    body=`<div class="g2">
      <div><div class="ctitle">🏆 Top Technicians — Week</div>${perfTable(['Tech','Points','Jobs'],topW)}</div>
      <div><div class="ctitle">🏆 Top Technicians — Month</div>${perfTable(['Tech','Points','Jobs'],topM)}</div>
    </div>`;
  }

  const complaintMd = S.md?.startsWith('complaint:') ? complaintModal(S.md.split(':')[1]) : '';
  return `${complaintMd}<div class="btw" style="margin-bottom:16px">
    <div><div class="ph">Performance</div><div class="ps">Points · Leaderboards · Job log</div></div>
    <div class="row" style="gap:6px">${subNav}<button class="btn bsm" onclick="perfRefresh()">⟳ Refresh</button>
    <button class="btn bsm" style="color:var(--ok-text);border-color:var(--ok-bdr)" onclick="showUcrmSync()">🔗 Sync UCRM</button></div>
  </div>
  <div id="ucrmSyncPanel"></div>
  ${body}`;
}

// ── PERF INTERACTIONS ──────────────────────────────────────
function setPerfView(v) { _perfView=v; render(); }
function perfToggleAll() { _perfShowAll=!_perfShowAll; render(); }
function perfAddRow() { if(!_perfAddRows)_perfAddRows=[]; _perfAddRows.push({job_date:TODAY,job_type:'WIFI_INSTALL',technician_id:'',client_name:'',notes:''}); render(); }
function perfRemoveRow(i) { _perfAddRows.splice(i,1); if(!_perfAddRows.length)perfAddRow(); render(); }
function perfResetRows() { _perfAddRows=[{job_date:TODAY,job_type:'WIFI_INSTALL',technician_id:'',client_name:'',notes:''}]; render(); }
function perfRowUpdate(i,field,val) { if(_perfAddRows) _perfAddRows[i][field]=val; }
function aTroubleshoot() {
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:20px;text-align:center">
    <div style="font-size:48px">🛠</div>
    <div style="font-size:22px;font-weight:700;color:var(--text)">CSR Troubleshooting Tool</div>
    <div style="font-size:14px;color:var(--muted);max-width:400px">Step-by-step guide for diagnosing customer internet issues — LED checks, UISP readings, speed tests, and technician ticket generation.</div>
    <button class="btn bb" style="font-size:15px;padding:12px 28px;border-radius:10px" onclick="window.__openTroubleshoot()">Open Troubleshooting Tool ↗</button>
    <div style="font-size:12px;color:var(--muted)">Opens in a new tab</div>
  </div>`;
}
async function loadCallLogs() {
  const { data, error } = await sb.from('call_logs')
    .select('*').order('created_at', { ascending: false }).limit(200);
  if (!error) C.callLogs = data || [];
}

let _clSearch = '', _clOutcome = 'all', _clExpanded = null;

function aCallLog() {
  if (!C.callLogs) { loadCallLogs().then(() => render()); return '<div class="loading-page"><div class="spinner"></div><div class="muted">Loading call log...</div></div>'; }
  const logs = C.callLogs || [];

  // Filter
  const filtered = logs.filter(l => {
    const mf = _clOutcome === 'all' || l.outcome === _clOutcome;
    const q = _clSearch.toLowerCase();
    const ms = !q || [l.customer_name, l.customer_phone, l.csr_name, l.issue_type, l.resolution_note, l.ticket_text]
      .some(v => v && v.toLowerCase().includes(q));
    return mf && ms;
  });

  const rows = filtered.map(l => {
    const isOpen = _clExpanded === l.id;
    const date = new Date(l.created_at).toLocaleString('en-US', { timeZone: 'America/Jamaica', dateStyle: 'medium', timeStyle: 'short' });
    const outcomeColor = l.outcome === 'resolved' ? 'var(--ok-text)' : l.outcome === 'escalated' ? '#f59e0b' : 'var(--muted)';
    const outcomeBg    = l.outcome === 'resolved' ? 'var(--ok-bg)'   : l.outcome === 'escalated' ? '#fef3c7'   : 'var(--surface2)';

    // Speed summary
    const avgSpd = arr => { const v = (arr||[]).filter(x=>x!==''); return v.length ? (v.reduce((a,b)=>a+parseFloat(b),0)/v.length).toFixed(1) : '—'; };
    const spdSummary = (l.speed_down?.length) ? `↓${avgSpd(l.speed_down)} / ↑${avgSpd(l.speed_up)} Mbps avg` : '';

    // UISP summary
    const uispSummary = l.connection_type === 'fiber'
      ? (l.uisp_rx_power ? `RX ${l.uisp_rx_power} dBm` : '')
      : (l.uisp_signal ? `Signal ${l.uisp_signal} dBm` + (l.uisp_rx_cap ? ` · Rx ${l.uisp_rx_cap} Mbps` : '') : '');

    const detailHtml = isOpen ? `<tr style="background:var(--surface2)"><td colspan="7" style="padding:16px 20px">
      <div class="g4" style="gap:12px;margin-bottom:14px">
        ${l.connection_type?`<div class="sc"><div style="font-size:12px;color:var(--muted)">Connection</div><div style="font-weight:600">${l.connection_type==='fiber'?'Fiber':'LiteBeam AC'}</div></div>`:''}
        ${l.service_plan?`<div class="sc"><div style="font-size:12px;color:var(--muted)">Plan</div><div style="font-weight:600">${l.service_plan}</div></div>`:''}
        ${l.uisp_signal?`<div class="sc"><div style="font-size:12px;color:var(--muted)">Signal</div><div style="font-weight:600">${l.uisp_signal} dBm</div></div>`:''}
        ${l.uisp_rx_cap?`<div class="sc"><div style="font-size:12px;color:var(--muted)">Rx cap</div><div style="font-weight:600">${l.uisp_rx_cap} Mbps</div></div>`:''}
        ${l.uisp_tx_cap?`<div class="sc"><div style="font-size:12px;color:var(--muted)">Tx cap</div><div style="font-weight:600">${l.uisp_tx_cap} Mbps</div></div>`:''}
        ${l.uisp_rx_power?`<div class="sc"><div style="font-size:12px;color:var(--muted)">RX power</div><div style="font-weight:600">${l.uisp_rx_power} dBm</div></div>`:''}
      </div>
      ${(l.speed_down?.some(v=>v))?`
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">SPEED TESTS</div>
        <table class="tbl" style="font-size:12px">
          <thead><tr><th>#</th><th>Customer ↓</th><th>Customer ↑</th><th>Ping</th><th>UISP Rx ↓</th><th>UISP Tx ↑</th></tr></thead>
          <tbody>
            ${[0,1,2].filter(i=>(l.speed_down||[])[i]).map(i=>`<tr>
              <td>${i+1}</td>
              <td>${l.speed_down[i]||'—'} Mbps</td>
              <td>${l.speed_up?.[i]||'—'} Mbps</td>
              <td>${l.speed_ping?.[i]||'—'} ms</td>
              <td>${l.obs_down?.[i]||'—'} Mbps</td>
              <td>${l.obs_up?.[i]||'—'} Mbps</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`:''}
      ${l.resolution_note?`<div style="margin-bottom:10px"><span style="font-size:12px;color:var(--muted);font-weight:600">NOTES</span><div style="font-size:13px;margin-top:4px">${l.resolution_note}</div></div>`:''}
      ${l.ticket_text?`<div><span style="font-size:12px;color:var(--muted);font-weight:600">TICKET</span><pre style="font-size:11px;background:var(--surface);padding:10px;border-radius:6px;overflow-x:auto;white-space:pre-wrap;margin-top:4px">${l.ticket_text}</pre></div>`:''}
    </td></tr>` : '';

    return `<tr style="cursor:pointer;${isOpen?'background:var(--accent-light)':''}" onclick="_clExpanded=${isOpen?'null':`'${l.id}'`};render()">
      <td style="font-size:12px;color:var(--muted)">${date}</td>
      <td style="font-weight:600">${l.customer_name||'—'}</td>
      <td style="font-size:13px">${l.customer_phone||'—'}</td>
      <td style="font-size:13px">${l.csr_name||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${l.issue_type||'—'}</td>
      <td><span class="badge" style="background:${outcomeBg};color:${outcomeColor};font-size:11px">${l.outcome||'—'}</span></td>
      <td style="font-size:12px;color:var(--muted)">${spdSummary||uispSummary||'—'}</td>
    </tr>${detailHtml}`;
  }).join('');

  return `<div class="btw" style="margin-bottom:16px">
    <div><div class="ph">📞 Call Log</div><div class="ps">${logs.length} total calls logged</div></div>
    <button class="btn bsm" onclick="C.callLogs=null;render()">↻ Refresh</button>
  </div>
  <div class="card" style="margin-bottom:14px;padding:12px 16px">
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <input type="text" placeholder="Search customer, phone, CSR, notes..." value="${_clSearch}" oninput="_clSearch=this.value;_clExpanded=null;render()" style="flex:1;min-width:200px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:13px;outline:none">
      <div class="row" style="gap:6px">
        ${['all','resolved','escalated'].map(o=>`<button class="btn bsm${_clOutcome===o?' bb':''}" onclick="_clOutcome='${o}';_clExpanded=null;render()">${o}</button>`).join('')}
      </div>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    ${filtered.length ? `<div class="twrap"><table class="tbl">
      <thead><tr><th>Date / Time</th><th>Customer</th><th>Phone</th><th>CSR</th><th>Issue</th><th>Outcome</th><th>Speed / Signal</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>` : '<div class="emp">No call logs match your search.</div>'}
  </div>`;
}

    font-weight: 700;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin: 16px 0 8px;\n  }\n  .test-row-label:first-of-type { margin-top: 0; }\n  .test-fields {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 14px;\n    margin-bottom: 0;\n  }\n  .obs-fields {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 14px;\n    margin-bottom: 16px;\n    background: rgba(15,139,141,0.06);\n    border-radius: 6px;\n    padding: 10px 12px;\n    margin-top: 6px;\n  }\n  @media (max-width: 640px) {\n    .test-fields { grid-template-columns: 1fr; }\n  }\n  @media (max-width: 640px) {\n    .card { padding: 24px 22px; }\n    .start-hero h1 { font-size: 30px; }\n    .field-group, .equip-grid { grid-template-columns: 1fr; }\n    header.app-header { padding: 12px 16px; }\n    .header-meta .pill { display: none; }\n  }\n</style>\n</head>\n<body>\n\n<header class=\"app-header\">\n  <div class=\"brand\">\n    <div class=\"logo\" aria-hidden=\"true\"></div>\n    <div class=\"brand-text\">\n      <div class=\"b1\">ATS Netflair</div>\n      <div class=\"b2\">CSR Troubleshooting</div>\n    </div>\n  </div>\n  <div class=\"header-meta\">\n    <span id=\"cpe-pill\" class=\"pill cpe\" style=\"display:none\"></span>\n    <span id=\"plan-pill\" class=\"pill plan\" style=\"display:none\"></span>\n    <button class=\"restart-btn\" id=\"restart-btn\">\u21bb New Call</button>\n  </div>\n</header>\n\n<main class=\"container\">\n  <div id=\"crumb-bar\" class=\"crumb\"></div>\n  <div id=\"app\"></div>\n</main>\n\n<script>\n/* ============================================================\n   PLANS (from CRM)\n   ============================================================ */\nconst PLANS = [\n  { id: 'fiber_ultra',  name: 'FIBER ULTRA',  speed: 50,   defaultCpe: 'ufiber'   },\n  { id: 'fiber_75',     name: 'FIBER 75',     speed: 75,   defaultCpe: 'ufiber'   },\n  { id: 'fiber_50',     name: 'FIBER 50',     speed: 50,   defaultCpe: 'ufiber'   },\n  { id: 'fiber_25',     name: 'FIBER 25',     speed: 25,   defaultCpe: 'ufiber'   },\n  { id: 'diamond_50',   name: 'DIMOND 50',    speed: 50,   defaultCpe: 'litebeam' },\n  { id: 'gold_40',      name: 'GOLD 40',      speed: 40,   defaultCpe: 'litebeam' },\n  { id: 'platinum_35',  name: 'PLATINUM 35',  speed: 35,   defaultCpe: 'litebeam' },\n  { id: 'silver_20',    name: 'SILVER 20',    speed: 20,   defaultCpe: 'litebeam' },\n  { id: 'bronz_15',     name: 'BRONZ 15',     speed: 15,   defaultCpe: 'litebeam' },\n  { id: 'legacy',       name: 'Migrated legacy', speed: null, defaultCpe: 'either' }\n];\n\nfunction planById(id) { return PLANS.find(p => p.id === id); }\n\n/* ============================================================\n   STATE\n   ============================================================ */\nconst initialState = () => ({\n  screen: 'start',\n  history: [],\n  data: {\n    cpe: null,            // 'litebeam' | 'ufiber'\n    routerType: null,     // 'generic' | 'aircube'\n    poePassthrough: null, // 'standard' | 'passthrough' \u2014 only relevant for LiteBeam + AirCube\n    planId: null,\n    planSpeedOverride: '', // for FIBER ULTRA / legacy\n    customerName: '',\n    accountNumber: '',\n    serviceAddress: '',\n    contactNumber: '',\n    accountStatus: null,\n    uispOnline: null,\n    uispSignal: '',\n    uispRxCapacity: '',\n    uispTxCapacity: '',\n    uispLan: '',\n    uispRxPower: '',\n    uispTxPower: '',\n    uispDistance: '',\n    uispLastSeen: '',\n    issueType: null,\n    ledPower: null,\n    ledData: null,\n    ledLos: null,\n    ledRouterWan: null,\n    aircubeRemoteAction: null,\n    powerCycleAttempted: false,\n    powerCycleResult: null,\n    wiredTestResult: null,\n    speedTestsDown: ['', '', ''],\n    speedTestsUp: ['', '', ''],\n    speedTestsPing: ['', '', ''],\n    obsDown: ['', '', ''],\n    obsUp: ['', '', ''],\n    speedTested: null,\n    weatherCorrelated: null,\n    repeatCall: null,\n    wifiSubIssue: null,\n    notes: ''\n  }\n});\n\nlet state = initialState();\n\nfunction planSpeed() {\n  const p = planById(state.data.planId);\n  if (!p) return null;\n  if (p.speed) return p.speed;\n  const o = parseFloat(state.data.planSpeedOverride);\n  return isNaN(o) ? null : o;\n}\n\nfunction planLabel() {\n  const p = planById(state.data.planId);\n  if (!p) return '';\n  const s = planSpeed();\n  return s ? `${p.name} \u00b7 ${s} Mbps` : p.name;\n}\n\nfunction isFiber()    { return state.data.cpe === 'ufiber'; }\nfunction isLitebeam() { return state.data.cpe === 'litebeam'; }\nfunction isAircube()  { return state.data.routerType === 'aircube'; }\nfunction isPassthrough() { return isAircube() && state.data.poePassthrough === 'passthrough'; }\nfunction needsWiringConfig() { return isAircube() && state.data.cpe; }\n\nfunction avgSpeed(arr) {\n  const nums = (arr || []).map(parseFloat).filter(n => !isNaN(n));\n  if (nums.length === 0) return null;\n  return nums.reduce((a, b) => a + b, 0) / nums.length;\n}\n\nfunction updateSpeedAverages(prefix) {\n  const downs = [], ups = [], pings = [];\n  for (let i = 1; i <= 3; i++) {\n    const d = document.getElementById(`${prefix}${i}d`);\n    const u = document.getElementById(`${prefix}${i}u`);\n    const p = document.getElementById(`${prefix}${i}p`);\n    if (d) downs.push(d.value);\n    if (u) ups.push(u.value);\n    if (p) pings.push(p.value);\n  }\n  const avgD = avgSpeed(downs);\n  const avgU = avgSpeed(ups);\n  const avgP = avgSpeed(pings);\n  const display = document.getElementById(`${prefix}-avg`);\n  if (!display) return;\n  if (avgD === null && avgP === null) {\n    display.innerHTML = '<span class=\"muted\">Average will appear here as you fill in the tests</span>';\n    return;\n  }\n  const sp = planSpeed();\n  const ratio = (sp && avgD) ? ` \u00b7 ${((avgD / sp) * 100).toFixed(0)}% of plan` : '';\n  const speedCls = (sp && avgD && avgD / sp >= 0.80) ? 'avg-good' : 'avg-low';\n  const pingCls = avgP !== null ? (avgP <= 50 ? 'avg-good' : avgP > 100 ? 'avg-low' : '') : '';\n\n  const speedPart = avgD !== null\n    ? `<span class=\"${speedCls}\"><strong>Avg: ${avgD.toFixed(1)} Mbps down${avgU !== null ? ` / ${avgU.toFixed(1)} Mbps up` : ''}</strong>${ratio}</span>`\n    : '';\n  const pingPart = avgP !== null\n    ? `<span class=\"${pingCls}\"><strong>${avgP.toFixed(0)} ms ping</strong>${avgP > 100 ? ' (high)' : ''}</span>`\n    : '';\n\n  display.innerHTML = [speedPart, pingPart].filter(Boolean).join(' &nbsp;\u00b7&nbsp; ');\n}\n\nfunction cpeLabel() { return isFiber() ? 'UFiber Loco' : 'LiteBeam AC'; }\nfunction routerLabel() { return isAircube() ? 'AirCube ISP' : 'WiFi router'; }\n\n/* ============================================================\n   NAVIGATION\n   ============================================================ */\nfunction goTo(screenId) {\n  if (state._currentBeforeLeave) {\n    try { state._currentBeforeLeave(); } catch (e) { console.error(e); }\n  }\n  state.history.push(state.screen);\n  state.screen = screenId;\n  render();\n  window.scrollTo({ top: 0, behavior: 'smooth' });\n}\nfunction goBack() {\n  if (state.history.length > 0) {\n    state.screen = state.history.pop();\n    render();\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n}\nfunction restart() {\n  if (state.screen !== 'start' && !confirm('Reset and start a new call?')) return;\n  state = initialState();\n  render();\n  window.scrollTo({ top: 0, behavior: 'smooth' });\n}\n\n/* ============================================================\n   SCREENS\n   ============================================================ */\nconst screens = {};\n\n/* ---- START ---- */\nscreens.start = () => ({\n  crumb: ['Start'],\n  html: `\n    <div class=\"card start\">\n      <div class=\"start-hero\">\n        <div class=\"eyebrow\">Internal Tool \u00b7 Customer Service</div>\n        <h1>Internet Issue Troubleshooting</h1>\n        <p class=\"lede\">Pick the customer's equipment and plan, then walk through the prompts. The tool tracks what you check and drafts the technician ticket if you escalate.</p>\n      </div>\n\n      <h2 class=\"section-h\">1 \u00b7 Customer Equipment</h2>\n      <div class=\"equip-grid\" id=\"cpe-grid\">\n        <div class=\"equip-card\" data-cpe=\"litebeam\" onclick=\"setCpe('litebeam')\">\n          <div class=\"et-1\">Wireless CPE</div>\n          <div class=\"et-2\">LiteBeam AC</div>\n          <div class=\"et-3\">Ubiquiti AirMAX wireless link to tower</div>\n        </div>\n        <div class=\"equip-card fiber\" data-cpe=\"ufiber\" onclick=\"setCpe('ufiber')\">\n          <div class=\"et-1\">Fiber ONT</div>\n          <div class=\"et-2\">UFiber Loco</div>\n          <div class=\"et-3\">Ubiquiti GPON fiber-to-the-home</div>\n        </div>\n      </div>\n\n      <h2 class=\"section-h\" style=\"margin-top: 8px;\">2 \u00b7 Indoor Router</h2>\n      <div class=\"equip-grid\" id=\"router-grid\">\n        <div class=\"equip-card\" data-router=\"generic\" onclick=\"setRouter('generic')\">\n          <div class=\"et-1\">Customer-supplied / generic</div>\n          <div class=\"et-2\">Standard WiFi router</div>\n          <div class=\"et-3\">TP-Link, Tenda, etc \u2014 not managed by us</div>\n        </div>\n        <div class=\"equip-card\" data-router=\"aircube\" onclick=\"setRouter('aircube')\">\n          <div class=\"et-1\">ATS-supplied \u00b7 UISP-managed</div>\n          <div class=\"et-2\">AirCube ISP</div>\n          <div class=\"et-3\">Can be remotely rebooted from UISP</div>\n        </div>\n      </div>\n\n      ${''}\n      <h2 class=\"section-h\" style=\"margin-top: 8px;\">3 \u00b7 Service Plan</h2>\n      <div class=\"field-group\">\n        <div class=\"field full\">\n          <label>Plan (from CRM)</label>\n          <select id=\"plan-select\" onchange=\"setPlan(this.value)\">\n            <option value=\"\">\u2014 select plan \u2014</option>\n            ${PLANS.map(p => `<option value=\"${p.id}\" ${state.data.planId === p.id ? 'selected' : ''}>${p.name}${p.speed ? ` \u00b7 ${p.speed} Mbps` : ''}</option>`).join('')}\n          </select>\n        </div>\n        <div class=\"field full\" id=\"speed-override-wrap\" style=\"display:${needsSpeedOverride() ? 'flex' : 'none'}\">\n          <label>Plan speed override (Mbps) \u2014 required for ${planById(state.data.planId)?.name || 'this plan'}</label>\n          <input id=\"plan-speed-input\" type=\"number\" step=\"1\" value=\"${state.data.planSpeedOverride}\" placeholder=\"e.g. 100\" oninput=\"state.data.planSpeedOverride = this.value; updateBeginButton();\" />\n        </div>\n      </div>\n\n      <button class=\"primary-btn\" id=\"begin-btn\" onclick=\"goTo('verify')\" disabled>Begin call \u2192</button>\n    </div>\n  `,\n  onMount: () => { highlightSelections(); updateBeginButton(); }\n});\n\nfunction needsSpeedOverride() {\n  const p = planById(state.data.planId);\n  return p && p.speed === null;\n}\n\nfunction setCpe(c) {\n  state.data.cpe = c;\n  if (!needsWiringConfig()) state.data.poePassthrough = null;\n  render();\n}\nfunction setRouter(r) {\n  state.data.routerType = r;\n  if (!needsWiringConfig()) state.data.poePassthrough = null;\n  render();\n}\nfunction setWiring(w) {\n  state.data.poePassthrough = w;\n  highlightSelections();\n  updateBeginButton();\n}\nfunction setPlan(id) {\n  state.data.planId = id || null;\n  state.data.planSpeedOverride = '';\n  const p = planById(id);\n  if (p && !state.data.cpe && p.defaultCpe !== 'either') {\n    state.data.cpe = p.defaultCpe;\n  }\n  render();\n}\nfunction highlightSelections() {\n  document.querySelectorAll('[data-cpe]').forEach(el => {\n    el.classList.toggle('selected', el.dataset.cpe === state.data.cpe);\n  });\n  document.querySelectorAll('[data-router]').forEach(el => {\n    el.classList.toggle('selected', el.dataset.router === state.data.routerType);\n  });\n  document.querySelectorAll('[data-wiring]').forEach(el => {\n    el.classList.toggle('selected', el.dataset.wiring === state.data.poePassthrough);\n  });\n}\nfunction updateBeginButton() {\n  const ready = state.data.cpe && state.data.routerType && state.data.planId\n    && (!needsSpeedOverride() || planSpeed() !== null);\n  const btn = document.getElementById('begin-btn');\n  if (btn) btn.disabled = !ready;\n}\n\n/* ---- VERIFY ---- */\nscreens.verify = () => ({\n  crumb: ['Start', 'Verify Account'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Step 1 \u00b7 Greeting & Account Verification</h2>\n      <h1 class=\"screen-title\">Pull up the account.</h1>\n      <p class=\"screen-sub\">Greet the customer, verify the account, and check for any known outages.</p>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"Thank you for calling ATS Netflair, this is [Your Name]. How may I help you today?\"</div>\n      </div>\n      <div class=\"say\">\n        <div class=\"say-label\">Then</div>\n        <div class=\"say-text\">\"I'm sorry to hear that. Let me pull up your account. May I have the name on the account or your account number, please?\"</div>\n      </div>\n\n      <div class=\"field-group\">\n        <div class=\"field\"><label>Customer Name</label><input id=\"i-name\" value=\"${state.data.customerName}\" placeholder=\"Full name on account\" /></div>\n        <div class=\"field\"><label>Account Number</label><input id=\"i-acct\" value=\"${state.data.accountNumber}\" placeholder=\"e.g. NF-12345\" /></div>\n        <div class=\"field\"><label>Service Address</label><input id=\"i-addr\" value=\"${state.data.serviceAddress}\" placeholder=\"Property address\" /></div>\n        <div class=\"field\"><label>Contact Number</label><input id=\"i-phone\" value=\"${state.data.contactNumber}\" placeholder=\"Phone on file\" /></div>\n      </div>\n\n      <div class=\"question\">Account status?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setAccountStatus('active')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Active \u2014 no outage in area</div>\n            <div class=\"opt-desc\">Continue troubleshooting</div>\n          </div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setAccountStatus('suspended')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Suspended / Past Due</div>\n            <div class=\"opt-desc\">Service interrupted for non-payment</div>\n          </div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"setAccountStatus('outage')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Known outage in their area</div>\n            <div class=\"opt-desc\">Already a ticket, log this call against the outage</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `,\n  beforeLeave: captureCustomerInfo\n});\n\nfunction captureCustomerInfo() {\n  const map = { 'i-name': 'customerName', 'i-acct': 'accountNumber', 'i-addr': 'serviceAddress', 'i-phone': 'contactNumber' };\n  for (const [id, key] of Object.entries(map)) {\n    const el = document.getElementById(id);\n    if (el) state.data[key] = el.value;\n  }\n}\n\nfunction setAccountStatus(s) {\n  captureCustomerInfo();\n  state.data.accountStatus = s;\n  if (s === 'active') goTo('uisp_check');\n  else if (s === 'suspended') goTo('end_suspended');\n  else goTo('end_outage');\n}\n\n/* ---- UISP CHECK ---- */\nscreens.uisp_check = () => ({\n  crumb: ['Verify', 'UISP Check'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Step 2 \u00b7 UISP First Check</h2>\n      <h1 class=\"screen-title\">Open the ${cpeLabel()} in UISP.</h1>\n      <p class=\"screen-sub\">Check device status before walking the customer through anything. UISP often gives you the answer up front.</p>\n\n      ${isFiber() ? `\n        <div class=\"callout fiber-info\">\n          <div class=\"callout-label\">Healthy thresholds \u2014 UFiber Loco</div>\n          <div class=\"callout-body\">\n            RX optical: <strong>-8 to -22 dBm</strong> \u00b7 TX optical: <strong>+0.5 to +5 dBm</strong> \u00b7 LAN: <strong>1 Gbps full duplex</strong>\n          </div>\n        </div>\n        <div class=\"field-group\">\n          <div class=\"field\"><label>RX optical (dBm) \u2014 downstream</label><input id=\"u-rx\" value=\"${state.data.uispRxPower}\" placeholder=\"-18\" /></div>\n          <div class=\"field\"><label>TX optical (dBm) \u2014 upstream</label><input id=\"u-tx\" value=\"${state.data.uispTxPower}\" placeholder=\"+2.4\" /></div>\n          <div class=\"field\"><label>Distance to OLT (m)</label><input id=\"u-dist\" value=\"${state.data.uispDistance}\" placeholder=\"1240\" /></div>\n          <div class=\"field\"><label>Last seen</label><input id=\"u-ls\" value=\"${state.data.uispLastSeen}\" placeholder=\"online / 5 min ago\" /></div>\n        </div>\n      ` : `\n        <div class=\"callout info\">\n          <div class=\"callout-label\">Healthy thresholds \u2014 LiteBeam AC</div>\n          <div class=\"callout-body\">\n            Signal: <strong>-55 to -77 dBm</strong> (\u2264 -78 dBm = escalate) \u00b7 Rx capacity: <strong>\u2265 45 Mbps</strong> \u00b7 Tx capacity: <strong>\u2265 45 Mbps</strong>\n          </div>\n        </div>\n        <div class=\"field-group\">\n          <div class=\"field\"><label>Signal (dBm)</label><input id=\"u-sig\" value=\"${state.data.uispSignal}\" placeholder=\"-65\" type=\"number\" step=\"0.1\" oninput=\"updateUispWarning()\" /></div>\n          <div class=\"field\"><label>Rx capacity (Mbps)</label><input id=\"u-rx-cap\" value=\"${state.data.uispRxCapacity}\" placeholder=\"55\" type=\"number\" step=\"0.1\" oninput=\"updateUispWarning()\" /></div>\n          <div class=\"field\"><label>Tx capacity (Mbps)</label><input id=\"u-tx-cap\" value=\"${state.data.uispTxCapacity}\" placeholder=\"48\" type=\"number\" step=\"0.1\" oninput=\"updateUispWarning()\" /></div>\n          <div class=\"field\"><label>Last seen</label><input id=\"u-ls\" value=\"${state.data.uispLastSeen}\" placeholder=\"online / 12 min ago\" /></div>\n        </div>\n        <div id=\"uisp-warn\" style=\"display:none\"></div>\n      `}\n\n      <div class=\"question\">Based on UISP, what is the ${cpeLabel()} showing?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setUisp('healthy')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Online \u2014 all readings healthy</div>\n            <div class=\"opt-desc\">Issue is downstream of the ${cpeLabel()} (router or WiFi)</div>\n          </div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setUisp('degraded')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Online but degraded</div>\n            <div class=\"opt-desc\">${isFiber()\n              ? 'RX worse than -25 dBm, RX above -8 (saturated), or LAN not at gigabit'\n              : 'Signal worse than -78 dBm, or Rx/Tx capacity below 45 Mbps'}</div>\n          </div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"setUisp('offline')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Offline / unreachable</div>\n            <div class=\"opt-desc\">${isFiber()\n              ? 'No connection to the OLT \u2014 possible fiber cut, dirty connector, or power loss'\n              : 'LiteBeam has lost contact \u2014 try a power cycle, then escalate if no return'}</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `,\n  beforeLeave: captureUisp\n});\n\nfunction captureUisp() {\n  if (isFiber()) {\n    const map = { 'u-rx': 'uispRxPower', 'u-tx': 'uispTxPower', 'u-dist': 'uispDistance', 'u-ls': 'uispLastSeen' };\n    for (const [id, key] of Object.entries(map)) {\n      const el = document.getElementById(id);\n      if (el) state.data[key] = el.value;\n    }\n  } else {\n    const map = { 'u-sig': 'uispSignal', 'u-rx-cap': 'uispRxCapacity', 'u-tx-cap': 'uispTxCapacity', 'u-ls': 'uispLastSeen' };\n    for (const [id, key] of Object.entries(map)) {\n      const el = document.getElementById(id);\n      if (el) state.data[key] = el.value;\n    }\n  }\n}\n\nfunction setUisp(v) {\n  captureUisp();\n  state.data.uispOnline = v;\n\n  // Auto-escalate if signal or capacity is out of spec\n  if (!isFiber() && v !== 'offline') {\n    const sig = parseFloat(state.data.uispSignal);\n    const rxCap = parseFloat(state.data.uispRxCapacity);\n    const txCap = parseFloat(state.data.uispTxCapacity);\n    const badSignal = !isNaN(sig) && sig <= -78;\n    const badRate   = (!isNaN(rxCap) && rxCap < 45) || (!isNaN(txCap) && txCap < 45);\n    if (badSignal || badRate) {\n      state.data.uispOnline = 'degraded';\n      goTo('end_escalate');\n      return;\n    }\n  }\n\n  if (v === 'healthy') goTo('issue_type');\n  else if (v === 'degraded') goTo('end_escalate');\n  else {\n    if (!state.data.issueType) state.data.issueType = 'no_internet';\n    gotoNeedsWiring('a_offline_cycle');\n  }\n}\n\n/* ---- ISSUE TYPE ---- */\nscreens.issue_type = () => ({\n  crumb: ['UISP Check', 'Identify Issue'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Step 3 \u00b7 Identify the Issue</h2>\n      <h1 class=\"screen-title\">What is the customer experiencing?</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"Can you describe what's happening \u2014 is the internet completely down, slow, cutting in and out, or only the WiFi giving trouble?\"</div>\n      </div>\n\n      <div class=\"callout info\">\n        <div class=\"callout-label\">Also ask before branching</div>\n        <div class=\"callout-body\">\n          <ul>\n            <li>When did the issue start?</li>\n            <li>Has anything changed at the home? (power outage, lightning, moved equipment, new device, construction)</li>\n            <li>Is the issue on all devices or just one?</li>\n            <li>Are they connected by WiFi or by a network cable?</li>\n          </ul>\n        </div>\n      </div>\n\n      <div class=\"options\">\n        <button class=\"opt danger-hint\" onclick=\"setIssue('no_internet')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No internet at all</div>\n            <div class=\"opt-desc\">Nothing loads \u2014 no browsing, streaming, or calls</div>\n          </div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setIssue('slow')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Slow internet</div>\n            <div class=\"opt-desc\">Internet works but feels slow / buffering / laggy</div>\n          </div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setIssue('intermittent')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Intermittent \u2014 drops out</div>\n            <div class=\"opt-desc\">Connection cuts in and out</div>\n          </div>\n        </button>\n        <button class=\"opt\" onclick=\"setIssue('wifi_only')\">\n          <span class=\"opt-marker\">D</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">WiFi-specific issue</div>\n            <div class=\"opt-desc\">Wired works, just trouble with the WiFi side</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction setIssue(v) {\n  state.data.issueType = v;\n  if (v === 'no_internet') gotoNeedsWiring('a_indoor_leds');\n  else if (v === 'slow') goTo('b_clear_line');\n  else if (v === 'intermittent') goTo('c_pattern');\n  else goTo('d_subissue');\n}\n\n/* ============================================================\n   WIRING DETECTION (lazy \u2014 runs during walkthrough)\n   ============================================================ */\nfunction gotoNeedsWiring(next) {\n  if (isAircube() && !state.data.poePassthrough) {\n    state.data._afterWiring = next;\n    goTo('wiring_detection');\n  } else {\n    goTo(next);\n  }\n}\n\nscreens.wiring_detection = () => ({\n  crumb: ['Wiring detection'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Wiring detection</h2>\n      <h1 class=\"screen-title\">Quick check before we start.</h1>\n      <p class=\"screen-sub\">The CSR can't tell from the CRM whether this customer has standard or pass-through wiring \u2014 figure it out by asking the customer how the equipment is connected.</p>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Ask</div>\n        <div class=\"say-text\">\"Real quick \u2014 does the AirCube have its own power adapter plugged into the wall, or does it only have a network cable connecting it to the small black box?\"</div>\n      </div>\n\n      <div class=\"callout info\">\n        <div class=\"callout-label\">What you're looking for</div>\n        <div class=\"callout-body\">\n          <ul>\n            <li><strong>Standard wiring:</strong> Two separate power adapters in the wall \u2014 one for the AirCube, one for the small black PoE box${isFiber() ? '. The Loco also has its own 12V adapter.' : '.'}</li>\n            <li><strong>Pass-through wiring:</strong> Only one power adapter \u2014 the small black PoE box. The AirCube has no power adapter; it gets power through the network cable connecting it to the PoE box. ${isFiber() ? \"The Loco also has no power adapter \u2014 it gets power through its network cable to the AirCube.\" : \"The LiteBeam also gets power through this chain.\"}</li>\n          </ul>\n        </div>\n      </div>\n\n      <div class=\"options\">\n        <button class=\"opt\" onclick=\"setWiringDetected('standard')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Standard \u2014 AirCube has its own power adapter</div>\n            <div class=\"opt-desc\">${isFiber() ? \"Loco has its own 12V adapter, AirCube has its own adapter\" : \"PoE injector powers the LiteBeam, AirCube powered separately\"}</div>\n          </div>\n        </button>\n        <button class=\"opt\" onclick=\"setWiringDetected('passthrough')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Pass-through \u2014 AirCube has no power adapter</div>\n            <div class=\"opt-desc\">Single PoE injector powers the whole chain: PoE \u2192 AirCube \u2192 ${isFiber() ? \"Loco\" : \"LiteBeam\"}</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction setWiringDetected(w) {\n  state.data.poePassthrough = w;\n  const next = state.data._afterWiring || 'a_indoor_leds';\n  state.data._afterWiring = null;\n  goTo(next);\n}\n\n/* ============================================================\n   BRANCH A \u00b7 NO INTERNET\n   ============================================================ */\nscreens.a_indoor_leds = () => isFiber() ? a_indoor_leds_fiber() : a_indoor_leds_litebeam();\n\nfunction a_indoor_leds_litebeam() {\n  const pt = isPassthrough();\n  return {\n    crumb: ['No Internet', 'Indoor LED'],\n    html: `\n      <div class=\"card\">\n        <h2 class=\"section-h\">Branch A \u00b7 No Internet</h2>\n        <h1 class=\"screen-title\">Indoor equipment LED check.</h1>\n        <p class=\"screen-sub\">UISP shows the LiteBeam is healthy, so the problem is between the PoE injector and the customer device.</p>\n\n        ${pt ? `\n          <div class=\"callout fiber-info\">\n            <div class=\"callout-label\">Wiring on this account \u00b7 PoE Pass-through</div>\n            <div class=\"callout-body\">Wall \u2192 PoE injector \u2192 AirCube PoE-IN \u2192 AirCube WAN passes power out to the LiteBeam outside. One power chain \u2014 if the PoE is dead, both the AirCube and the LiteBeam are dead.</div>\n          </div>\n        ` : ''}\n\n        <div class=\"say\">\n          <div class=\"say-label\">Say</div>\n          <div class=\"say-text\">\"Can you go to where your AirCube and the small black power box are located? I'd like you to read me the light on the power box.\"</div>\n        </div>\n\n        <div class=\"led-display\">\n          <strong>PoE injector</strong> (small black box)<br>\n          One LED \u2192 expect <strong>solid white</strong>${pt ? ' (powered, sending power up to the AirCube and through to the LiteBeam)' : ' (powered, sending power up to the LiteBeam)'}\n        </div>\n\n        <div class=\"question\">PoE injector \u2014 is the white LED lit?</div>\n        <div class=\"options\">\n          <button class=\"opt success-hint\" onclick=\"setLed('ledPower','on','a_router_leds')\">\n            <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 solid white</div></div>\n          </button>\n          <button class=\"opt danger-hint\" onclick=\"setLed('ledPower','off','a_poe_unplugged')\">\n            <span class=\"opt-marker\">B</span>\n            <div class=\"opt-body\">\n              <div class=\"opt-title\">Off</div>\n              <div class=\"opt-desc\">${pt ? 'No power \u2014 the AirCube and LiteBeam are both dead. Check wall outlet, surge protector, adapter.' : 'No power \u2014 check wall outlet, surge protector, adapter'}</div>\n            </div>\n          </button>\n        </div>\n        ${footerNav()}\n      </div>\n    `\n  };\n}\n\nfunction a_indoor_leds_fiber() {\n  const pt = isPassthrough();\n  return {\n    crumb: ['No Internet', 'Loco LEDs'],\n    html: `\n      <div class=\"card\">\n        <h2 class=\"section-h fiber\">Branch A \u00b7 No Internet</h2>\n        <h1 class=\"screen-title\">UFiber Loco LED check.</h1>\n        <p class=\"screen-sub\">UISP shows the Loco is healthy, so the problem is between the Loco and the customer device. Have the customer look at the Loco.</p>\n\n        ${pt ? `\n          <div class=\"callout fiber-info\">\n            <div class=\"callout-label\">Wiring on this account \u00b7 PoE Pass-through</div>\n            <div class=\"callout-body\">Wall \u2192 PoE injector \u2192 AirCube PoE-IN \u2192 AirCube WAN passes power out to the UFiber Loco. The Loco gets its power from the AirCube \u2014 there is no separate Loco power adapter. If the PoE is dead, both the AirCube and the Loco are dead.</div>\n          </div>\n        ` : ''}\n\n        <div class=\"say\">\n          <div class=\"say-label\">Say</div>\n          <div class=\"say-text\">\"Can you go to where your fiber box is \u2014 the small white box with the fiber cable plugged into it \u2014 and read me the lights on the front?\"</div>\n        </div>\n\n        <div class=\"led-display\">\n          <strong>UFiber Loco</strong> (the white fiber ONT)<br>\n          PWR \u2192 expect <span class=\"green\">solid blue</span>${pt ? ' (powered through the AirCube)' : ' (powered)'}<br>\n          PON \u2192 expect <span class=\"green\">solid blue</span> (registered with our network)<br>\n          LOS \u2192 expect <span class=\"off\">OFF</span> &nbsp; <span class=\"red\">RED = no fiber light \u2192 escalate</span><br>\n          LAN \u2192 expect <span class=\"green\">solid or blinking</span> (Ethernet to ${routerLabel()})\n        </div>\n\n        <div class=\"question\">UFiber Loco \u2014 PWR LED?</div>\n        <div class=\"options\">\n          <button class=\"opt success-hint\" onclick=\"setLed('ledPower','on','a_loco_los')\">\n            <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Solid blue / lit</div></div>\n          </button>\n          <button class=\"opt danger-hint\" onclick=\"setLed('ledPower','off','a_poe_unplugged')\">\n            <span class=\"opt-marker\">B</span>\n            <div class=\"opt-body\">\n              <div class=\"opt-title\">Off</div>\n              <div class=\"opt-desc\">${pt\n                ? 'No power reaching the Loco \u2014 could be the PoE injector, the AirCube, or the cable from AirCube to Loco. Check the PoE white LED next.'\n                : 'No power \u2014 check wall outlet, power adapter'}</div>\n            </div>\n          </button>\n        </div>\n        ${footerNav()}\n      </div>\n    `\n  };\n}\n\nfunction setLed(field, val, next) {\n  state.data[field] = val;\n  goTo(next);\n}\n\nscreens.a_poe_unplugged = () => {\n  const pt = isPassthrough();\n  let title, leadIn, recoveredQ, recoveredNext;\n  if (isFiber() && pt) {\n    title = 'Loco has no power \u00b7 pass-through chain';\n    leadIn = \"The fiber box isn't getting power. In your setup, the Loco gets its power from the AirCube \u2014 so this means either the PoE injector is dead, the AirCube isn't passing power through, or the cable between them is bad. Let's check.\";\n    recoveredQ = 'Did the Loco PWR light come back on?';\n    recoveredNext = 'a_loco_los';\n  } else if (isFiber()) {\n    title = 'UFiber Loco has no power';\n    leadIn = \"The fiber box isn't getting any power. Let's check a few things.\";\n    recoveredQ = 'Did the PWR LED come back on?';\n    recoveredNext = 'a_loco_los';\n  } else {\n    title = pt ? 'Whole chain has no power' : 'PoE injector has no power';\n    leadIn = pt\n      ? \"The PoE box isn't getting power, which means the AirCube and the LiteBeam are both dead. Let's check the PoE first.\"\n      : \"The power box that runs the equipment outside isn't getting any power. Let's check a few things.\";\n    recoveredQ = 'Did the white LED come back on?';\n    recoveredNext = 'a_router_leds';\n  }\n  return {\n    crumb: ['No Internet', title],\n    html: `\n      <div class=\"card\">\n        <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 ${title}</h2>\n        <h1 class=\"screen-title\">Find the cause of the dead ${isFiber() ? 'Loco' : 'PoE'}.</h1>\n\n        ${pt ? `\n          <div class=\"callout warn\">\n            <div class=\"callout-label\">Pass-through wiring</div>\n            <div class=\"callout-body\">${isFiber()\n              ? 'In pass-through, the Loco does NOT have its own power adapter \u2014 it is powered by the AirCube via PoE. If only the Loco is off but the AirCube is fine, the issue is the cable between AirCube and Loco, or the AirCube\\'s PoE pass-through has been disabled.'\n              : 'No power on the PoE means the AirCube and LiteBeam are also dead. Once the PoE LED is back on, both will start booting.'}</div>\n          </div>\n        ` : ''}\n\n        <div class=\"say\">\n          <div class=\"say-label\">Say</div>\n          <div class=\"say-text\">\"${leadIn}\"</div>\n        </div>\n\n        <div class=\"callout warn\">\n          <div class=\"callout-label\">Walk the customer through</div>\n          <div class=\"callout-body\">\n            <ul>\n              ${pt ? `\n                <li>Find the small black PoE box (powers the AirCube). Is its white LED on?</li>\n                <li>If off: check that it's plugged in, try a different wall outlet, and check any surge protector or UPS.</li>\n                <li>If the PoE white LED is on but the ${isFiber() ? 'Loco' : 'LiteBeam'} is still dead: the issue is between the AirCube and the ${isFiber() ? 'Loco' : 'LiteBeam'} \u2014 usually the cable between them, or the AirCube has lost its PoE pass-through setting.</li>\n              ` : `\n                <li>Is it plugged into the wall? Is the wall outlet on?</li>\n                <li>Try a different wall outlet that you know works.</li>\n                <li>Is it on a surge protector or UPS that may have tripped? Reset or bypass it.</li>\n                <li>Has there been a recent power surge or lightning event?</li>\n                ${isFiber() ? '<li>Check the 12V power adapter. Is the small LED on the adapter lit?</li>' : '<li>Check the power adapter (24V brick). Is the small LED on the adapter lit?</li>'}\n              `}\n            </ul>\n          </div>\n        </div>\n\n        <div class=\"question\">${recoveredQ}</div>\n        <div class=\"options\">\n          <button class=\"opt success-hint\" onclick=\"goTo('${recoveredNext}')\">\n            <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 light is now on</div></div>\n          </button>\n          <button class=\"opt danger-hint\" onclick=\"goTo('end_escalate')\">\n            <span class=\"opt-marker\">B</span>\n            <div class=\"opt-body\">\n              <div class=\"opt-title\">No \u2014 still no power</div>\n              <div class=\"opt-desc\">${pt ? 'PoE pass-through chain has a fault \u2014 escalate' : 'Likely faulty power adapter or device \u2014 escalate'}</div>\n            </div>\n          </button>\n        </div>\n        ${footerNav()}\n      </div>\n    `\n  };\n};\n\n/* UFiber-only \u2014 LOS check */\nscreens.a_loco_los = () => ({\n  crumb: ['No Internet', 'LOS check'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h fiber\">Branch A \u00b7 Loss-of-Signal check</h2>\n      <h1 class=\"screen-title\">Check the LOS LED on the Loco.</h1>\n      <p class=\"screen-sub\">LOS = Loss of Signal. If it's red, no fiber light is reaching the Loco \u2014 this is always a physical-layer problem.</p>\n\n      <div class=\"led-display\">\n        LOS \u2192 expect <span class=\"off\">OFF</span><br>\n        <span class=\"red\">RED / lit = no fiber light reaching the Loco</span>\n      </div>\n\n      <div class=\"question\">UFiber Loco \u2014 LOS LED?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setLed('ledLos','off','a_loco_pon')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Off</div><div class=\"opt-desc\">Healthy \u2014 fiber light is being received</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"setLed('ledLos','on','a_los_red')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Red / lit</div>\n            <div class=\"opt-desc\">Fiber not delivering signal \u2014 possible cut cable, dirty connector, or unplugged fiber</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nscreens.a_los_red = () => ({\n  crumb: ['No Internet', 'LOS red'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h fiber\">Branch A \u00b7 LOS is red</h2>\n      <h1 class=\"screen-title\">Walk the customer through a quick fiber check.</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"There's a thin fiber cable going into the back of the white box. Can you check that it's plugged in firmly? Don't pull it out \u2014 just gently push it in until you hear a click.\"</div>\n      </div>\n\n      <div class=\"callout danger\">\n        <div class=\"callout-label\">Important \u2014 fiber safety</div>\n        <div class=\"callout-body\">\n          <ul>\n            <li><strong>Do not</strong> ask the customer to unplug and inspect the fiber connector \u2014 improper handling can damage it.</li>\n            <li><strong>Do not</strong> shine a light into the fiber, and warn the customer never to look into it.</li>\n            <li>If reseating doesn't fix it, <strong>escalate</strong>. A red LOS almost always means a technician visit (cut drop, broken connector, damaged splice, or rodent damage).</li>\n          </ul>\n        </div>\n      </div>\n\n      <div class=\"question\">Did the LOS LED turn off after a gentle reseat?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"goTo('a_loco_pon')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 LOS is now off</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"goTo('end_escalate')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No \u2014 LOS still red</div>\n            <div class=\"opt-desc\">Fiber-side fault \u2014 escalate to technician</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nscreens.a_loco_pon = () => ({\n  crumb: ['No Internet', 'PON check'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h fiber\">Branch A \u00b7 PON registration</h2>\n      <h1 class=\"screen-title\">Check the PON LED on the Loco.</h1>\n      <p class=\"screen-sub\">PON = registered with our OLT. Solid blue means the Loco has provisioned correctly.</p>\n\n      <div class=\"question\">UFiber Loco \u2014 PON LED?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setLed('ledData','on','a_router_leds')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Solid blue</div><div class=\"opt-desc\">Registered and healthy</div></div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setLed('ledData','blinking','a_pon_blinking')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Blinking</div><div class=\"opt-desc\">Trying to register \u2014 wait, then check UISP</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"setLed('ledData','off','end_escalate')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Off</div><div class=\"opt-desc\">Not registering despite signal \u2014 escalate</div></div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nscreens.a_pon_blinking = () => ({\n  crumb: ['No Internet', 'PON blinking'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h fiber\">Branch A \u00b7 PON still registering</h2>\n      <h1 class=\"screen-title\">Wait 60 seconds and recheck.</h1>\n      <p class=\"screen-sub\">A blinking PON means the Loco is still trying to register with our OLT. This usually settles within a minute.</p>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"The fiber box is connecting to our network. Give it about a minute and read me the PON light again.\"</div>\n      </div>\n\n      <div class=\"question\">After a minute \u2014 PON LED status now?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"goTo('a_router_leds')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Solid blue \u2014 registered</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"goTo('end_escalate')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Still blinking or now off</div>\n            <div class=\"opt-desc\">Provisioning issue \u2014 escalate</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\n/* LiteBeam-only \u2014 PoE Data */\nscreens.a_poe_data = () => ({\n  crumb: ['No Internet', 'PoE Data LED'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h\">Branch A \u00b7 PoE Data LED</h2>\n      <h1 class=\"screen-title\">Now check the Data / LAN LED on the PoE injector.</h1>\n\n      <div class=\"question\">PoE injector \u2014 Data / LAN LED?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setLed('ledData','on','a_router_leds')\">\n          <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Solid or blinking green</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"setLed('ledData','off','end_escalate')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Off</div>\n            <div class=\"opt-desc\">Ethernet path to LiteBeam is broken \u2014 likely cable damage. Escalate.</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nscreens.a_router_leds = () => ({\n  crumb: ['No Internet', `${routerLabel()} LEDs`],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 ${routerLabel()}</h2>\n      <h1 class=\"screen-title\">Check the ${routerLabel()} lights.</h1>\n      <p class=\"screen-sub\">${cpeLabel()} side is healthy. Now look at the ${routerLabel()}'s Internet / WAN LED.</p>\n\n      ${isAircube() ? `\n        <div class=\"callout fiber-info\">\n          <div class=\"callout-label\">AirCube \u2014 UISP option</div>\n          <div class=\"callout-body\">If the AirCube is also visible in UISP, you can confirm its status from your screen. If it shows offline in UISP, jump to the remote-reboot option below.</div>\n        </div>\n      ` : ''}\n\n      <div class=\"question\">${routerLabel()} \u2014 Internet / WAN LED?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setLed('ledRouterWan','on',${isAircube() ? \"'a_aircube_remote'\" : \"'a_power_cycle'\"})\">\n          <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Solid or blinking</div></div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setLed('ledRouterWan','off','a_cable_check')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Off or red</div>\n            <div class=\"opt-desc\">${routerLabel()} not seeing the connection from the ${cpeLabel()}</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nscreens.a_cable_check = () => {\n  const pt = isPassthrough();\n  let cableDesc;\n  if (isFiber()) {\n    cableDesc = `from the LAN port on the back of the fiber box into your ${routerLabel()}'s blue or yellow port labelled WAN or Internet`;\n  } else if (pt) {\n    cableDesc = `from the LAN port on the small black PoE box into the AirCube's PoE-IN port (sometimes labelled WAN). This single cable carries both data and power to the AirCube`;\n  } else {\n    cableDesc = `from the small black box \u2014 labelled LAN \u2014 into your ${routerLabel()}'s blue or yellow port labelled WAN or Internet`;\n  }\n  return {\n    crumb: ['No Internet', 'Reseat Cable'],\n    html: `\n      <div class=\"card\">\n        <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 Reseat Ethernet</h2>\n        <h1 class=\"screen-title\">Have the customer reseat the indoor Ethernet cable.</h1>\n\n        <div class=\"say\">\n          <div class=\"say-label\">Say</div>\n          <div class=\"say-text\">\"There's an Ethernet cable going ${cableDesc}. Can you unplug it from both ends, then plug it back in firmly until you hear a click?\"</div>\n        </div>\n\n        ${pt ? `\n          <div class=\"callout warn\">\n            <div class=\"callout-label\">Pass-through note</div>\n            <div class=\"callout-body\">If the customer says the AirCube turned off when they unplugged the cable, that's expected \u2014 the AirCube is powered through that cable. Plugging it back in restores power.</div>\n          </div>\n        ` : ''}\n\n        <div class=\"question\">After reseating, is the WAN LED on the ${routerLabel()} now lit?</div>\n        <div class=\"options\">\n          <button class=\"opt success-hint\" onclick=\"goTo('${isAircube() ? 'a_aircube_remote' : 'a_power_cycle'}')\">\n            <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 WAN LED is on</div></div>\n          </button>\n          <button class=\"opt danger-hint\" onclick=\"goTo('end_escalate')\">\n            <span class=\"opt-marker\">B</span>\n            <div class=\"opt-body\">\n              <div class=\"opt-title\">No \u2014 still no WAN LED</div>\n              <div class=\"opt-desc\">Possible faulty cable or router WAN port \u2014 escalate</div>\n            </div>\n          </button>\n        </div>\n        ${footerNav()}\n      </div>\n    `\n  };\n};\n\n/* AirCube-only remote reboot offer */\nscreens.a_aircube_remote = () => ({\n  crumb: ['No Internet', 'AirCube \u00b7 Remote reboot'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 AirCube remote action</h2>\n      <h1 class=\"screen-title\">Try a remote reboot of the AirCube before bothering the customer.</h1>\n      <p class=\"screen-sub\">The AirCube ISP is managed in UISP. From your screen, you can reboot it without the customer touching anything \u2014 saves call time.</p>\n\n      <div class=\"callout info\">\n        <div class=\"callout-label\">In UISP</div>\n        <div class=\"callout-body\">\n          Open the AirCube device \u2192 Actions \u2192 Restart. Wait ~90 seconds for it to come back online before testing.\n        </div>\n      </div>\n\n      <div class=\"question\">After the remote reboot \u2014 does the customer have internet now?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setRemoteAction('aircube_reboot_fixed')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 internet is back</div></div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setRemoteAction('aircube_reboot_no_change')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No change \u2014 try a customer-side power cycle next</div>\n          </div>\n        </button>\n        <button class=\"opt\" onclick=\"setRemoteAction('aircube_offline_in_uisp')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">AirCube shows offline in UISP \u2014 can't reboot remotely</div>\n            <div class=\"opt-desc\">Move to customer-side power cycle</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction setRemoteAction(v) {\n  state.data.aircubeRemoteAction = v;\n  if (v === 'aircube_reboot_fixed') goTo('end_resolved');\n  else gotoNeedsWiring('a_power_cycle');\n}\n\n/* Power cycle screens */\nscreens.a_power_cycle       = () => powerCycleScreen('Branch A \u00b7 Power Cycle', 'a_after_cycle');\nscreens.a_offline_cycle     = () => powerCycleScreen('Branch A \u00b7 UISP Offline \u00b7 Power Cycle', 'a_offline_after');\nscreens.b_low_action        = () => powerCycleScreen('Branch B \u00b7 Low Speed \u00b7 Power Cycle', 'b_after_retest');\nscreens.c_power_cycle       = () => powerCycleScreen('Branch C \u00b7 Intermittent \u00b7 Power Cycle', 'c_after_cycle');\n\nfunction powerCycleScreen(label, nextScreen) {\n  const pt = isPassthrough();\n  const cpeBox = isFiber() ? 'UFiber Loco (the white fiber box)' : 'PoE injector (the small black box)';\n  let stepsHtml;\n  if (pt) {\n    const recoverText = isFiber()\n      ? 'The Loco needs to register with our OLT (PON light should go solid blue) and the AirCube needs to finish booting.'\n      : 'The LiteBeam needs to lock onto our tower and the AirCube needs to finish booting.';\n    stepsHtml = `\n      <div class=\"callout fiber-info\">\n        <div class=\"callout-label\">Pass-through wiring \u00b7 single power chain</div>\n        <div class=\"callout-body\">There's only one power source for everything \u2014 the PoE injector. Unplugging it kills the AirCube and the ${isFiber() ? 'Loco' : 'LiteBeam'} at the same time.</div>\n      </div>\n      <ol class=\"steps-list\">\n        <li>Unplug the PoE injector (the small black box) from the wall. The AirCube and ${isFiber() ? 'Loco' : 'LiteBeam'} will both lose power \u2014 that is expected.</li>\n        <li>Wait 60 full seconds. (Count it out with the customer.)</li>\n        <li>Plug the PoE injector back in.</li>\n        <li>Wait 3 minutes. ${recoverText}</li>\n        <li>Test internet on a phone or laptop.</li>\n      </ol>\n    `;\n  } else {\n    stepsHtml = `\n      <ol class=\"steps-list\">\n        <li>Unplug the ${cpeBox} from the wall.</li>\n        <li>Unplug the ${routerLabel()} from the wall.</li>\n        <li>Wait 60 full seconds. (Count it out with the customer.)</li>\n        <li>Plug the ${cpeBox} back in. Wait 2 minutes for ${isFiber() ? 'the PON light to go solid blue' : 'the LiteBeam to reconnect to our tower'}.</li>\n        <li>Plug the ${routerLabel()} back in. Wait another 2 minutes.</li>\n        <li>Test internet on a phone or laptop.</li>\n      </ol>\n    `;\n  }\n  return {\n    crumb: [label],\n    html: `\n      <div class=\"card\">\n        <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">${label}</h2>\n        <h1 class=\"screen-title\">Walk the customer through a power cycle.</h1>\n        <p class=\"screen-sub\">${pt ? 'Single-chain wiring \u2014 only one thing to unplug.' : `Order matters \u2014 the ${cpeLabel()} needs to ${isFiber() ? 'reconnect to our OLT' : 'lock onto our tower'} before the ${routerLabel()} tries to connect.`}</p>\n\n        <div class=\"say\">\n          <div class=\"say-label\">Say</div>\n          <div class=\"say-text\">${pt ? '\"I\\'m going to ask you to unplug the small black power box from the wall. That will turn everything off \u2014 that\\'s normal.\"' : '\"I\\'m going to ask you to unplug two things in order. Please don\\'t skip a step.\"'}</div>\n        </div>\n\n        ${stepsHtml}\n\n        <button class=\"primary-btn\" onclick=\"completePowerCycle('${nextScreen}')\">Power cycle complete \u2192</button>\n        ${footerNav()}\n      </div>\n    `\n  };\n}\n\nfunction completePowerCycle(next) {\n  state.data.powerCycleAttempted = true;\n  goTo(next);\n}\n\nscreens.a_after_cycle = () => ({\n  crumb: ['No Internet', 'After Power Cycle'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 After Power Cycle</h2>\n      <h1 class=\"screen-title\">Did internet come back?</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Ask</div>\n        <div class=\"say-text\">\"Try opening a website on a phone or laptop. Let me know if it loads.\"</div>\n      </div>\n\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"afterCycle('restored')\">\n          <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 internet is back</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"afterCycle('unchanged')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No \u2014 still no internet</div>\n            <div class=\"opt-desc\">Try a wired test next</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction afterCycle(v) {\n  state.data.powerCycleResult = v;\n  if (v === 'restored') goTo('end_resolved');\n  else goTo('a_wired_test');\n}\n\nscreens.a_offline_after = () => ({\n  crumb: ['UISP Offline', 'After Power Cycle'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 UISP Recheck</h2>\n      <h1 class=\"screen-title\">Refresh UISP. Is the ${cpeLabel()} back online?</h1>\n      <p class=\"screen-sub\">Wait until ${isFiber() ? 'the Loco' : 'the PoE'} has been on for 2+ minutes before judging.</p>\n\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"afterOfflineCycle('restored')\">\n          <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 back online in UISP</div></div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"afterOfflineCycle('still_offline')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No \u2014 still offline</div>\n            <div class=\"opt-desc\">${cpeLabel()} not recovering \u2014 needs a technician</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction afterOfflineCycle(v) {\n  if (v === 'restored') {\n    state.data.powerCycleResult = 'restored';\n    goTo('a_offline_recovered');\n  } else {\n    goTo('end_escalate');\n  }\n}\n\nscreens.a_offline_recovered = () => ({\n  crumb: ['UISP Offline', 'Customer check'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 ${cpeLabel()} back online</h2>\n      <h1 class=\"screen-title\">Confirm the customer also has internet now.</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"The connection has come back from our side. Please open a website on your phone or laptop \u2014 does it load?\"</div>\n      </div>\n\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"afterCustomerRecheck('yes')\">\n          <span class=\"opt-marker\">A</span><div class=\"opt-body\"><div class=\"opt-title\">Yes \u2014 customer has internet again</div></div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"afterCustomerRecheck('no')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No \u2014 UISP is up but customer still has nothing</div>\n            <div class=\"opt-desc\">Issue is between the ${cpeLabel()} and the customer's device</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction afterCustomerRecheck(v) {\n  if (v === 'yes') goTo('end_resolved');\n  else goTo('a_indoor_leds');\n}\n\nscreens.a_wired_test = () => ({\n  crumb: ['No Internet', 'Wired Test'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch A \u00b7 Isolate the ${routerLabel()}</h2>\n      <h1 class=\"screen-title\">Wired test \u2014 bypass the ${routerLabel()}.</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"Do you have a laptop or computer with a network port? I'd like us to plug it directly into the ${isFiber() ? 'LAN port on the back of the fiber box' : 'LAN port of the small black box'} and try the internet that way.\"</div>\n      </div>\n\n      <div class=\"callout info\">\n        <div class=\"callout-label\">Steps</div>\n        <div class=\"callout-body\">\n          <ul>\n            <li>Disconnect the cable currently going from ${isFiber() ? 'the Loco LAN port' : 'the PoE LAN port'} to the ${routerLabel()}.</li>\n            <li>Connect that cable directly to a laptop's network port.</li>\n            <li>Open a website to test.</li>\n          </ul>\n        </div>\n      </div>\n\n      <div class=\"question\">Result?</div>\n      <div class=\"options\">\n        <button class=\"opt success-hint\" onclick=\"setWired('works')\">\n          <span class=\"opt-marker\">A</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Wired works \u2014 ${routerLabel()} is the issue</div>\n            <div class=\"opt-desc\">Move to WiFi-side troubleshooting</div>\n          </div>\n        </button>\n        <button class=\"opt danger-hint\" onclick=\"setWired('fails')\">\n          <span class=\"opt-marker\">B</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">Wired fails \u2014 no internet either way</div>\n            <div class=\"opt-desc\">${cpeLabel()}, indoor cable, or upstream fault \u2014 escalate</div>\n          </div>\n        </button>\n        <button class=\"opt warn-hint\" onclick=\"setWired('unavailable')\">\n          <span class=\"opt-marker\">C</span>\n          <div class=\"opt-body\">\n            <div class=\"opt-title\">No wired device available</div>\n            <div class=\"opt-desc\">Cannot isolate further \u2014 escalate</div>\n          </div>\n        </button>\n      </div>\n      ${footerNav()}\n    </div>\n  `\n});\n\nfunction setWired(v) {\n  state.data.wiredTestResult = v;\n  if (v === 'works') goTo('d_subissue');\n  else goTo('end_escalate');\n}\n\n/* ============================================================\n   BRANCH B \u00b7 SLOW\n   ============================================================ */\nscreens.b_clear_line = () => {\n  const sp = planSpeed();\n  return {\n    crumb: ['Slow', 'Clear the line'],\n    html: `\n      <div class=\"card\">\n        <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch B \u00b7 Slow Internet</h2>\n        <h1 class=\"screen-title\">Clear the line before testing.</h1>\n        <p class=\"screen-sub\">We'll run the speed test three times. A single test can be skewed by server selection or brief congestion \u2014 three readings give a reliable picture.</p>\n\n        <div class=\"say\">\n          <div class=\"say-label\">Say</div>\n          <div class=\"say-text\">\"Your plan is the ${planLabel()} package. That speed is shared across every device using your WiFi at the same time, so let me first check what's running.\"</div>\n        </div>\n        <div class=\"say\">\n          <div class=\"say-label\">Then</div>\n          <div class=\"say-text\">\"Before we run the tests, I need everyone in the house to stop using the internet for about three or four minutes \u2014 pause any TV streaming, end any video calls or downloads, and have other people come off the WiFi. We're going to run the speed test three times to get an accurate reading.\"</div>\n        </div>\n\n        <div class=\"checklist\">\n          <h3>Confirm with the customer:</h3>\n          <label class=\"check-item\"><input type=\"checkbox\" /><span>All TV streaming paused (Netflix, YouTube, Disney+, etc.)</span></label>\n          <label class=\"check-item\"><input type=\"checkbox\" /><span>Active video calls and downloads ended</span></label>\n          <label class=\"check-item\"><input type=\"checkbox\" /><span>Other people in the household off the WiFi</span></label>\n          <label class=\"check-item\"><input type=\"checkbox\" /><span>Test device plugged in by network cable (preferred) \u2014 or move close to the ${routerLabel()}</span></label>\n        </div>\n\n        ${sp ? `<div class=\"callout info\"><div class=\"callout-label\">Plan thresholds for this customer (based on average of 3 tests)</div><div class=\"callout-body\">Plan: <strong>${planLabel()}</strong> \u00b7 Healthy avg \u2265 <strong>${(sp * 0.8).toFixed(1)} Mbps</strong> \u00b7 Low avg &lt; <strong>${(sp * 0.5).toFixed(1)} Mbps</strong></div></div>` : ''}\n\n        <button class=\"primary-btn\" onclick=\"goTo('b_speed_test')\">Line is clear \u00b7 Run speed tests \u2192</button>\n        ${footerNav()}\n      </div>\n    `\n  };\n};\n\nscreens.b_speed_test = () => ({\n  crumb: ['Slow', 'Speed Tests'],\n  html: `\n    <div class=\"card\">\n      <h2 class=\"section-h ${isFiber() ? 'fiber' : ''}\">Branch B \u00b7 Speed Tests</h2>\n      <h1 class=\"screen-title\">Run three tests on speedtest.net.</h1>\n\n      <div class=\"say\">\n        <div class=\"say-label\">Say</div>\n        <div class=\"say-text\">\"Please open a web browser, go to speedtest.net, and press GO. When it finishes, read me the ping, download, and upload numbers \u2014 they're all on the screen. Then press GO again \u2014 we're going to do this three times for an accurate reading.\"</div>\n      </div>\n\n      <div class=\"callout fiber-info\" style=\"margin-bottom:14px\">\n        <div class=\"callout-label\">Two sets of readings per test</div>\n        <div class=\"callout-body\">While the customer runs speedtest.net, open the device in UISP and watch the <strong>throughput graph</strong>. Log what UISP shows at the same time the customer reads you their numbers.</div>\n      </div>\n\n      <div class=\"test-row-label\">Test 1</div>\n      <div class=\"test-fields\">\n        <div class=\"field\"><label>Customer download (Mbps)</label><input id=\"s1d\" value=\"${state.data.speedTestsDown[0]}\" placeholder=\"e.g. 18.5\" type=\"number\" step=\"0.1\" oninput=\"updateSpeedAverages('s')\" /></div>\n        <div class=\"field\"><label>Customer upload (Mbps)</label><input id=\"s1u\" value=\"${state.data.speedTestsUp[0]}\" placeholder=\"e.g. 4.2\" type=\"number\" step=\"0.1\" oninput=\"updateSpeedAverages('s')\" /></div>\n        <div class=\"field\"><label>Ping (ms)</label><input id=\"s1p\" value=\"${state.data.speedTestsPing[0]}\" placeholder=\"e.g. 24\" type=\"number\" step=\"1\" oninput=\"updateSpeedAverages('s')\" /></div>\n      </div>\n      <div class=\"obs-fields\">\n        <div class=\"field\"><label>\ud83d\udda5 UISP observed Rx / download (Mbps)</label><input id=\"s1od\" value=\"${state.data.obsDown[0]}\" placeholder=\"e.g. 19.2\" type=\"number\" step=\"0.1\" /></div>\n        <div class=\"field\"><label>\ud83d\udda5 UISP observed Tx / upload (Mbps)</label><input
