function eInventory(){return aInventory();}
// ── INVENTORY ─────────────────────────────────────────────────────────────────
let _invFilter='all',_invSearch='';

async function loadInventory(){
  const{data}=await sb.from('inventory').select('*').is('deleted_at',null).order('created_at',{ascending:false});
  C.inventory=data||[];
}

function aInventory(){
  if(!C.inventory){loadInventory().then(()=>render());return'<div class="loading-page"><div class="spinner"></div><div class="muted">Loading inventory...</div></div>';}
  const inv=C.inventory||[];
  const filtered=inv.filter(i=>{
    const mf=_invFilter==='all'||i.status===_invFilter||i.item_type===_invFilter;
    const ms=!_invSearch||[i.model,i.brand,i.serial_number,i.client_name,i.assigned_to,i.location].some(v=>v&&v.toLowerCase().includes(_invSearch.toLowerCase()));
    return mf&&ms;
  });
  const total=inv.length,inStock=inv.filter(i=>i.status==='in_stock').length,deployed=inv.filter(i=>i.status==='deployed').length,faulty=inv.filter(i=>i.condition==='faulty').length;

  // If a group is expanded, show individual serial rows for that group
  const expandedKey = S.invExpanded || null;

  // Group by item_type + brand + model
  const groups = {};
  for (const i of filtered) {
    const k = (i.item_type||'') + '||' + (i.brand||'') + '||' + (i.model||'');
    if (!groups[k]) groups[k] = { item_type: i.item_type, brand: i.brand, model: i.model, items: [] };
    groups[k].items.push(i);
  }

  const groupRows = Object.entries(groups).map(([k, g]) => {
    const qty       = g.items.length;
    const inStockN  = g.items.filter(i=>i.status==='in_stock').length;
    const deployedN = g.items.filter(i=>i.status==='deployed').length;
    const faultyN   = g.items.filter(i=>i.condition==='faulty').length;
    const isOpen    = expandedKey === k;
    const threshold = g.items.find(i=>i.low_stock_threshold!=null)?.low_stock_threshold??null;
    const isLow     = threshold!==null && inStockN<=threshold;

    const isHardware = g.item_type === 'hardware' || g.item_type === 'cable' || g.item_type === 'tools';
    const groupRow = `<tr style="${!isHardware?'cursor:pointer;':''}${isOpen?'background:var(--accent-light)':isLow?'background:#fef2f2':''}" ${isHardware?'':`onclick="S.invExpanded=${isOpen?'null':`'${k.replace(/'/g,"\\'")}'`};render()"`}>
      <td><span class="badge" style="background:${isHardware?'#7c3aed22':'var(--surface2)'};color:${isHardware?'#a78bfa':'var(--text)'};font-size:11px">${g.item_type||'—'}</span></td>
      <td style="font-weight:700">${g.brand||''}${g.model?' '+g.model:''}${isLow?' <span style="color:#ef4444;font-size:11px">⚠ Low stock</span>':''}</td>
      <td style="font-size:13px;font-weight:700;color:${isLow?'#ef4444':'var(--accent)'}">${qty} unit${qty!==1?'s':''}${threshold!==null?` <span style="font-size:11px;font-weight:400;color:var(--muted)">(min ${threshold})</span>`:''}</td>
      <td><div class="row" style="gap:6px">
        ${inStockN?`<span class="badge bfin" style="font-size:11px">${inStockN} in stock</span>`:''}
        ${deployedN?`<span class="badge bt" style="font-size:11px">${deployedN} deployed</span>`:''}
        ${faultyN?`<span class="badge" style="background:#fee2e2;color:#991b1b;font-size:11px">${faultyN} faulty</span>`:''}
      </div></td>
      <td><div class="row" style="gap:4px">
        ${isHardware?`<button class="btn bsm" onclick="event.stopPropagation();invEdit('${g.items[0]?.id||''}')">Edit</button>`:''}
        <button class="btn bsm" style="font-size:11px" onclick="event.stopPropagation();invSetThreshold('${k}','${g.items[0]?.id||''}',${threshold??'null'})">${threshold!==null?'Edit min':'Set min'}</button>
      </div></td>
      <td style="text-align:right;color:var(--muted);font-size:18px;padding-right:12px">${isHardware?'':isOpen?'▲':'▼'}</td>
    </tr>`;

    const detailRows = (!isHardware && isOpen) ? g.items.map(i=>`<tr style="background:var(--surface2)">
      <td style="padding-left:24px;font-size:12px;color:var(--muted)">#${i.id.slice(0,6)}</td>
      <td style="font-family:monospace;font-size:12px">${i.serial_number||'—'}</td>
      <td><span class="badge ${i.status==='in_stock'?'bfin':i.status==='deployed'?'bt':'blun'}" style="font-size:11px">${i.status.replace('_',' ')}</span></td>
      <td><span class="badge" style="background:${i.condition==='faulty'?'#fee2e2':i.condition==='new'?'#d1fae5':'var(--surface2)'};color:${i.condition==='faulty'?'#991b1b':i.condition==='new'?'#065f46':'var(--muted)'};font-size:11px">${i.condition}</span></td>
      <td style="font-size:13px">${i.client_name||i.assigned_to||'—'}</td>
      <td style="font-size:13px">${i.location||'—'}</td>
      <td><div class="row" style="gap:4px">
        <button class="btn bsm" onclick="event.stopPropagation();invEdit('${i.id}')">Edit</button>
        <button class="btn bsm" style="color:#ef4444;border-color:#fca5a5" onclick="event.stopPropagation();invDel('${i.id}')">Del</button>
      </div></td>
    </tr>`).join('') : '';

    return groupRow + detailRows;
  }).join('');

  return `<div class="btw" style="margin-bottom:16px">
    <div><div class="ph">Inventory</div><div class="ps">CPE &middot; Routers &middot; Equipment tracking</div></div>
    <button class="btn bb" onclick="invNew()">+ Add Item</button>
  </div>
  <div class="g4" style="margin-bottom:16px">
    <div class="sc"><div style="font-size:22px;font-weight:800">${total}</div><div class="muted" style="font-size:12px;margin-top:4px">Total items</div></div>
    <div class="sc"><div style="font-size:22px;font-weight:800;color:var(--ok-text)">${inStock}</div><div class="muted" style="font-size:12px;margin-top:4px">In stock</div></div>
    <div class="sc"><div style="font-size:22px;font-weight:800;color:var(--accent)">${deployed}</div><div class="muted" style="font-size:12px;margin-top:4px">Deployed</div></div>
    <div class="sc"><div style="font-size:22px;font-weight:800;color:#ef4444">${faulty}</div><div class="muted" style="font-size:12px;margin-top:4px">Faulty</div></div>
  </div>
  <div class="card" style="margin-bottom:14px;padding:12px 16px">
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <input type="text" placeholder="Search model, serial, client..." value="${_invSearch}" oninput="_invSearch=this.value;S.invExpanded=null;render()" style="flex:1;min-width:180px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:13px;outline:none">
      <div class="row" style="gap:6px;flex-wrap:wrap">
        ${['all','in_stock','deployed','assigned','faulty'].map(f=>`<button class="btn bsm${_invFilter===f?' bb':''}" onclick="_invFilter='${f}';S.invExpanded=null;render()">${f.replace('_',' ')}</button>`).join('')}
      </div>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    ${Object.keys(groups).length?`<div class="twrap"><table class="tbl">
      <thead><tr><th>Type</th><th>Brand / Model</th><th>Quantity</th><th>Status breakdown</th><th colspan="2"></th></tr></thead>
      <tbody>${groupRows}</tbody>
    </table></div>`:'<div class="emp">No items match your filter.</div>'}
  </div>
  ${S.md&&S.md.type==='inv_form'?invForm(S.md.item):''}`;
}

function invForm(item){
  item=item||{};
  return `<div class="modal-bg" onclick="if(event.target===this){S.md=null;render()}">
  <div class="modal" style="max-width:520px">
    <div class="modal-h">${!item.id?'Add inventory item':'Edit inventory item'}</div>
    <div class="fg"><label>Item type</label>
      <select id="invType">${['router','ont','modem','switch','radio','cable','splitter','hardware','tools','other'].map(t=>`<option value="${t}"${(item.item_type||'router')===t?' selected':''}>${t}</option>`).join('')}</select></div>
    <div class="g2">
      <div class="fg"><label>Brand</label><input id="invBrand" value="${item.brand||''}" placeholder="e.g. Ubiquiti"></div>
      <div class="fg"><label>Model</label><input id="invModel" value="${item.model||''}" placeholder="e.g. LiteBeam 5AC"></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Serial number</label><input id="invSerial" value="${item.serial_number||''}" placeholder="Serial number"></div>
      <div class="fg"><label>MAC address</label><input id="invMac" value="${item.mac_address||''}" placeholder="Optional"></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Condition</label>
        <select id="invCond">${['new','good','fair','poor','faulty'].map(c=>`<option value="${c}"${(item.condition||'good')===c?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="fg"><label>Status</label>
        <select id="invStatus">${['in_stock','assigned','deployed','returned','written_off'].map(s=>`<option value="${s}"${(item.status||'in_stock')===s?' selected':''}>${s.replace('_',' ')}</option>`).join('')}</select></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Assigned technician</label><input id="invTech" value="${item.assigned_to||''}" placeholder="Technician name"></div>
      <div class="fg"><label>Client name</label><input id="invClient" value="${item.client_name||''}" placeholder="Customer name"></div>
    </div>
    <div class="fg"><label>Location / Site</label><input id="invLoc" value="${item.location||''}" placeholder="e.g. Debbie HUB"></div>
    <div class="fg"><label>Notes</label><input id="invNotes" value="${item.notes||''}" placeholder="Optional notes"></div>
    <div class="modal-f">
      <button class="btn" onclick="S.md=null;render()">Cancel</button>
      <button class="btn bb" onclick="invSave('${item.id||''}')">Save</button>
    </div>
  </div></div>`;
}

function invNew(){S.md={type:'inv_form',item:{}};render();}
function invEdit(id){S.md={type:'inv_form',item:C.inventory.find(i=>i.id===id)||{}};render();}

async function invSetThreshold(groupKey, sampleId, currentVal) {
  const cur = (currentVal === null || currentVal === 'null' || currentVal === undefined) ? '' : String(currentVal);
  const val = prompt('Set minimum stock level for this group.\nLeave blank to remove the alert.\nCurrent: '+(cur===''?'not set':cur), cur);
  if (val === null) return;
  const num = val.trim() === '' ? null : parseInt(val.trim());
  if (val.trim() !== '' && (isNaN(num) || num < 0)) { notif('Please enter a valid number','err'); return; }
  const [type, brand, model] = groupKey.split('||');
  const groupItems = C.inventory.filter(i=>(i.item_type||'')===type && (i.brand||'')===brand && (i.model||'')===model);
  const ids = groupItems.map(i=>i.id);
  const{error}=await sb.from('inventory').update({low_stock_threshold:num}).in('id',ids);
  if(error){notif('Error: '+error.message,'err');return;}
  notif(num!==null?`Minimum stock set to ${num}`:'Minimum stock alert removed');
  await loadInventory();render();
}

// ── SHIFT SWAP REQUESTS ───────────────────────────────────────────────────────
async function submitSwapRequest() {
  const targetId  = document.getElementById('swapTarget')?.value;
  const shiftDate = document.getElementById('swapDate')?.value;
  const reason    = document.getElementById('swapReason')?.value?.trim();
  if (!targetId || !shiftDate) { notif('Please select a colleague and shift date','err'); return; }
  const myShift = C.shifts.find(s => s.employee_id===S.employee.id && s.shift_date===shiftDate && !s.cancelled);
  if (!myShift) { notif('You have no shift on that date','err'); return; }
  const { error } = await sb.from('shift_swap_requests').insert({
    requester_id: S.employee.id,
    target_id: targetId,
    shift_date: shiftDate,
    reason: reason || null,
    status: 'pending',
  });
  if (error) { notif('Error: '+error.message,'err'); return; }
  sysLog('auto_action','Shift swap requested',`${S.employee.name} requested shift swap with ${C.employees.find(e=>e.id===targetId)?.name||targetId} on ${shiftDate}`,'info');
  notif('Swap request sent');
  S.md = null;
  const { data } = await sb.from('shift_swap_requests').select('*').order('created_at',{ascending:false}).limit(50);
  C.swapRequests = data || [];
  render();
}

async function reviewSwap(id, status) {
  const note = status==='denied' ? (prompt('Reason for denial (optional):') || '') : '';
  const { error } = await sb.from('shift_swap_requests').update({
    status, reviewed_at: new Date().toISOString(), reviewed_by: S.employee.id, review_note: note||null
  }).eq('id', id);
  if (error) { notif('Error: '+error.message,'err'); return; }
  const req = C.swapRequests.find(r=>r.id===id);
  const rName = C.employees.find(e=>e.id===req?.requester_id)?.name||'?';
  const tName = C.employees.find(e=>e.id===req?.target_id)?.name||'?';
  sysLog('auto_action',`Shift swap ${status}`,`${S.employee.name} ${status} swap: ${rName} ↔ ${tName} on ${req?.shift_date}`,'info');
  notif(`Swap request ${status}`);
  const { data } = await sb.from('shift_swap_requests').select('*').order('created_at',{ascending:false}).limit(50);
  C.swapRequests = data || [];
  render();
}

async function doChangePw() {
  const cur  = document.getElementById('cpCur')?.value;
  const nw   = document.getElementById('cpNew')?.value;
  const conf = document.getElementById('cpConf')?.value;
  const err  = document.getElementById('cpErr');
  if (!cur||!nw||!conf) { if(err)err.textContent='All fields required.'; return; }
  if (nw.length < 6)    { if(err)err.textContent='New password must be at least 6 characters.'; return; }
  if (nw !== conf)      { if(err)err.textContent='Passwords do not match.'; return; }
  // Verify current password by re-signing in
  const { error: signErr } = await sb.auth.signInWithPassword({ email: S.employee.email||S.employee.username+'@netflair.co', password: cur });
  if (signErr) { if(err)err.textContent='Current password is incorrect.'; return; }
  const { error: updErr } = await sb.auth.updateUser({ password: nw });
  if (updErr) { if(err)err.textContent='Error: '+updErr.message; return; }
  sysLog('auto_action','Password changed',`${S.employee.name} changed their password`,'info');
  notif('Password updated successfully');
  S.md = null; render();
}

// CSV helpers
function buildPerfTechMap() {
  const map = {};
  (C.perfTechs||[]).forEach(t => {
    map[t.name.trim().toLowerCase()] = t.id;
    // also map with double-space variants just in case
    map[t.name.trim().toLowerCase().replace(/\s+/g,' ')] = t.id;
  });
  return map;
}
function perfInferType(title) {
  const t=title.toLowerCase();
  if(t.includes('fiber install')||t.includes('fiber installation'))return'FIBER_INSTALL';
  if(t.includes('wifi install')||t.includes('wi-fi install')||t.includes('installation')||t.includes('relocation'))return'WIFI_INSTALL';
  if(t.includes('fiber support'))return'FIBER_SUPPORT';
  if(t.includes('support'))return'WIFI_SUPPORT';
  if(t.includes('removal'))return'REMOVAL';
  if(t.includes('outage'))return'OUTAGE';
  return'WIFI_SUPPORT';
}
function perfParseCsv(text) {
  const lines=text.split(/[\r\n]+/).filter(Boolean); if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const idx=n=>hdrs.indexOf(n);
  return lines.slice(1).map(line=>{
    const cols=[]; let inQ=false,cur='';
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
    cols.push(cur.trim());
    const get=n=>(cols[idx(n)]||'').replace(/^"|"$/g,'').trim();
    const title=get('title'),dateRaw=get('date').slice(0,10),techRaw=get('assigned user'),client=get('client');
    const techMap=buildPerfTechMap(), tid=techMap[techRaw.trim().toLowerCase()]||techMap[techRaw.trim().toLowerCase().replace(/\s+/g,' ')];
    if(!tid)return{technician_id:0,technician_name:techRaw,date:dateRaw,job_type:'WIFI_SUPPORT',points:0,client_name:client,error:`Unknown tech: "${techRaw}"`};
    const job_type=perfInferType(title);
    return{technician_id:tid,technician_name:techRaw,date:dateRaw,job_type,points:PERF_POINTS[job_type],client_name:client};
  }).filter(r=>r.date&&/^\d{4}-\d{2}-\d{2}$/.test(r.date));
}
function perfCsvFile(input) {
  const file=input.files[0]; if(!file)return;
  _perfCsvFile=file.name; _perfCsvResult=null;
  const reader=new FileReader();
  reader.onload=e=>{_perfCsvRows=perfParseCsv(e.target.result);render();};
  reader.readAsText(file); input.value='';
}
async function perfCsvImport() {
  const valid=_perfCsvRows.filter(r=>!r.error); if(!valid.length)return;
  const btn=$('perfCsvBtn'); if(btn){btn.disabled=true;btn.textContent='Importing…';}
  _perfCsvResult=null;
  try {
    const existing=new Set(C.perfJobs.map(j=>`${j.technician_id}__${j.job_date}__${(j.client_name||'').toLowerCase()}`));
    const toInsert=valid.filter(r=>!existing.has(`${r.technician_id}__${r.date}__${r.client_name.toLowerCase()}`));
    if(!toInsert.length){_perfCsvResult='⚠ All jobs already exist — nothing imported.';render();return;}
    await perfRestInsert('jobs',toInsert.map(r=>({technician_id:r.technician_id,date:r.date,job_type:r.job_type,points:r.points,complaint_flag:false,client_name:r.client_name||null})));
    const skipped=valid.length-toInsert.length;
    _perfCsvResult=`✅ Imported ${toInsert.length} job${toInsert.length!==1?'s':''}${skipped>0?` (${skipped} skipped)`:''}.`;
    _perfCsvRows=[]; _perfCsvFile=''; await loadPerf(); render();
  } catch(e) { _perfCsvResult='❌ '+e.message; render(); }
}

let _rptFromDate = (() => { const d=new Date(new Date().toLocaleString('en-US',{timeZone:TZ})); d.setDate(d.getDate()-d.getDay()+1); return d.toISOString().split('T')[0]; })();
let _rptToDate   = TODAY;

function aReports() {
  const from = _rptFromDate, to = _rptToDate;

  // ── Flagged clocks in range ──
  const flagged = C.logs.filter(l => l.flagged && l.log_date >= from && l.log_date <= to)
    .sort((a,b) => b.log_date.localeCompare(a.log_date) || a.clock_in.localeCompare(b.clock_in));

  const flagRows = flagged.map(l => {
    const emp = ge(l.employee_id);
    return `<tr style="background:var(--err-bg)">
      <td>${l.log_date}</td>
      <td><div class="row"><div class="av ${avc(emp?.role||'technician')}" style="width:22px;height:22px;font-size:9px">${ini(emp?.name||'?')}</div><span style="font-weight:600">${emp?.name||l.employee_id}</span></div></td>
      <td><span class="badge ${l.log_type==='lunch'?'blun':'bt'}">${l.log_type==='lunch'?'Lunch':'Work'}</span></td>
      <td>${fmtTime(l.clock_in)}</td>
      <td>${l.clock_out?fmtTime(l.clock_out):'<span class="muted">Active</span>'}</td>
      <td>${locCell(l)}</td>
    </tr>`;
  }).join('');

  // ── Late arrivals in range ──
  const lateRows = [];
  const lateSummary = {};
  C.logs.filter(l => l.log_type==='work' && l.log_date >= from && l.log_date <= to && l.clock_in).forEach(l => {
    const sh = C.shifts.find(s => s.employee_id===l.employee_id && s.shift_date===l.log_date);
    if (!sh) return;
    const [sh2,sm2] = sh.start_time.split(':').map(Number);
    const [ch,cm]   = l.clock_in.split(':').map(Number);
    const lateMin   = (ch*60+cm) - (sh2*60+sm2);
    if (lateMin <= 5) return; // within 5 min grace
    const emp = ge(l.employee_id);
    lateRows.push({ date:l.log_date, emp, lateMin, scheduled:fmtTime(sh.start_time), actual:fmtTime(l.clock_in) });
    if (!lateSummary[l.employee_id]) lateSummary[l.employee_id] = { emp, count:0, totalMin:0 };
    lateSummary[l.employee_id].count++;
    lateSummary[l.employee_id].totalMin += lateMin;
  });
  lateRows.sort((a,b) => b.date.localeCompare(a.date));

  const lateDetailRows = lateRows.map(r => `<tr>
    <td>${r.date}</td>
    <td><div class="row"><div class="av ${avc(r.emp?.role||'technician')}" style="width:22px;height:22px;font-size:9px">${ini(r.emp?.name||'?')}</div><span style="font-weight:600">${r.emp?.name||'?'}</span></div></td>
    <td>${r.scheduled}</td>
    <td>${r.actual}</td>
    <td style="color:var(--err-text);font-weight:700">+${r.lateMin}m</td>
  </tr>`).join('');

  const lateSummaryRows = Object.values(lateSummary).sort((a,b)=>b.count-a.count).map(s => `<tr>
    <td><div class="row"><div class="av ${avc(s.emp?.role||'technician')}" style="width:22px;height:22px;font-size:9px">${ini(s.emp?.name||'?')}</div><span style="font-weight:600">${s.emp?.name||'?'}</span></div></td>
    <td style="font-weight:700;color:var(--err-text)">${s.count}</td>
    <td>${Math.round(s.totalMin/s.count)}m avg</td>
    <td class="muted">${s.totalMin}m total</td>
  </tr>`).join('');

  return `<div class="ph">Reports</div><div class="ps">Flagged clocks & late arrivals</div>
    <div class="card" style="margin-bottom:16px">
      <div class="ctitle" style="margin-bottom:12px">Date range</div>
      <div class="row" style="gap:10px;flex-wrap:wrap">
        <div class="fg" style="flex:1;min-width:140px"><label>From</label><input type="date" id="rptFrom" value="${from}" onchange="_rptFromDate=this.value;render()"></div>
        <div class="fg" style="flex:1;min-width:140px"><label>To</label><input type="date" id="rptTo" value="${to}" onchange="_rptToDate=this.value;render()"></div>
        <div style="display:flex;align-items:flex-end;gap:8px">
          <button class="btn bsm" onclick="rptThisWeek()">This week</button>
          <button class="btn bsm" onclick="rptThisMonth()">This month</button>
          <button class="btn bsm bgn" onclick="exportFlaggedCSV()">⬇ Export flagged</button>
          <button class="btn bsm bgn" onclick="exportLateCSV()">⬇ Export late</button>
        </div>
      </div>
    </div>

    <div class="g2" style="margin-bottom:20px">
      <div class="sc" style="border-left:3px solid var(--err-bdr)"><div style="font-size:24px;font-weight:800;color:var(--err-text)">${flagged.length}</div><div class="muted" style="margin-top:4px">Flagged clock entries</div></div>
      <div class="sc" style="border-left:3px solid var(--warn-text)"><div style="font-size:24px;font-weight:800;color:var(--warn-text)">${lateRows.length}</div><div class="muted" style="margin-top:4px">Late arrivals</div></div>
    </div>

    <div style="margin-bottom:24px">
      <div class="ctitle" style="margin-bottom:10px">⚑ Flagged clocks <span style="font-weight:400;color:var(--muted)">(${flagged.length})</span></div>
      ${flagged.length ? `<div class="twrap"><table class="tbl"><thead><tr><th>Date</th><th>Employee</th><th>Type</th><th>In</th><th>Out</th><th>Location</th></tr></thead>
      <tbody>${flagRows}</tbody></table></div>` : '<p class="muted" style="font-size:13px">No flagged clocks in this range.</p>'}
    </div>

    <div class="g2">
      <div>
        <div class="ctitle" style="margin-bottom:10px">⏰ Late arrivals — summary <span style="font-weight:400;color:var(--muted)">(${Object.keys(lateSummary).length} employees)</span></div>
        ${lateSummaryRows ? `<div class="twrap"><table class="tbl"><thead><tr><th>Employee</th><th>Times late</th><th>Avg delay</th><th>Total delay</th></tr></thead>
        <tbody>${lateSummaryRows}</tbody></table></div>` : '<p class="muted" style="font-size:13px">No late arrivals in this range.</p>'}
      </div>
      <div>
        <div class="ctitle" style="margin-bottom:10px">⏰ Late arrivals — detail</div>
        ${lateDetailRows ? `<div class="twrap"><table class="tbl"><thead><tr><th>Date</th><th>Employee</th><th>Scheduled</th><th>Clocked in</th><th>Late by</th></tr></thead>
        <tbody>${lateDetailRows}</tbody></table></div>` : '<p class="muted" style="font-size:13px">No late arrivals in this range.</p>'}
      </div>
    </div>`;
}

  const d=new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
  _rptFromDate=mon.toISOString().split('T')[0]; _rptToDate=TODAY; render();
}
function rptThisMonth() {
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:TZ}));
  _rptFromDate=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-01'; _rptToDate=TODAY; render();
}

function exportFlaggedCSV() {
  const from=_rptFromDate, to=_rptToDate;
  const flagged=C.logs.filter(l=>l.flagged&&l.log_date>=from&&l.log_date<=to).sort((a,b)=>b.log_date.localeCompare(a.log_date));
  let csv='Date,Employee,Role,Type,Clock In,Clock Out,Lat,Lng\n';
  flagged.forEach(l=>{
    const emp=ge(l.employee_id);

  a.download='flagged_clocks_'+from+'_to_'+to+'.csv'; a.click();
  notif('Flagged clocks exported');
}

function exportLateCSV() {
  const from=_rptFromDate, to=_rptToDate;
  let csv='Date,Employee,Role,Scheduled,Clocked In,Late By (min)\n';
  C.logs.filter(l=>l.log_type==='work'&&l.log_date>=from&&l.log_date<=to&&l.clock_in).forEach(l=>{
    const sh=C.shifts.find(s=>s.employee_id===l.employee_id&&s.shift_date===l.log_date);
    if(!sh)return;
    const [sh2,sm2]=sh.start_time.split(':').map(Number), [ch,cm]=l.clock_in.split(':').map(Number);
    const lateMin=(ch*60+cm)-(sh2*60+sm2);
    if(lateMin<=5)return;
    const emp=ge(l.employee_id);
    csv+=`${l.log_date},"${emp?.name||l.employee_id}","${emp?.role||''}","${fmtTime(sh.start_time)}","${fmtTime(l.clock_in)}",${lateMin}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='late_arrivals_'+from+'_to_'+to+'.csv'; a.click();
  notif('Late arrivals exported');
}

function exportAttendanceCSV() {
  const mo=S.hrMonth, yr=CURRENT_YEAR;
  const prefix=yr+'-'+(mo+1<10?'0':'')+(mo+1);
  const staff=C.employees.filter(e=>e.role!=='admin'&&e.is_active!==false);
  const days=[];
  const dcount=new Date(yr,mo+1,0).getDate();
  for(let i=1;i<=dcount;i++) days.push(yr+'-'+(mo+1<10?'0':'')+(mo+1)+'-'+(i<10?'0':'')+i);
  const workDays=days.filter(d=>!isHol(d));
  let csv='Employee,Role,'+workDays.map(d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'})).join(',')+',Days Worked,Days Absent,Hours Logged,Scheduled Hours\n';
  staff.forEach(e=>{
    const schd=C.shifts.filter(s=>s.employee_id===e.id&&s.shift_date.startsWith(prefix));
    const logs=C.logs.filter(l=>l.employee_id===e.id&&l.log_date.startsWith(prefix)&&l.log_type==='work'&&l.clock_out);
    const workedDays=new Set(logs.map(l=>l.log_date));
    const schedDays=new Set(schd.map(s=>s.shift_date));
    const hoursLogged=logs.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0);
    const schedHours=schd.reduce((a,s)=>a+cH(s.start_time,s.end_time),0);
    const absent=[...schedDays].filter(d=>!workedDays.has(d)).length;
    const dayCells=workDays.map(d=>{
      if(isHol(d)) return 'Holiday';
      if(isDO(e,dow(d))) return 'Day Off';
      if(!schedDays.has(d)) return '';
      if(workedDays.has(d)){const dl=logs.filter(l=>l.log_date===d);return dl.reduce((a,l)=>a+cH(l.clock_in,l.clock_out),0).toFixed(1)+'h';}
      return 'Absent';
    });
    csv+='"'+e.name+'","'+rl(e.role)+'",'+dayCells.join(',')+','+workedDays.size+','+absent+','+hoursLogged.toFixed(1)+','+schedHours.toFixed(1)+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='attendance_'+MONTH_NAMES[mo]+'_'+yr+'.csv'; a.click();
  URL.revokeObjectURL(url);
  notif('Attendance report downloaded');
}

// ── ADMIN CLOCK CONTROLS ─────────────────────────────────
async function adminClockIn(eid) {
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const {data,error}=await sb.from('clock_logs').insert({
    employee_id:eid, log_date:TODAY, clock_in:t, log_type:'work'
  }).select().single();
  if(error){notif('Error: '+error.message,'err');return;}
  C.logs.push(data);
  notif('Clocked in '+ge(eid)?.name+' at '+fmtM(now));
  sysLog('auto_action','Admin clock-in',`${S.employee?.name} manually clocked in ${ge(eid)?.name} at ${fmtM(now)}`,'info');
  render();
}

async function adminClockOut(eid) {
  const log=C.logs.find(l=>l.employee_id===eid&&l.log_date===TODAY&&l.log_type==='work'&&!l.clock_out);
  if(!log){notif('No open clock-in found','err');return;}
  // End any open lunch first
  const lunchLog=C.logs.find(l=>l.employee_id===eid&&l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  if(lunchLog){
    await sb.from('clock_logs').update({clock_out:t}).eq('id',lunchLog.id);
    const li=C.logs.findIndex(l=>l.id===lunchLog.id); if(li>=0) C.logs[li].clock_out=t;
  }
  await sb.from('clock_logs').update({clock_out:t}).eq('id',log.id);
  const idx=C.logs.findIndex(l=>l.id===log.id); if(idx>=0) C.logs[idx].clock_out=t;
  notif('Clocked out '+ge(eid)?.name+' at '+fmtM(now));
  sysLog('auto_action','Admin clock-out',`${S.employee?.name} manually clocked out ${ge(eid)?.name} at ${fmtM(now)}`,'info');
  render();
}

async function adminLunchOut(eid) {
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  const {data,error}=await sb.from('clock_logs').insert({
    employee_id:eid, log_date:TODAY, clock_in:t, log_type:'lunch'
  }).select().single();
  if(error){notif('Error: '+error.message,'err');return;}
  C.logs.push(data);
  notif(ge(eid)?.name+' started lunch at '+fmtM(now),'lunch');
  render();
}

async function adminLunchIn(eid) {
  const log=C.logs.find(l=>l.employee_id===eid&&l.log_date===TODAY&&l.log_type==='lunch'&&!l.clock_out);
  if(!log){notif('No open lunch found','err');return;}
  const jm=jmNow(), now=jm.date, t=jm.timeStr;
  await sb.from('clock_logs').update({clock_out:t}).eq('id',log.id);
  const idx=C.logs.findIndex(l=>l.id===log.id); if(idx>=0) C.logs[idx].clock_out=t;

}

async function removeEmployee(eid) {
  const emp = C.employees.find(e => e.id === eid);
  const now = new Date().toISOString();
  const { error } = await sb.from('employees').update({ deleted_at: now }).eq('id', eid);
  if (error) { notif('Error: ' + error.message, 'err'); return; }
  sysLog('auto_action','Employee soft-deleted',`${S.employee?.name} removed employee: ${emp?.name||eid} (restorable)`,'warning');
  S.md = null; await loadAll();
  notif(emp?.name + ' removed (restorable via System Log)', 'err');
  render();
}

async function toggleEmployeeActive(eid) {
  const emp = C.employees.find(e => e.id === eid);
  if (!emp) return;
  const nowActive = emp.is_active !== false; // treat null/undefined as active
  const action = nowActive ? 'deactivate' : 'reactivate';
  if (!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} ${emp.name}?${nowActive ? ' This will cancel all future shifts and block their access to Workforce.' : ''}`)) return;

  const { error } = await sb.from('employees').update({ is_active: !nowActive }).eq('id', eid);
  if (error) { notif('Error: ' + error.message, 'err'); return; }

  if (nowActive) {
    // Cancel all future shifts
    const today = jmNow().date;
    await sb.from('shifts').update({ cancelled: true }).eq('employee_id', eid).gte('shift_date', today);
    sysLog('auto_action','Employee deactivated',`${S.employee?.name} deactivated ${emp.name} — future shifts cancelled`,'warning');
    notif(emp.name + ' deactivated — future shifts cancelled', 'err');
  } else {
    sysLog('auto_action','Employee reactivated',`${S.employee?.name} reactivated ${emp.name}`,'info');
    notif(emp.name + ' reactivated');
  }
  S.md = null; await loadAll(); render();
}

// ── AUTO CLOCK-OUT ────────────────────────────────────────


// ── TICK ─────────────────────────────────────────────────
setInterval(()=>{
  S.now=new Date();
  // Refresh TODAY in case midnight passed in Jamaica
  const _jmDate=jmNow().dateStr; if(_jmDate!==TODAY){location.reload();}  // refresh at JM midnight
  const lk=document.getElementById('lck'); if(lk) lk.textContent=fmtNow(S.now);
  const sbClk=document.getElementById('sbClk'); if(sbClk) sbClk.textContent=fmtNow(S.now);
  const openLog=S.session&&S.employee?myOpenWorkLog():null;
  const dr=document.getElementById('dur'); if(dr&&openLog) dr.textContent=eld(openLog.created_at);
  const lunchLog=S.session&&S.employee?myOpenLunchLog():null;
  const ld=document.getElementById('ldur'); if(ld&&lunchLog) ld.textContent=eld(lunchLog.created_at);
  // Update admin live timers
  C.logs.filter(l=>l.log_date===TODAY&&!l.clock_out).forEach(l=>{
    const el=document.getElementById('lv'+l.employee_id); if(el) el.textContent=eld(l.created_at);
  });
  // Auto clock-out: fire when current Jamaica time >= shift end + 60 min
  if(S.session&&S.employee&&isClocked()) {
    const openLog=myOpenWorkLog();
    const sh=C.shifts.find(s=>s.employee_id===S.employee.id&&s.shift_date===TODAY);
    if(sh&&openLog) {
      const jm=jmNow();
      const nowMin=jm.h*60+jm.m;
      const [eh,em]=sh.end_time.split(':').map(Number);
      const cutoffMin=(eh*60+em)+60; // 1 hour past shift end
      if(nowMin>=cutoffMin) {
        doClockOut().then(()=>{
          notif('Auto clocked out — 1 hr past shift end','err');
          sysLog('auto_action','Auto clock-out',`${S.employee?.name} auto clocked out 1hr past shift end (${sh.end_time})`,'info');
        });
      }
    }
  }
},1000);

// ── INACTIVITY TIMEOUT (45 min) ───────────────────────────
let _lastActivity = Date.now();
const INACTIVITY_MS = 45 * 60 * 1000; // 45 minutes

function resetActivityTimer() { _lastActivity = Date.now(); }
['click','keydown','touchstart','mousemove','scroll'].forEach(ev =>
  document.addEventListener(ev, resetActivityTimer, { passive: true })
);

setInterval(async () => {
  if (!S.session) return; // not logged in
  if (Date.now() - _lastActivity >= INACTIVITY_MS) {
    sysLog('auto_action', 'Session timeout', `${S.employee?.name||'User'} auto logged out after 45min inactivity`, 'info');
    await sb.auth.signOut();
    S.session = null; S.employee = null; S.tab = 'clock'; S.atab = 'live'; S.md = null;
    notif('Logged out due to inactivity', 'err');
    render();
  }
}, 60000); // check every minute

// ── BOOT ──────────────────────────────────────────────────
function withTimeout(promise, ms) {
  return Promise.race([promise, new Promise(res => setTimeout(() => res({data:{session:null}}), ms))]);
}
// ── REALTIME ──────────────────────────────────────────────
function initRealtime() {
  sb.channel('clock_logs_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'clock_logs' }, payload => {
      const { eventType, new: newRow, old: oldRow } = payload;
      if (eventType === 'INSERT') {
        if (!newRow.deleted_at && !C.logs.find(l => l.id === newRow.id)) C.logs.push(newRow);
      } else if (eventType === 'UPDATE') {
        const idx = C.logs.findIndex(l => l.id === newRow.id);
        if (idx >= 0) C.logs[idx] = newRow;
        else if (!newRow.deleted_at) C.logs.push(newRow);
        if (newRow.deleted_at) C.logs = C.logs.filter(l => l.id !== newRow.id);
      } else if (eventType === 'DELETE') {
        C.logs = C.logs.filter(l => l.id !== oldRow.id);
      }
      // Only re-render if admin is on Live Status tab
      if (S.employee?.role === 'admin' && S.atab === 'live') render();
    })
    .subscribe();
}

(async function boot() {
  try {
    if(window.location.hash.includes('type=recovery')) {
      const { data: { session } } = await withTimeout(sb.auth.getSession(), 5000);
      if(session) { S.session=session; S.passwordReset=true; render(); return; }
    }
    const { data: { session } } = await withTimeout(sb.auth.getSession(), 5000);
    if(session) {
      S.session=session;
      await loadAll();
      S.employee=C.employees.find(e=>e.auth_id===session.user.id);
    }
  } catch(e) {
    console.error('Boot error:', e);
  }
  render();
  sb.auth.onAuthStateChange((event, session) => {
    S.session=session;
    if(!session) { S.employee=null; render(); }
  });
})();
